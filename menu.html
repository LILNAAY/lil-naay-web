<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda LIL NAAY</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

.store {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.product {
    background: #222;
    padding: 15px;
    border-radius: 10px;
}

.product img {
    width: 150px;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
}

select {
    margin-top: 5px;
    padding: 5px;
    width: 100%;
}

/* 🔥 NUEVO BOTÓN */
.back-btn {
    background: #444;
    margin-bottom: 20px;
}
</style>

</head>
<body>

<!-- 🔥 BOTÓN REGRESAR -->
<button class="back-btn" onclick="window.location.href='index.html'">
⬅️ Regresar
</button>

<h1>🔥 Tienda LIL NAAY</h1>

<div class="store">

    <!-- PRODUCTO 1 -->
    <div class="product">
        <img src="ropa1.jpg">
        <p>Hoodie LIL NAAY</p>
        <p>$25</p>

        <select id="talla1">
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
        </select>

        <select id="color1">
            <option value="Rojo">Rojo</option>
            <option value="Negro">Negro</option>
        </select>

        <button onclick="agregar('Hoodie LIL NAAY',25,'talla1','color1')">
            Comprar
        </button>
    </div>

    <!-- PRODUCTO 2 -->
    <div class="product">
        <img src="ropa2.jpg">
        <p>T-Shirt LIL NAAY</p>
        <p>$15</p>

        <select id="talla2">
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
        </select>

        <select id="color2">
            <option value="Blanco">Blanco</option>
            <option value="Negro">Negro</option>
        </select>

        <button onclick="agregar('T-Shirt LIL NAAY',15,'talla2','color2')">
            Comprar
        </button>
    </div>

</div>

<h2>🛒 Carrito</h2>
<ul id="carrito"></ul>
<h3>Total: $<span id="total">0</span></h3>

<button onclick="pagar()">Pagar</button>

<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function guardarCarrito(){
    localStorage.setItem("carrito", JSON.stringify(carrito));
}

// ➕ AGREGAR PRODUCTO
function agregar(nombre, precio, tallaId, colorId){

    let talla = document.getElementById(tallaId).value;
    let color = document.getElementById(colorId).value;

    carrito.push({
        nombre,
        precio,
        talla,
        color
    });

    guardarCarrito();
    mostrar();
}

// ❌ ELIMINAR
function eliminar(index){
    carrito.splice(index,1);
    guardarCarrito();
    mostrar();
}

// 🔄 MOSTRAR CARRITO
function mostrar(){
    let lista = document.getElementById("carrito");
    let total = 0;

    lista.innerHTML = "";

    carrito.forEach((p,i)=>{
        lista.innerHTML += `
        <li>
        ${p.nombre} - $${p.precio} | ${p.talla} | ${p.color}
        <button onclick="eliminar(${i})">❌</button>
        </li>`;
        total += p.precio;
    });

    document.getElementById("total").innerText = total;
}

// 💳 PAGAR
function pagar(){

    if(carrito.length === 0){
        alert("Carrito vacío ❌");
        return;
    }

    alert("Compra realizada 🔥");

    carrito = [];
    localStorage.removeItem("carrito");
    mostrar();
}

// INIT
mostrar();

</script>

</body>
</html>
