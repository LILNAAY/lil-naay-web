<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda LIL NAAY</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI';
}

body{
    background:#0a0a0a;
    color:white;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* NAV */
.navbar{
    display:flex;
    justify-content:space-between;
    padding:15px 25px;
    background:#120000;
}

.navbar button{
    background:#ff0000;
    border:none;
    color:white;
    padding:8px 15px;
    border-radius:8px;
    cursor:pointer;
}

/* TABS */
.tabs{
    display:flex;
    gap:10px;
    padding:15px 20px;
}

.tabs button{
    background:#1a1a1a;
    border:none;
    padding:10px 15px;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.tabs button:hover{
    background:#ff000020;
}

/* CONTENIDO */
.content{
    flex:1;
    padding:20px;
}

/* SECCIONES */
.section{
    display:none;
}

.active{
    display:block;
}

/* PRODUCTOS */
.store{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.product{
    background:#111;
    padding:15px;
    border-radius:12px;
    width:200px;
}

.product img{
    width:100%;
    border-radius:10px;
}

/* EVENTOS */
.event{
    background:#111;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
}

/* CHAT */
.chat-box{
    position:fixed;
    bottom:20px;
    right:20px;
    width:300px;
    background:#0d0d0d;
    border:1px solid #ff000050;
    border-radius:15px;
    box-shadow:0 0 20px rgba(255,0,0,0.3);
    z-index:999;
}

.chat-header{
    background:#1a0000;
    padding:10px;
    cursor:move;
    border-radius:15px 15px 0 0;
}

.chat-messages{
    height:200px;
    overflow-y:auto;
    padding:10px;
}

.chat-input{
    display:flex;
}

.chat-input input{
    flex:1;
    padding:8px;
    border:none;
    background:#111;
    color:white;
}

.chat-input button{
    background:red;
    border:none;
    padding:8px;
    color:white;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:15px;
    background:#0d0d0d;
    margin-top:auto;
}
</style>
</head>

<body>

<div class="navbar">
    <h2>🔥 LIL NAAY</h2>
    <a href="index.html"><button>⬅ Volver</button></a>
</div>

<div class="tabs">
    <button onclick="mostrar('tienda')">🛍️ Tienda</button>
    <button onclick="mostrar('musica')">🎵 Música</button>
    <button onclick="mostrar('eventos')">🎉 Eventos</button>
</div>

<div class="content">

<!-- TIENDA -->
<div id="tienda" class="section active">
    <h2>Productos</h2>
    <div class="store" id="productos"></div>

    <h3>🛒 Carrito</h3>
    <ul id="carrito"></ul>
    <h3>Total: $<span id="total">0</span></h3>
    <button onclick="pagar()">Pagar</button>
</div>

<!-- MUSICA -->
<div id="musica" class="section">
    <h2>🎵 Música</h2>
    <p>Aquí puedes agregar YouTube o canciones 🔥</p>
</div>

<!-- EVENTOS -->
<div id="eventos" class="section">
    <h2>🎉 Eventos</h2>

    <div class="event">
        <h3>Concierto Santo Domingo</h3>
        <p>📅 25 Junio 2026</p>
    </div>

    <div class="event">
        <h3>Live Streaming</h3>
        <p>📅 Próximamente</p>
    </div>

</div>

</div>

<!-- CHAT -->
<div class="chat-box" id="chatBoxDrag">
    <div class="chat-header">💬 Chat en vivo</div>
    <div id="chatBox" class="chat-messages"></div>
    <div class="chat-input">
        <input id="mensajeInput" placeholder="Escribe...">
        <button onclick="enviarMensaje()">➤</button>
    </div>
</div>

<div class="footer">
© 2026 LIL NAAY
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, getDocs, addDoc,
onSnapshot, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const db = getFirestore(app);

/* SECCIONES */
window.mostrar = function(sec){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(sec).classList.add("active");
}

/* CHAT */
const q = query(collection(db,"chat"), orderBy("fecha"));

onSnapshot(q,(snap)=>{
    let chat = document.getElementById("chatBox");
    chat.innerHTML="";

    snap.forEach(d=>{
        let m = d.data();
        chat.innerHTML += `<div><b>${m.usuario}</b>: ${m.texto}</div>`;
    });

    chat.scrollTop = chat.scrollHeight;
});

window.enviarMensaje = async function(){
    let texto = document.getElementById("mensajeInput").value;
    let usuario = localStorage.getItem("usuario");

    if(!usuario) return alert("Login requerido");

    await addDoc(collection(db,"chat"),{
        usuario,
        texto,
        fecha: serverTimestamp()
    });

    document.getElementById("mensajeInput").value="";
}

/* DRAG CHAT */
let chat = document.getElementById("chatBoxDrag");
let header = chat.querySelector(".chat-header");

let offsetX, offsetY, isDown=false;

header.onmousedown = e=>{
    isDown=true;
    offsetX = e.clientX - chat.offsetLeft;
    offsetY = e.clientY - chat.offsetTop;
}

document.onmouseup=()=> isDown=false;

document.onmousemove = e=>{
    if(!isDown) return;
    chat.style.left = (e.clientX - offsetX)+"px";
    chat.style.top = (e.clientY - offsetY)+"px";
}

/* TIENDA */
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

async function cargarProductos(){
    let c = document.getElementById("productos");
    c.innerHTML="";

    let snap = await getDocs(collection(db,"productos"));

    snap.forEach(doc=>{
        let p = doc.data();

        c.innerHTML += `
        <div class="product">
        <img src="${p.imagen}">
        <p>${p.nombre}</p>
        <p>$${p.precio}</p>
        <button onclick="agregar('${p.nombre}',${p.precio})">Comprar</button>
        </div>`;
    });
}

window.agregar = function(n,p){
    carrito.push({nombre:n,precio:p});
    localStorage.setItem("carrito",JSON.stringify(carrito));
    mostrarCarrito();
}

function mostrarCarrito(){
    let ul = document.getElementById("carrito");
    ul.innerHTML="";
    let total=0;

    carrito.forEach((p,i)=>{
        ul.innerHTML+=`<li>${p.nombre} $${p.precio}</li>`;
        total+=p.precio;
    });

    document.getElementById("total").innerText=total;
}

window.pagar = async function(){
    if(carrito.length===0) return alert("Vacío");

    await addDoc(collection(db,"compras"),{
        productos:carrito,
        fecha:new Date()
    });

    carrito=[];
    localStorage.removeItem("carrito");
    mostrarCarrito();
    alert("Compra realizada");
}

cargarProductos();
mostrarCarrito();

</script>

</body>
</html>
