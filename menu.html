<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda LIL NAAY</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}

body{
    background:
    radial-gradient(circle at top, rgba(255,0,0,0.2), transparent 60%),
    radial-gradient(circle at bottom, rgba(255,0,0,0.15), transparent 70%),
    #0a0a0a;
    color:white;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* NAV */
.navbar{
    display:flex;
    justify-content:space-between;
    padding:15px 25px;
    background:linear-gradient(90deg,#120000,#1a0000);
    border-bottom:1px solid rgba(255,0,0,0.3);
    box-shadow:0 0 15px rgba(255,0,0,0.2);
}

.navbar button{
    background:#ff0000;
    border:none;
    color:white;
    padding:8px 15px;
    border-radius:8px;
    cursor:pointer;
}

/* TABS */
.tabs{
    display:flex;
    gap:10px;
    padding:15px 20px;
}

.tabs button{
    background:rgba(0,0,0,0.6);
    border:1px solid rgba(255,0,0,0.3);
    padding:10px 18px;
    color:white;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.tabs button:hover{
    background:#ff0000;
    box-shadow:0 0 15px red;
}

/* CONTENT */
.content{flex:1;padding:20px;}
.section{display:none;}
.active{display:block;}

/* PRODUCTOS */
.store{display:flex;flex-wrap:wrap;gap:20px;}
.product{
    background:rgba(0,0,0,0.6);
    padding:15px;
    border-radius:15px;
    width:200px;
    border:1px solid rgba(255,0,0,0.3);
    box-shadow:0 0 20px rgba(255,0,0,0.2);
    transition:0.3s;
}

.product:hover{
    transform:scale(1.05);
    box-shadow:0 0 30px red;
}
.product img{width:100%;border-radius:10px;}

/* PERFIL */
.profile{
    background:rgba(0,0,0,0.7);
    padding:20px;
    border-radius:15px;
    max-width:400px;
    border:1px solid rgba(255,0,0,0.3);
    box-shadow:0 0 20px rgba(255,0,0,0.2);
}

/* CHAT */
.chat-toggle{
position:fixed;bottom:20px;right:20px;
background:#ff0000;color:white;border:none;
padding:12px;border-radius:50%;cursor:pointer;z-index:1000;
}

.chat-toggle:hover{
transform:scale(1.1);
}

.chat-box{
position:fixed;bottom:80px;right:20px;
width:320px;height:420px;
background:#0d0d0d;
border-radius:15px;
display:none;
flex-direction:column;
overflow:hidden;
box-shadow:0 0 25px rgba(255,0,0,0.4);
}
/* HEADER */
.chat-header{
background:#1a0000;
padding:10px;
display:flex;
justify-content:space-between;
font-weight:bold;
cursor:move;
}

.online{color:#0f0;font-size:12px;}

/* MENSAJES */
.chat-messages{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:6px;
}

/* BURBUJAS */
.msg{
max-width:75%;
padding:8px 12px;
border-radius:12px;
font-size:13px;

/* 🔥 FIX IMPORTANTE */
word-wrap: break-word;
overflow-wrap: break-word;
word-break: break-word;
white-space: pre-wrap;
}

/* 🔥 NOMBRE DEL USUARIO */
.msg b{
display:block;
font-size:11px;
opacity:0.7;
margin-bottom:2px;
word-break: break-word;
}

.me{background:#ff0000;align-self:flex-end;}

.other{background:#222;align-self:flex-start;}

.role-admin{border-left:4px solid red;}
.role-mod{border-left:4px solid cyan;}
.role-vip{border-left:4px solid gold;}

/* INPUT */
.chat-input{display:flex;border-top:1px solid #222;}
.chat-input input{flex:1;padding:10px;border:none;background:#111;color:white;}
.chat-input button{background:red;border:none;padding:10px;color:white;}

/* NOTI */
#noti{
position:fixed;
top:20px;
right:20px;
background:red;
padding:10px;
border-radius:8px;
display:none;
}

/* FOOTER */
.footer{text-align:center;padding:15px;background:#0d0d0d;margin-top:auto;}
</style>
</head>

<body>

<div id="noti">🔔 Nuevo mensaje</div>

<div class="navbar">
<h2>🔥 LIL NAAY</h2>
<a href="index.html"><button>⬅ Volver</button></a>
</div>

<div class="tabs">
<button onclick="mostrar('tienda')">🛍️ Tienda</button>
<button onclick="mostrar('musica')">🎵 Música</button>
<button onclick="mostrar('eventos')">🎉 Eventos</button>
<button onclick="mostrar('perfil')">👤 Perfil</button>
</div>

<div class="content">

<div id="tienda" class="section active">
<h2>Productos</h2>
<div class="store" id="productos"></div>

<h3>🛒 Carrito</h3>
<ul id="carrito"></ul>
<h3>Total: $<span id="total">0</span></h3>
<button onclick="pagar()">Pagar</button>
</div>

<div id="musica" class="section"><h2>🎵 Música</h2></div>

<div id="eventos" class="section">
<h2>🎉 Eventos</h2>
<div class="event">Próximamente 🔥</div>
</div>

<div id="perfil" class="section">
<h2>👤 Perfil</h2>
<div class="profile" id="perfilData"></div>

    <br>
<input type="text" id="fotoInput" placeholder="URL de tu foto">
<button onclick="guardarFoto()">Guardar Foto</button>
</div>

</div>

<button class="chat-toggle" onclick="toggleChat()">💬</button>

<div class="chat-box" id="chatBoxDrag">
<div class="chat-header">
<span>💬 Chat</span>
<span class="online" id="onlineCount">0 online</span>
</div>

<div id="chatBox" class="chat-messages"></div>

<div class="chat-input">
<input id="mensajeInput" placeholder="Escribe...">
<button onclick="enviarMensaje()">➤</button>
</div>
</div>

<div class="footer">© 2026 LIL NAAY</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, getDocs, addDoc,
onSnapshot, query, orderBy, serverTimestamp,
where, doc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"TU_API_KEY",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const db = getFirestore(app);

/* SECCIONES */
window.mostrar = sec=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(sec).classList.add("active");
}

/* PERFIL */
async function obtenerPerfil(email){
const q = query(collection(db,"usuarios"), where("email","==",email));
const snap = await getDocs(q);

return snap.empty ? null : {
id: snap.docs[0].id,
...snap.docs[0].data()
};
}
async function cargarPerfil(){
let email = localStorage.getItem("usuario");
if(!email) return;

let data = await obtenerPerfil(email);

document.getElementById("perfilData").innerHTML=`
<img src="${data?.foto || 'https://i.imgur.com/4Z7b6QZ.png'}"
style="width:80px;height:80px;border-radius:50%;margin-bottom:10px;">

<p><b>Usuario:</b> ${data?.username || email}</p>
<p><b>Email:</b> ${email}</p>
<p><b>Rol:</b> ${data?.admin?"ADMIN":data?.mod?"MOD":data?.vip?"VIP":"USER"}</p>
<p><b>País:</b> ${data?.pais||"-"}</p>
`;
}

    window.guardarFoto = async ()=>{

let email = localStorage.getItem("usuario");
let url = document.getElementById("fotoInput").value.trim();

if(!email || !url) return alert("Pon una URL");

let perfil = await obtenerPerfil(email);
if(!perfil) return alert("Usuario no encontrado");

await setDoc(doc(db,"usuarios",perfil.id),{
foto:url
},{ merge:true });

alert("Foto guardada ✅");
cargarPerfil();
}

/* ONLINE */
const onlineRef = collection(db,"online");

setInterval(async ()=>{
let email = localStorage.getItem("usuario");
if(!email) return;

await setDoc(doc(onlineRef,email),{
time:Date.now()
});
},5000);

onSnapshot(onlineRef,snap=>{
let count=0;
let now=Date.now();

snap.forEach(d=>{
if(now - d.data().time < 10000) count++;
});

onlineCount.innerText = count+" online";
});

/* CHAT */
let lastMsg="", lastTime=0;

const qChat = query(collection(db,"chat"), orderBy("fecha"));

onSnapshot(qChat,async snap=>{
let chat = document.getElementById("chatBox");
chat.innerHTML="";

let email = localStorage.getItem("usuario");

for(const d of snap.docs){
let m = d.data();
let perfil = await obtenerPerfil(m.email);

let div = document.createElement("div");

div.className="msg "+(m.email===email?"me":"other");

if(perfil?.admin) div.classList.add("role-admin");
else if(perfil?.mod) div.classList.add("role-mod");
else if(perfil?.vip) div.classList.add("role-vip");

div.innerHTML = `
<div style="display:flex;gap:8px;align-items:flex-start;">
<img src="${perfil?.foto || 'https://i.imgur.com/4Z7b6QZ.png'}"
style="width:30px;height:30px;border-radius:50%;">

<div>
<b>${m.usuario}</b>
${m.texto}
</div>
</div>
`;

chat.appendChild(div);
}

/* NOTI */
if(snap.docs.length){
let ultimo = snap.docs[snap.docs.length-1].data();
if(ultimo.texto !== lastMsg){
noti.style.display="block";
setTimeout(()=>noti.style.display="none",2000);
lastMsg = ultimo.texto;
}
}

chat.scrollTop = chat.scrollHeight;
});

/* ENVIAR */
window.enviarMensaje = async ()=>{

let input = mensajeInput;
let texto = input.value.trim();
let email = localStorage.getItem("usuario");

if(!texto || !email) return;

let perfil = await obtenerPerfil(email);

/* BAN */
if(perfil?.ban && Date.now() < perfil.banHasta){
return alert("🚫 Estás baneado");
}

/* ANTI SPAM */
if(texto === lastMsg && Date.now()-lastTime < 3000){
return alert("Spam 🚫");
}

lastMsg = texto;
lastTime = Date.now();

await addDoc(collection(db,"chat"),{
usuario: perfil?.username || email,
email,
texto,
fecha: serverTimestamp()
});

input.value="";
}

/* ENTER */
mensajeInput.addEventListener("keypress",e=>{
if(e.key==="Enter") enviarMensaje();
});

/* CHAT UI */
window.toggleChat = ()=>{
chatBoxDrag.style.display =
chatBoxDrag.style.display==="flex"?"none":"flex";
}

/* TIENDA */
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

async function cargarProductos(){
let c = productos;
c.innerHTML="";

let snap = await getDocs(collection(db,"productos"));

snap.forEach(doc=>{
let p = doc.data();

c.innerHTML+=`
<div class="product">
<img src="${p.imagen}">
<p>${p.nombre}</p>
<p>$${p.precio}</p>
<button onclick="agregar('${p.nombre}',${p.precio})">Comprar</button>
</div>`;
});
}

window.agregar=(n,p)=>{
carrito.push({nombre:n,precio:p});
localStorage.setItem("carrito",JSON.stringify(carrito));
mostrarCarrito();
}

function mostrarCarrito(){
let ul=carrito;
let lista=document.getElementById("carrito");
lista.innerHTML="";
let total=0;

carrito.forEach(p=>{
lista.innerHTML+=`<li>${p.nombre} $${p.precio}</li>`;
total+=p.precio;
});

document.getElementById("total").innerText=total;
}

window.pagar=async()=>{
if(carrito.length===0) return;

await addDoc(collection(db,"compras"),{
productos:carrito,
fecha:new Date()
});

carrito=[];
localStorage.removeItem("carrito");
mostrarCarrito();
alert("Compra realizada");
}

/* INIT */
cargarProductos();
mostrarCarrito();
cargarPerfil();

</script>

</body>
</html>
