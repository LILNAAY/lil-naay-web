<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda LIL NAAY</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}

body{
background:
radial-gradient(circle at top, rgba(255,0,0,0.2), transparent 60%),
radial-gradient(circle at bottom, rgba(255,0,0,0.15), transparent 70%),
#0a0a0a;
color:white;
display:flex;
flex-direction:column;
min-height:100vh;
}

.navbar{
display:flex;
justify-content:space-between;
padding:15px 25px;
background:linear-gradient(90deg,#120000,#1a0000);
border-bottom:1px solid rgba(255,0,0,0.3);
}

.tabs{display:flex;gap:10px;padding:15px 20px;}
.tabs button{
background:rgba(0,0,0,0.6);
border:1px solid rgba(255,0,0,0.3);
padding:10px 18px;
color:white;
border-radius:10px;
cursor:pointer;
}

.tabs button:hover{background:#ff0000;}

.content{flex:1;padding:20px;}
.section{display:none;}
.active{display:block;}

.store{display:flex;flex-wrap:wrap;gap:20px;}

.product{
background:#111;
padding:15px;
border-radius:15px;
width:200px;
border:1px solid rgba(255,0,0,0.3);
}
.product img{width:100%;border-radius:10px;}

.profile{
background:#111;
padding:20px;
border-radius:15px;
max-width:400px;
}

.chat-toggle{
position:fixed;bottom:20px;right:20px;
background:#ff0000;color:white;border:none;
padding:12px;border-radius:50%;
}

.chat-box{
position:fixed;bottom:80px;right:20px;
width:320px;height:420px;
background:#0d0d0d;
display:none;flex-direction:column;
}

.chat-messages{
flex:1;overflow-y:auto;padding:10px;
display:flex;flex-direction:column;gap:6px;
}

.msg{
max-width:75%;
padding:8px 12px;
border-radius:12px;
font-size:13px;
word-break:break-word;
}

.me{background:#ff0000;align-self:flex-end;}
.other{background:#222;}

.chat-input{display:flex;}
.chat-input input{flex:1;padding:10px;background:#111;color:white;border:none;}
.chat-input button{background:red;color:white;border:none;padding:10px;}

.footer{text-align:center;padding:15px;background:#0d0d0d;margin-top:auto;}
</style>
</head>

<body>

<div class="navbar">
<h2>🔥 LIL NAAY</h2>
</div>

<div class="tabs">
<button onclick="mostrar('tienda')">🛍️ Tienda</button>
<button onclick="mostrar('perfil')">👤 Perfil</button>
</div>

<div class="content">

<div id="tienda" class="section active">
<h2>Productos</h2>

<!-- SUBIR PRODUCTO -->
<input id="nombreProd" placeholder="Nombre">
<input id="precioProd" type="number" placeholder="Precio">
<input id="imgProd" type="file">
<button onclick="subirProducto()">Subir</button>

<div class="store" id="productos"></div>

<h3>🛒 Carrito</h3>
<ul id="carrito"></ul>
<h3>Total: $<span id="total">0</span></h3>
<button onclick="pagar()">Pagar</button>
</div>

<div id="perfil" class="section">
<h2>Perfil</h2>

<input type="file" id="fotoPerfil">
<button onclick="subirFoto()">Guardar Foto</button>

<div class="profile" id="perfilData"></div>
</div>

</div>

<button class="chat-toggle" onclick="toggleChat()">💬</button>

<div class="chat-box" id="chatBoxDrag">
<div id="chatBox" class="chat-messages"></div>

<div class="chat-input">
<input id="mensajeInput">
<button onclick="enviarMensaje()">➤</button>
</div>
</div>

<div class="footer">© 2026</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, getDocs, addDoc,
onSnapshot, query, orderBy, serverTimestamp,
where, doc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"TU_API_KEY",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const db = getFirestore(app);

/* CAMBIAR SECCION */
window.mostrar = sec=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(sec).classList.add("active");
}

/* PERFIL */
async function obtenerPerfil(email){
const q = query(collection(db,"usuarios"), where("email","==",email));
const snap = await getDocs(q);
return snap.empty ? null : snap.docs[0].data();
}

async function cargarPerfil(){
let email = localStorage.getItem("usuario");
if(!email) return;

let data = await obtenerPerfil(email);

perfilData.innerHTML=`
<img src="${data?.foto||''}" width="80" style="border-radius:50%;">
<p>${data?.username||email}</p>
<p>${email}</p>
`;
}

/* FOTO PERFIL */
window.subirFoto = async ()=>{
let file = fotoPerfil.files[0];
let email = localStorage.getItem("usuario");

let reader = new FileReader();
reader.onload = async e=>{
await setDoc(doc(db,"usuarios",email),{
foto:e.target.result
},{merge:true});

cargarPerfil();
};

reader.readAsDataURL(file);
}

/* PRODUCTOS */
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

async function cargarProductos(){
productos.innerHTML="";
let snap = await getDocs(collection(db,"productos"));

snap.forEach(d=>{
let p=d.data();
productos.innerHTML+=`
<div class="product">
<img src="${p.imagen}">
<p>${p.nombre}</p>
<p>$${p.precio}</p>
<button onclick="agregar('${p.nombre}',${p.precio})">Comprar</button>
</div>`;
});
}

/* SUBIR PRODUCTO */
window.subirProducto=()=>{
let file=imgProd.files[0];
let reader=new FileReader();

reader.onload=async e=>{
await addDoc(collection(db,"productos"),{
nombre:nombreProd.value,
precio:Number(precioProd.value),
imagen:e.target.result
});
cargarProductos();
};

reader.readAsDataURL(file);
}

/* CARRITO */
window.agregar=(n,p)=>{
carrito.push({nombre:n,precio:p});
localStorage.setItem("carrito",JSON.stringify(carrito));
mostrarCarrito();
}

function mostrarCarrito(){
carritoEl.innerHTML="";
let total=0;
carrito.forEach(p=>{
carrito.innerHTML+=`<li>${p.nombre} $${p.precio}</li>`;
total+=p.precio;
});
total.innerText=total;
}

/* PAGAR */
window.pagar=async()=>{
await addDoc(collection(db,"compras"),{
productos:carrito,
fecha:new Date()
});
carrito=[];
localStorage.removeItem("carrito");
mostrarCarrito();
}

/* CHAT */
const qChat = query(collection(db,"chat"), orderBy("fecha"));

onSnapshot(qChat,async snap=>{
chatBox.innerHTML="";
let email=localStorage.getItem("usuario");

for(const d of snap.docs){
let m=d.data();
let perfil=await obtenerPerfil(m.email);

let div=document.createElement("div");
div.className="msg "+(m.email===email?"me":"other");

div.innerHTML=`
<img src="${perfil?.foto||''}" width="25" style="border-radius:50%;">
<b>${m.usuario}</b>
${m.texto}`;

chatBox.appendChild(div);
}
});

/* ENVIAR */
window.enviarMensaje=async()=>{
let texto=mensajeInput.value;
let email=localStorage.getItem("usuario");

let perfil=await obtenerPerfil(email);

await addDoc(collection(db,"chat"),{
usuario:perfil?.username||email,
email,
texto,
fecha:serverTimestamp()
});

mensajeInput.value="";
}

/* CHAT UI */
window.toggleChat=()=>{
chatBoxDrag.style.display=
chatBoxDrag.style.display==="flex"?"none":"flex";
}

/* INIT */
cargarProductos();
mostrarCarrito();
cargarPerfil();

</script>

</body>
</html>
