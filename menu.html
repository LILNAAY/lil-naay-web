<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LIL NAAY - Menu</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
    overflow-x:hidden;
}

/* 🔥 FONDO */
.fondo{
    position:relative;
    background: url('Fondopaisaje(1).png') no-repeat center;
    background-size: cover;
    height: 100vh;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;

    animation: aparecer 1s ease;
}

/* 🌫️ HUMO */
.fondo::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background: url('https://i.imgur.com/8IhZ6sP.png');
    opacity:0.1;
    animation: humo 20s linear infinite;
}

/* 🌇 LUZ */
.fondo::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(255,200,100,0.4), transparent 70%);
    top:40%;
    right:20%;
    filter: blur(50px);
    animation: sol 6s infinite alternate;
}

/* ✨ ANIMACIONES */
@keyframes aparecer{
    from{opacity:0; transform: scale(1.1);}
    to{opacity:1; transform: scale(1);}
}

@keyframes humo{
    from{transform: translateX(0);}
    to{transform: translateX(-500px);}
}

@keyframes sol{
    from{transform: scale(1);}
    to{transform: scale(1.2);}
}

/* 🔙 VOLVER */
.volver{
    position:absolute;
    top:20px;
    left:20px;
    background:rgba(0,0,0,0.5);
    padding:10px 15px;
    border-radius:10px;
    color:white;
    text-decoration:none;
    z-index:2;
}

/* 🧠 LOGO GRANDE */
.logo-img{
    width:650px;
    max-width:95%;
    margin-bottom:20px;
    animation: logoEntrada 1s ease;
    filter: drop-shadow(0 0 25px rgba(255,255,255,0.6));
    transition:0.3s;
    z-index:2;
}

.logo-img:hover{
    transform: scale(1.05);
}

@keyframes logoEntrada{
    from{opacity:0; transform: translateY(-50px);}
    to{opacity:1; transform: translateY(0);}
}

/* 🎮 BOTONES */
.menu-principal{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.btn-img{
    width:320px;
    margin:10px;
    cursor:pointer;
    transition:0.3s;

    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.7));
    z-index:2;
}

.btn-img:hover{
    transform: scale(1.1);
    filter: drop-shadow(0 15px 30px rgba(0,0,0,0.9)) brightness(1.2);
}

.btn-img:active{
    transform: scale(0.95);
}

/* 🧩 PANTALLAS */
.pantalla{
    display:none;
    padding:20px;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform: translateY(30px);}
    to{opacity:1; transform: translateY(0);}
}

/* 🛍️ PRODUCTOS */
.store{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.product{
    background:#222;
    padding:15px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.7);
    transition:0.3s;
}

.product:hover{
    transform: translateY(-5px);
}

.product img{
    width:150px;
}

button{
    margin-top:10px;
    padding:10px;
    background:red;
    border:none;
    color:white;
    cursor:pointer;
}

select{
    margin-top:5px;
    padding:5px;
    width:100%;
}

.btn-volver{
    margin-top:20px;
}

/* ✨ PARTICULAS */
#particles{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
    pointer-events:none;
}
</style>

</head>
<body>

<!-- 🔊 SONIDO -->
<audio id="clickSound" src="click.mp3"></audio>

<!-- ✨ PARTICULAS -->
<canvas id="particles"></canvas>

<!-- 🔥 MENU -->
<div class="fondo">

<a href="index.html" class="volver">⬅ Volver</a>

<img src="diosloquisoasi.png" class="logo-img">

<div class="menu-principal">
    <img src="botontienda.png" class="btn-img" onclick="irSeccion('tienda')">
    <img src="botonevento.png" class="btn-img" onclick="irSeccion('eventos')">
</div>

</div>

<!-- 🎤 EVENTOS -->
<div id="eventos" class="pantalla">
<h1>🎤 Eventos</h1>
<div class="store" id="listaEventos"></div>
<button onclick="volverMenu()" class="btn-volver">⬅ Volver</button>
</div>

<!-- 🛍️ TIENDA -->
<div id="tienda" class="pantalla">
<h1>🛍️ Tienda</h1>
<div class="store" id="listaProductos"></div>

<h2>🛒 Carrito</h2>
<ul id="carrito"></ul>
<h3>Total: $<span id="total">0</span></h3>

<button onclick="pagar()">Pagar</button>
<button onclick="volverMenu()" class="btn-volver">⬅ Volver</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
  authDomain: "lil-naay.firebaseapp.com",
  projectId: "lil-naay"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

// 🔊 SONIDO + CAMBIO
window.irSeccion = function(seccion){
    let audio = document.getElementById("clickSound");
    if(audio) audio.play();
    mostrarSeccion(seccion);
}

// 🎮 TRANSICIÓN
window.mostrarSeccion = function(seccion){
    document.querySelector(".fondo").style.opacity = "0";

    setTimeout(()=>{
        document.querySelector(".fondo").style.display = "none";
        document.getElementById("eventos").style.display = "none";
        document.getElementById("tienda").style.display = "none";
        document.getElementById(seccion).style.display = "block";
    },300);
}

window.volverMenu = function(){
    document.querySelector(".fondo").style.display = "flex";
    document.querySelector(".fondo").style.opacity = "1";
    document.getElementById("eventos").style.display = "none";
    document.getElementById("tienda").style.display = "none";
}

// 📡 EVENTOS
async function cargarEventos(){
    const contenedor = document.getElementById("listaEventos");
    const snap = await getDocs(collection(db,"eventos"));

    snap.forEach(doc=>{
        let e = doc.data();
        contenedor.innerHTML += `
        <div class="product">
            <img src="${e.imagen}">
            <p>${e.nombre}</p>
            <p>📅 ${e.fecha}</p>
        </div>`;
    });
}

// 🛍️ PRODUCTOS
async function cargarProductos(){
    const contenedor = document.getElementById("listaProductos");
    const snap = await getDocs(collection(db,"productos"));

    snap.forEach(doc=>{
        let p = doc.data();
        contenedor.innerHTML += `
        <div class="product">
            <img src="${p.imagen}">
            <p>${p.nombre}</p>
            <p>$${p.precio}</p>

            <select id="talla-${doc.id}">
                <option>S</option>
                <option>M</option>
                <option>L</option>
            </select>

            <select id="color-${doc.id}">
                <option>Rojo</option>
                <option>Negro</option>
            </select>

            <button onclick="agregar('${p.nombre}',${p.precio},'talla-${doc.id}','color-${doc.id}')">
                Comprar
            </button>
        </div>`;
    });
}

// 🛒 CARRITO
window.agregar = function(nombre, precio, tallaId, colorId){
    let talla = document.getElementById(tallaId).value;
    let color = document.getElementById(colorId).value;

    carrito.push({ nombre, precio, talla, color });
    localStorage.setItem("carrito", JSON.stringify(carrito));
    mostrar();
}

window.eliminar = function(i){
    carrito.splice(i,1);
    localStorage.setItem("carrito", JSON.stringify(carrito));
    mostrar();
}

function mostrar(){
    let lista = document.getElementById("carrito");
    let total = 0;
    lista.innerHTML = "";

    carrito.forEach((p,i)=>{
        lista.innerHTML += `
        <li>
        ${p.nombre} - $${p.precio}
        <button onclick="eliminar(${i})">❌</button>
        </li>`;
        total += p.precio;
    });

    document.getElementById("total").innerText = total;
}

// 💳 PAGAR
window.pagar = async function(){
    if(carrito.length === 0){
        alert("Carrito vacío ❌");
        return;
    }

    await addDoc(collection(db,"compras"),{
        productos: carrito,
        fecha: new Date()
    });

    alert("Compra guardada 🔥");

    carrito = [];
    localStorage.removeItem("carrito");
    mostrar();
}

// ✨ PARTICULAS
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        size: Math.random()*3,
        speedY: Math.random()*1 + 0.2
    });
}

function animar(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        p.y += p.speedY;

        if(p.y > canvas.height){
            p.y = 0;
            p.x = Math.random()*canvas.width;
        }

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fillStyle = "rgba(255,255,255,0.3)";
        ctx.fill();
    });

    requestAnimationFrame(animar);
}

animar();

// INIT
cargarProductos();
cargarEventos();
mostrar();

</script>

</body>
</html>
