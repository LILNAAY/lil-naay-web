<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eventos & Tienda</title>

<style>
:root {
    --rojo: #8b0000;
    --fondo: #0f0a0a;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #140909, #0f0a0a);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    align-items: center;
    padding: 20px 30px;
    background: rgba(20, 9, 9, 0.8);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
}

.back-btn {
    background: rgba(255,255,255,0.05);
    padding: 10px 18px;
    border-radius: 20px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.back-btn:hover {
    background: rgba(139, 0, 0, 0.5);
}

.section {
    padding: 40px;
}

.event {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 15px;
}

.carrito-box {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

.carrito-box ul {
    list-style: none;
    padding: 0;
}

.carrito-box li {
    margin-bottom: 10px;
}

.store {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
}

.product {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 15px;
    width: 180px;
    text-align: center;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

.price {
    color: #ff4d4d;
    font-weight: bold;
}

.btn {
    margin-top: 10px;
    padding: 10px;
    background: var(--rojo);
    border-radius: 20px;
    border: none;
    color: white;
    cursor: pointer;
}

.footer {
    background: #0a0505;
    padding: 20px;
    text-align: center;
    color: #888;
    margin-top: 40px;
}

/* CLIENTE */
.cliente-box input, .cliente-box select{
    display:block;
    margin:8px 0;
    padding:10px;
    border-radius:10px;
    border:none;
    width: 250px;
}
</style>
</head>

<body>

<div class="navbar">
    <a href="index.html" class="back-btn">⬅ Volver</a>
</div>

<!-- 🔥 DATOS DEL CLIENTE -->
<div class="section cliente-box">
    <h2>🧾 Datos del cliente</h2>

    <input type="text" id="nombre" placeholder="Nombre completo" oninput="validarNombre()">
    <input type="email" id="correo" placeholder="Correo electrónico">

    <select id="pais">
        <option value="">Selecciona tu país</option>
        <option>República Dominicana</option>
        <option>Estados Unidos</option>
        <option>España</option>
        <option>México</option>
        <option>Colombia</option>
        <option>Argentina</option>
        <option>Chile</option>
        <option>Perú</option>
        <option>Venezuela</option>
        <option>Puerto Rico</option>
        <option>Panamá</option>
        <option>Costa Rica</option>
        <option>Guatemala</option>
    </select>

    <button class="btn" onclick="guardarDatos()">Guardar datos ✅</button>

    <p id="estadoDatos" style="color:#00ff99;"></p>
</div>

<div class="section">
    <h2>🎟️ Eventos</h2>

    <div class="event">
        📍 Santo Domingo - 10 Abril 2026 <br><br>
        <button class="btn" onclick="reservar()">Reservar / Comprar</button>
    </div>

    <div class="event">
        📍 Santiago - 25 Abril 2026 <br><br>
        <button class="btn" onclick="reservar()">Reservar / Comprar</button>
    </div>
</div>

<div class="section">
    <h2>🛍️ Tienda</h2>

    <div class="carrito-box">
        <h3>🛒 Carrito</h3>
        <ul id="carrito"></ul>
        <p>Total: $<span id="total">0</span></p>
        <button class="btn" onclick="pagar()">Pagar 💳</button>
    </div>

    <div class="store">

        <div class="product">
            <img src="ropa1.jpg">
            <p>Hoodie LIL NAAY</p>
            <p class="price">$25</p>

            <select id="talla1">
                <option>S</option>
                <option>M</option>
                <option>L</option>
            </select>

            <select id="color1">
                <option>Rojo</option>
                <option>Negro</option>
            </select>

            <button class="btn" onclick="agregar('Hoodie',25,'talla1','color1')">Comprar</button>
        </div>

        <div class="product">
            <img src="ropa2.jpg">
            <p>T-Shirt LIL NAAY</p>
            <p class="price">$15</p>

            <select id="talla2">
                <option>S</option>
                <option>M</option>
                <option>L</option>
            </select>

            <select id="color2">
                <option>Blanco</option>
                <option>Negro</option>
            </select>

            <button class="btn" onclick="agregar('T-Shirt',15,'talla2','color2')">Comprar</button>
        </div>

    </div>
</div>

<div class="footer">
    © 2026 LIL NAAY — Página creada por J.D
</div>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
let datosGuardados = false;

// VALIDAR NOMBRE
function validarNombre(){
    let nombre = document.getElementById("nombre");
    nombre.value = nombre.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ ]/g, '');
}

// VALIDAR EMAIL
function validarCorreo(email){
    const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return regex.test(email);
}

// GUARDAR DATOS
function guardarDatos(){

    let nombre = document.getElementById("nombre").value.trim();
    let correo = document.getElementById("correo").value.trim();
    let pais = document.getElementById("pais").value;

    if(!nombre || !correo || !pais){
        alert("Completa todos los datos");
        return;
    }

    if(!validarCorreo(correo)){
        alert("Correo inválido");
        return;
    }

    if(nombre.length < 3){
        alert("Nombre muy corto");
        return;
    }

    let cliente = { nombre, correo, pais };
    localStorage.setItem("cliente", JSON.stringify(cliente));

    datosGuardados = true;

    document.getElementById("estadoDatos").innerText = "Datos guardados correctamente ✅";
}

function guardarCarrito(){
    localStorage.setItem("carrito", JSON.stringify(carrito));
}

function agregar(nombre, precio, tallaId, colorId){

    let talla = document.getElementById(tallaId).value;
    let color = document.getElementById(colorId).value;

    carrito.push({nombre,precio,talla,color});

    guardarCarrito();
    mostrar();
}

function eliminar(index){
    carrito.splice(index,1);
    guardarCarrito();
    mostrar();
}

function mostrar(){
    let lista = document.getElementById("carrito");
    let total = 0;

    lista.innerHTML = "";

    carrito.forEach((p,i)=>{
        lista.innerHTML += `
        <li>
        ${p.nombre} - $${p.precio} | ${p.talla} | ${p.color}
        <button onclick="eliminar(${i})">❌</button>
        </li>`;
        total += p.precio;
    });

    document.getElementById("total").innerText = total;
}

// PAGAR
async function pagar(){

    if(!datosGuardados){
        alert("Primero guarda los datos del cliente");
        return;
    }

    if(carrito.length === 0){
        alert("Carrito vacío");
        return;
    }

    let cliente = JSON.parse(localStorage.getItem("cliente"));

    const respuesta = await fetch("http://localhost:3000/crear-pago", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            productos: carrito,
            cliente: cliente
        })
    });

    const data = await respuesta.json();

    if(data.url){
        window.location.href = data.url;
    } else {
        alert("Error al crear pago");
    }
}

function reservar(){
    alert("Reserva realizada 🔥");
}

window.onload = mostrar;
</script>

</body>
</html>
