<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda LIL NAAY</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
    margin: 0;
}

.navbar {
    display: flex;
    align-items: center;
    padding: 20px 30px;
    background: rgba(20, 9, 9, 0.8);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
}

.back-btn {
    background: rgba(255,255,255,0.05);
    padding: 10px 18px;
    border-radius: 20px;
    text-decoration: none;
    color: white;
}

.store {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.product {
    background: #222;
    padding: 15px;
    border-radius: 10px;
    width: 200px;
}

.product img {
    width: 100%;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

.footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.6);
    padding: 10px;
    font-size: 14px;
}

.msg {
    text-align:left;
    margin-bottom:8px;
}
</style>

</head>
<body>

<div class="navbar">
    <a href="index.html" class="back-btn">⬅ Volver</a>
</div>

<h1>🔥 Tienda LIL NAAY</h1>

<!-- CHAT -->
<div style="max-width:800px;margin:30px auto;background:#1a1a1a;padding:20px;border-radius:15px;">
<h2>💬 Chat en vivo</h2>

<div id="chatBox" style="height:300px;overflow-y:auto;background:#0d0d0d;padding:10px;border-radius:10px;"></div>

<input id="mensajeInput" placeholder="Escribe..." style="width:70%;padding:10px;border-radius:5px;">
<button onclick="enviarMensaje()">Enviar</button>

<p id="cooldown"></p>
</div>

<div class="store" id="productos"></div>

<h2>🛒 Carrito</h2>
<ul id="carrito"></ul>
<h3>Total: $<span id="total">0</span></h3>

<button onclick="pagar()">Pagar</button>

<div class="footer">
© <span id="year"></span> LIL NAAY
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, getDocs, addDoc,
onSnapshot, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const db = getFirestore(app);

/* ================= CHAT ================= */

let tiempoEspera = 90;
let ultimoEnvio = Number(localStorage.getItem("ultimoEnvio")) || 0;
let intervalo;

// 🔍 obtener data del usuario (VIP / BAN)
async function getUsuarioData(email){
    const snap = await getDocs(collection(db,"usuarios"));
    let user = snap.docs.find(doc=>doc.data().email === email);
    return user ? user.data() : null;
}

// validar suscriptor
async function esSuscriptor(email){
    const snap = await getDocs(collection(db,"suscriptores"));
    return snap.docs.some(doc=>doc.data().email === email);
}

// filtro fuerte
function mensajeValido(texto){
    let t = texto.toLowerCase();

    if(t.includes("http") || t.includes("www") || t.includes(".com") || t.includes(".net")) return false;
    if(/\d{7,}/.test(t)) return false;
    if(t.replace(/\s/g,"").includes("www")) return false;

    return true;
}

// cooldown visual
function iniciarCooldown(tiempoInicial = tiempoEspera){
    let t = tiempoInicial;
    let el = document.getElementById("cooldown");

    clearInterval(intervalo);

    intervalo = setInterval(()=>{
        t--;
        el.innerText = "Puedes enviar en " + t + "s";

        if(t <= 0){
            clearInterval(intervalo);
            el.innerText = "";
        }
    },1000);
}

// restaurar cooldown
window.addEventListener("load", ()=>{
    let ahora = Date.now();
    let restante = tiempoEspera - Math.floor((ahora - ultimoEnvio)/1000);

    if(restante > 0){
        iniciarCooldown(restante);
    }
});

// realtime chat
const q = query(collection(db,"chat"), orderBy("fecha"));

onSnapshot(q,(snap)=>{
    let chat = document.getElementById("chatBox");
    chat.innerHTML = "";

    snap.forEach(d=>{
        let m = d.data();

        let color = "#fff";
        if(m.tipo === "artista") color = "#00ffcc";
        if(m.tipo === "vip") color = "#ffd700";

        chat.innerHTML += `
        <div class="msg" style="color:${color}">
        <b>${m.usuario}</b>: ${m.texto}
        </div>`;
    });

    chat.scrollTop = chat.scrollHeight;
});

// enviar mensaje
window.enviarMensaje = async function(){

    let ahora = Date.now();

    if(ahora - ultimoEnvio < tiempoEspera * 1000){
        alert("Espera ⏱️");
        return;
    }

    let texto = document.getElementById("mensajeInput").value.trim();
    let usuario = localStorage.getItem("usuario");

    if(!usuario){
        alert("Inicia sesión");
        return;
    }

    let suscriptor = await esSuscriptor(usuario);
    if(!suscriptor){
        alert("Solo suscriptores");
        return;
    }

    let data = await getUsuarioData(usuario);

    // 🚫 BAN
    if(data && data.ban){
        let ahora = Date.now();

        if(ahora < data.banHasta){
            alert("Baneado hasta: " + new Date(data.banHasta).toLocaleString());
            return;
        }
    }

    if(!texto) return;

    if(!mensajeValido(texto)){
        alert("No se permiten links ni números");
        return;
    }

    let tipo = "user";

    if(data && data.vip) tipo = "vip";

    // 👑 artista (puedes cambiar este correo)
    if(usuario === "TU_CORREO_AQUI@gmail.com"){
        tipo = "artista";
    }

    await addDoc(collection(db,"chat"),{
        usuario,
        texto,
        tipo,
        fecha: serverTimestamp()
    });

    document.getElementById("mensajeInput").value = "";

    ultimoEnvio = Date.now();
    localStorage.setItem("ultimoEnvio", ultimoEnvio);

    iniciarCooldown();
};

/* ================= TIENDA ================= */

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

async function cargarProductos(){
    let c = document.getElementById("productos");
    c.innerHTML="";

    let snap = await getDocs(collection(db,"productos"));

    snap.forEach(doc=>{
        let p = doc.data();

        c.innerHTML += `
        <div class="product">
        <img src="${p.imagen}">
        <p>${p.nombre}</p>
        <p>$${p.precio}</p>

        <select id="t-${doc.id}">
        <option>S</option><option>M</option><option>L</option>
        </select>

        <select id="c-${doc.id}">
        <option>Rojo</option><option>Negro</option>
        </select>

        <button onclick="agregar('${p.nombre}',${p.precio},'t-${doc.id}','c-${doc.id}')">Comprar</button>
        </div>`;
    });
}

window.agregar = function(n,p,t,c){
    carrito.push({
        nombre:n,
        precio:p,
        talla:document.getElementById(t).value,
        color:document.getElementById(c).value
    });
    localStorage.setItem("carrito",JSON.stringify(carrito));
    mostrar();
}

window.eliminar = function(i){
    carrito.splice(i,1);
    localStorage.setItem("carrito",JSON.stringify(carrito));
    mostrar();
}

function mostrar(){
    let ul = document.getElementById("carrito");
    ul.innerHTML="";
    let total=0;

    carrito.forEach((p,i)=>{
        ul.innerHTML+=`
        <li>${p.nombre} $${p.precio}
        <button onclick="eliminar(${i})">❌</button></li>`;
        total+=p.precio;
    });

    document.getElementById("total").innerText=total;
}

window.pagar = async function(){
    if(carrito.length===0){
        alert("Carrito vacío ❌");
        return;
    }

    await addDoc(collection(db,"compras"),{
        productos:carrito,
        fecha:new Date()
    });

    carrito=[];
    localStorage.removeItem("carrito");
    mostrar();
    alert("Compra OK");
}

document.getElementById("year").innerText=new Date().getFullYear();

cargarProductos();
mostrar();

</script>

</body>
</html>
