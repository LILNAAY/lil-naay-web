<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda LIL NAAY</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

body {
    background: radial-gradient(circle at top, rgba(255,0,0,0.18), transparent 50%),
                radial-gradient(circle at bottom, rgba(255,0,0,0.08), transparent 60%),
                #070707;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}

/* NAV */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    background: rgba(10, 0, 0, 0.7);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,0,0,0.2);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
}

.navbar h2 {
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: 0.5px;
    background: linear-gradient(45deg, #ff1a1a, #ff6666);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.navbar button {
    background: linear-gradient(135deg, #cc0000, #ff1a1a);
    border: none;
    color: white;
    padding: 8px 16px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
    font-size: 0.85rem;
}

.navbar button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 0, 0, 0.5);
}

/* TABS */
.tabs {
    display: flex;
    gap: 8px;
    padding: 10px 20px;
    background: rgba(5, 5, 5, 0.6);
    overflow-x: auto;
    border-bottom: 1px solid rgba(255,255,255,0.03);
}

.tabs button {
    background: rgba(20, 20, 20, 0.6);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 8px 16px;
    color: #ccc;
    font-size: 0.85rem;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s ease;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
}

.tabs button:hover {
    color: white;
    border-color: rgba(255,0,0,0.4);
    background: rgba(255,0,0,0.05);
}

.tabs button.active {
    background: linear-gradient(135deg, #cc0000, #ff3333);
    color: white;
    border: none;
    box-shadow: 0 0 20px rgba(204, 0, 0, 0.4);
}

/* CONTENT */
.content {
    flex: 1; 
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    overflow-y: auto;
}

.section { display: none; }
.section.active { display: block; }

/* PANEL DE ADMINISTRACIÓN */
.admin-panel {
    background: rgba(20, 0, 0, 0.5);
    border: 1px solid rgba(255, 0, 0, 0.3);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 20px;
}

/* LISTAS DE ELEMENTOS */
.items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    margin-top: 15px;
}

.card-media {
    background: rgba(15, 15, 15, 0.6);
    padding: 12px;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
}

.card-media img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 10px;
}

.card-media h4 {
    font-size: 0.95rem;
    margin-bottom: 4px;
}

.card-media p {
    color: #ff4d4d;
    font-size: 0.85rem;
    margin-bottom: 8px;
}

/* PRODUCTOS */
.store {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-top: 15px;
}

.product {
    background: rgba(15, 15, 15, 0.6);
    padding: 12px;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(8px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
}

.product:hover {
    transform: translateY(-3px);
    border-color: rgba(255,0,0,0.5);
    box-shadow: 0 10px 30px rgba(255, 0, 0, 0.15);
}

.product img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 10px;
}

.product h4 {
    font-size: 0.95rem;
    margin-bottom: 4px;
    font-weight: 600;
}

.product p {
    color: #ff4d4d;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 10px;
}

.product button {
    background: rgba(255,0,0,0.15);
    border: 1px solid rgba(255,0,0,0.3);
    color: white;
    padding: 8px;
    border-radius: 8px;
    font-weight: 600;
    margin-top: auto;
    cursor: pointer;
    transition: background 0.2s;
    font-size: 0.85rem;
}

.product button:hover {
    background: #cc0000;
    box-shadow: 0 0 12px rgba(204, 0, 0, 0.4);
}

/* CARRITO */
.cart-section {
    background: rgba(15, 15, 15, 0.5);
    padding: 20px;
    border-radius: 16px;
    margin-top: 25px;
    border: 1px solid rgba(255,255,255,0.04);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
}

.cart-section h3 {
    margin-bottom: 8px;
    font-size: 1rem;
}

.cart-section ul {
    list-style: none;
    max-height: 120px;
    overflow-y: auto;
    margin-bottom: 12px;
    padding-right: 4px;
}

.cart-section li {
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    color: #ddd;
}

.remove-btn {
    background: rgba(204, 0, 0, 0.3);
    border: 1px solid #cc0000;
    color: white;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: background 0.2s;
}

.remove-btn:hover {
    background: #cc0000;
}

/* PERFIL */
.profile {
    background: rgba(15, 15, 15, 0.6);
    padding: 25px;
    border-radius: 18px;
    max-width: 400px;
    border: 1px solid rgba(255,0,0,0.2);
    box-shadow: 0 10px 35px rgba(255, 0, 0, 0.15);
    margin: 0 auto;
    text-align: center;
    backdrop-filter: blur(10px);
}

.profile-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #ff1a1a;
    margin: 0 auto 12px auto;
    display: block;
    box-shadow: 0 0 15px rgba(255,0,0,0.3);
}

.input-field {
    width: 90%;
    padding: 8px 12px;
    margin: 6px 0;
    background: rgba(10, 10, 10, 0.8);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
    border-radius: 8px;
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
    font-size: 0.85rem;
}

.input-field:focus {
    border-color: #ff3333;
}

.btn-action {
    background: linear-gradient(135deg, #cc0000, #ff3333);
    color: white;
    padding: 9px 14px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    margin-top: 8px;
    transition: all 0.25s;
    width: 90%;
    box-shadow: 0 4px 15px rgba(204, 0, 0, 0.2);
    font-size: 0.85rem;
}

.btn-action:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(204, 0, 0, 0.4);
}

/* CHAT KICK */
.chat-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(135deg, #cc0000, #ff1a1a);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 1000;
    box-shadow: 0 6px 20px rgba(255,0,0,0.5);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.chat-toggle:hover {
    transform: scale(1.1) rotate(5deg);
    box-shadow: 0 10px 25px rgba(255,0,0,7);
}

.chat-box {
    position: fixed;
    bottom: 85px;
    right: 20px;
    width: 320px;
    height: 420px;
    background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(16px);
    border-radius: 16px;
    display: none;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
    border: 1px solid rgba(255,0,0,0.3);
    z-index: 999;
}

@media (max-width: 768px) {
    .chat-box {
        width: 100%;
        height: 80%;
        bottom: 0;
        right: 0;
        border-radius: 16px 16px 0 0;
    }
}

.chat-header {
    background: rgba(20, 0, 0, 0.9);
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    font-weight: 700;
    font-size: 0.9rem;
    border-bottom: 1px solid rgba(255,0,0,0.2);
}

.online { 
    color: #00ff66; 
    font-size: 11px; 
    font-weight: 600; 
    background: rgba(0, 255, 102, 0.1);
    padding: 2px 8px;
    border-radius: 12px;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* BURBUJAS */
.msg {
    width: 100%;
    padding: 8px 12px;
    background: rgba(20, 20, 20, 0.6);
    border-radius: 8px;
    font-size: 0.8rem;
    color: #eee;
    border-left: 4px solid #666;
    transition: transform 0.2s, background 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.msg:hover {
    background: rgba(30, 30, 30, 0.8);
}

.msg-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
}

.avatar-chat {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.2);
}

.username {
    font-weight: 700;
    font-size: 0.8rem;
}

/* Insignias */
.badge {
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 800;
    text-transform: uppercase;
}

.badge-admin { background: #ff1a1a; color: white; border: 1px solid #ff4d4d; }
.badge-mod { background: #00e676; color: white; border: 1px solid #69f0ae; }
.badge-vip { background: #ffaa00; color: white; border: 1px solid #ffd700; }
.badge-user { background: #555; color: white; }

.role-admin { border-left-color: #ff1a1a; }
.role-mod { border-left-color: #00e676; }
.role-vip { border-left-color: #ffaa00; }
.role-user { border-left-color: #666; }

.msg-text {
    word-break: break-word;
    color: #ddd;
}

/* MODAL */
.modal-perfil {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(12, 12, 12, 0.95);
    backdrop-filter: blur(20px);
    border: 2px solid rgba(255,0,0,0.5);
    padding: 20px;
    border-radius: 18px;
    z-index: 2000;
    width: 280px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(255, 0, 0, 0.4);
    display: none;
}

.modal-perfil img {
    width: 75px;
    height: 75px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #ff1a1a;
    margin-bottom: 12px;
    box-shadow: 0 0 15px rgba(255,0,0,0.4);
}

.modal-perfil h4 {
    margin-bottom: 8px;
    color: #ff3333;
    font-size: 1.1rem;
}

.modal-perfil p { font-size: 0.8rem; margin: 4px 0; color: #ccc; }

.modal-close-btn {
    background: rgba(255, 255, 255, 0.1);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.15);
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 14px;
    font-weight: 600;
    transition: all 0.2s;
    font-size: 0.8rem;
}

.modal-close-btn:hover {
    background: rgba(255, 255, 255, 0.18);
    border-color: rgba(255,255,255,0.3);
}

.chat-input {
    display: flex;
    border-top: 1px solid rgba(255,255,255,0.1);
    background: rgba(5, 5, 5, 0.95);
    padding: 8px;
    gap: 6px;
}

.chat-input input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(10, 10, 10, 0.8);
    color: white;
    border-radius: 8px;
    outline: none;
    font-size: 0.8rem;
}

.chat-input input:focus {
    border-color: #ff3333;
}

.chat-input button {
    background: linear-gradient(135deg, #cc0000, #ff1a1a);
    border: none;
    padding: 6px 14px;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.2s;
}

.chat-input button:hover {
    opacity: 0.9;
}

#noti {
    position: fixed;
    top: 15px;
    right: 15px;
    background: linear-gradient(135deg, #cc0000, #ff1a1a);
    padding: 10px 16px;
    border-radius: 8px;
    display: none;
    z-index: 1001;
    font-weight: 600;
    box-shadow: 0 10px 25px rgba(204, 0, 0, 0.5);
    font-size: 0.85rem;
}

.footer { text-align: center; padding: 12px; background: rgba(5, 5, 5, 0.8); margin-top: auto; color: #555; font-size: 0.75rem; }
</style>
</head>

<body>

<div id="noti">🔔 Nuevo mensaje</div>

<div class="navbar">
    <h2>🔥 LIL NAAY</h2>
    <a href="index.html"><button>⬅ Volver</button></a>
</div>

<div class="tabs">
    <button class="active" onclick="mostrar('tienda', this)">🛍️ Tienda</button>
    <button onclick="mostrar('musica', this)">🎵 Música</button>
    <button onclick="mostrar('eventos', this)">🎉 Eventos</button>
    <button onclick="mostrar('perfil', this)">👤 Perfil</button>
</div>

<div class="content">
    <div id="tienda" class="section active">
        <h2>Productos</h2>
        <div class="store" id="productos"></div>

        <div class="cart-section">
            <h3>🛒 Carrito</h3>
            <ul id="carrito"></ul>
            <h3>Total: $<span id="total">0</span></h3>
            <button class="btn-action" onclick="pagar()">Pagar</button>
        </div>
    </div>

    <div id="musica" class="section">
        <h2>🎵 Música</h2>
        <div class="admin-panel" id="panelMusicaAdmin" style="display:none;">
            <h4>➕ Agregar nueva música</h4>
            <input type="text" id="musicTitle" class="input-field" placeholder="Título de la canción" style="width:100%; margin:4px 0 10px;">
            <label style="font-size: 11px; color:#ff3333;">Portada de la canción:</label>
            <input type="file" id="musicCoverFile" accept="image/*" style="margin:4px 0 10px; display:block;">
            <label style="font-size: 11px; color:#ff3333;">Archivo de audio (mp3):</label>
            <input type="file" id="musicAudioFile" accept="audio/*" style="margin:4px 0 10px; display:block;">
            <button class="btn-action" onclick="subirMusicaBase64()">Subir Música</button>
        </div>
        <div class="items-grid" id="listaMusica"></div>
    </div>

    <div id="eventos" class="section">
        <h2>🎉 Eventos</h2>
        <div class="admin-panel" id="panelEventosAdmin" style="display:none;">
            <h4>➕ Crear nuevo evento</h4>
            <input type="text" id="eventTitle" class="input-field" placeholder="Nombre del evento" style="width:100%; margin:4px 0 6px;">
            <input type="text" id="eventLocation" class="input-field" placeholder="Lugar / Ciudad" style="width:100%; margin:4px 0 6px;">
            <input type="date" id="eventDate" class="input-field" style="width:100%; margin:4px 0 10px;">
            <label style="font-size: 11px; color:#ff3333;">Imagen o Banner del evento:</label>
            <input type="file" id="eventImageFile" accept="image/*" style="margin:6px 0 10px; display:block;">
            <button class="btn-action" onclick="subirEventoBase64()">Crear Evento</button>
        </div>
        <div class="items-grid" id="listaEventos"></div>
    </div>

    <div id="perfil" class="section">
        <h2>👤 Perfil</h2>
        <br>
        <div class="profile" id="perfilData">Cargando perfil...</div>
    </div>
</div>

<div id="userModal" class="modal-perfil">
    <div id="modalContent"></div>
    <button class="modal-close-btn" onclick="cerrarModal()">Cerrar</button>
</div>

<button class="chat-toggle" onclick="toggleChat()">💬</button>

<div class="chat-box" id="chatBoxDrag">
    <div class="chat-header">
        <span>💬 Chat en vivo</span>
        <span class="online" id="onlineCount">0 online</span>
    </div>

    <div id="chatBox" class="chat-messages"></div>

    <div class="chat-input">
        <input id="mensajeInput" placeholder="Escribe..." autocomplete="off">
        <button onclick="enviarMensaje()">➤</button>
    </div>
</div>

<div class="footer">© 2026 LIL NAAY</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore, collection, getDocs, addDoc,
    onSnapshot, query, orderBy, serverTimestamp,
    where, doc, setDoc, deleteDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
    apiKey: "TU_API_KEY_AQUI",
    authDomain: "lil-naay.firebaseapp.com",
    projectId: "lil-naay",
    storageBucket: "lil-naay.appspot.com"
});

const db = getFirestore(app);

window.mostrar = (sec, btn) => {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
    
    document.getElementById(sec).classList.add("active");
    if(btn) btn.classList.add("active");
}

/* CARGAR PANELES ADMINISTRADOR */
window.checkAdmin = async (email) => {
    if (!email) return;
    const q = query(collection(db, "usuarios"), where("email", "==", email), where("admin", "==", true));
    const snap = await getDocs(q);

    if (!snap.empty) {
        document.getElementById("panelMusicaAdmin").style.display = "block";
        document.getElementById("panelEventosAdmin").style.display = "block";
    }
}

async function obtenerPerfil(email){
    if(!email) return null;
    const q = query(collection(db, "usuarios"), where("email", "==", email));
    const snap = await getDocs(q);
    return snap.empty ? null : { id: snap.docs[0].id, ...snap.docs[0].data() };
}

// Inicialización del estado de presencia del usuario
let presenciaRef = null;

window.cargarPerfil = async () => {
    if(!localStorage.getItem("usuario")) {
        localStorage.setItem("usuario", "diciembre2025.12.31@gmail.com");
    }
    
    let email = localStorage.getItem("usuario");
    if (!email) {
        document.getElementById("perfilData").innerHTML = `<p>No hay sesión iniciada.</p>`;
        return;
    }

    checkAdmin(email);

    // Registramos la entrada del usuario en "online" de forma persistente
    let usuarioObj = await obtenerPerfil(email);
    let username = usuarioObj ? usuarioObj.username : email.split('@')[0];
    
    const docRef = doc(db, "online", email.replace(/[.@]/g, '_'));
    await setDoc(docRef, {
        email: email,
        usuario: username,
        ultimaConexion: Date.now()
    });
    presenciaRef = docRef; // Guardamos la referencia para removerlo si sale

    // Si el usuario cierra o cambia de página, lo removemos de online
    window.addEventListener("beforeunload", async () => {
        if(presenciaRef) {
            await deleteDoc(presenciaRef);
        }
    });

    // Periódicamente actualizamos "última conexión" para comprobar si siguen en la web
    setInterval(async () => {
        if(presenciaRef) {
            await setDoc(presenciaRef, {
                email: email,
                usuario: username,
                ultimaConexion: Date.now()
            }, { merge: true });
        }
    }, 5000);

    let data = await obtenerPerfil(email);
    let defaultAvatar = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

    document.getElementById("perfilData").innerHTML = `
        <img src="${data?.fotoPerfil || defaultAvatar}" class="profile-avatar" alt="Foto de perfil">
        <p><b>Usuario:</b> ${data?.username || email.split('@')[0]}</p>
        <p><b>Email:</b> ${email}</p>
        <p><b>Rol:</b> ${data?.admin ? "ADMIN" : data?.mod ? "MOD" : data?.vip ? "VIP" : "USER"}</p>
        
        <label style="font-size:11px;">Nombre a mostrar:</label><br>
        <input type="text" id="inputUsername" class="input-field" value="${data?.username || email.split('@')[0]}" placeholder="Nombre"><br>

        <label style="font-size:11px;">País:</label><br>
        <input type="text" id="inputPais" class="input-field" value="${data?.pais || ''}" placeholder="País"><br>
        
        <label style="font-size:11px;">Ciudad:</label><br>
        <input type="text" id="inputCiudad" class="input-field" value="${data?.ciudad || ''}" placeholder="Ciudad"><br>

        <input type="file" id="fotoInput" accept="image/*" style="display:none" onchange="subirFotoBase64()">
        <button class="btn-action" onclick="document.getElementById('fotoInput').click()">📷 Cambiar Imagen</button>
        <button class="btn-action" style="background: linear-gradient(135deg, #006622, #009933);" onclick="guardarDatosPerfil()">Guardar Cambios</button>
    `;
}

window.guardarDatosPerfil = async () => {
    let email = localStorage.getItem("usuario");
    if (!email) return alert("Inicia sesión primero");

    let username = document.getElementById("inputUsername").value;
    let pais = document.getElementById("inputPais").value;
    let ciudad = document.getElementById("inputCiudad").value;
    
    let userDoc = await obtenerPerfil(email);

    if (userDoc) {
        await updateDoc(doc(db, "usuarios", userDoc.id), {
            username: username,
            pais: pais,
            ciudad: ciudad
        });
    } else {
        await addDoc(collection(db, "usuarios"), {
            email: email,
            username: username,
            pais: pais,
            ciudad: ciudad,
            fotoPerfil: null
        });
    }
    alert("Datos actualizados con éxito.");
    cargarPerfil();
}

window.subirFotoBase64 = async () => {
    let fileInput = document.getElementById("fotoInput");
    let file = fileInput.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async function(e) {
        let url = e.target.result;
        let email = localStorage.getItem("usuario");
        let userDoc = await obtenerPerfil(email);

        if (!userDoc) {
            await addDoc(collection(db, "usuarios"), {
                email: email,
                username: email.split('@')[0],
                fotoPerfil: url
            });
        } else {
            await setDoc(doc(db, "usuarios", userDoc.id), { fotoPerfil: url }, { merge: true });
        }
        alert("Foto actualizada con éxito.");
        cargarPerfil();
    };
    reader.readAsDataURL(file);
}

/* MÚSICA */
window.subirMusicaBase64 = async () => {
    const title = document.getElementById("musicTitle").value.trim();
    const coverFile = document.getElementById("musicCoverFile").files[0];
    const audioFile = document.getElementById("musicAudioFile").files[0];

    if (!title || !coverFile || !audioFile) {
        return alert("Por favor, rellena todos los campos y selecciona los dos archivos.");
    }

    let readerCover = new FileReader();
    let readerAudio = new FileReader();

    readerCover.onload = function(e1) {
        let coverBase64 = e1.target.result;
        
        readerAudio.onload = async function(e2) {
            let audioBase64 = e2.target.result;

            await addDoc(collection(db, "musica"), {
                titulo: title,
                portada: coverBase64,
                audio: audioBase64,
                fecha: serverTimestamp()
            });

            alert("🎵 Canción subida correctamente.");
            document.getElementById("musicTitle").value = "";
            document.getElementById("musicCoverFile").value = "";
            document.getElementById("musicAudioFile").value = "";
            cargarMusica();
        };
        readerAudio.readAsDataURL(audioFile);
    };
    readerCover.readAsDataURL(coverFile);
}

async function cargarMusica() {
    const lista = document.getElementById("listaMusica");
    lista.innerHTML = "";

    const snap = await getDocs(collection(db, "musica"));
    if (snap.empty) {
        lista.innerHTML = `<p style="color:#666; margin: 10px;">No hay música disponible actualmente.</p>`;
        return;
    }

    snap.forEach(doc => {
        let m = doc.data();
        lista.innerHTML += `
            <div class="card-media">
                <img src="${m.portada}" alt="Portada">
                <h4>${m.titulo}</h4>
                <audio controls style="width:100%; margin-top:5px; height: 32px;" src="${m.audio}"></audio>
            </div>
        `;
    });
}

/* EVENTOS */
window.subirEventoBase64 = async () => {
    const titulo = document.getElementById("eventTitle").value.trim();
    const lugar = document.getElementById("eventLocation").value.trim();
    const fechaEvento = document.getElementById("eventDate").value;
    const bannerFile = document.getElementById("eventImageFile").files[0];

    if (!titulo || !lugar || !fechaEvento || !bannerFile) {
        return alert("Por favor, completa todos los campos del evento.");
    }

    let readerBanner = new FileReader();
    readerBanner.onload = async function(e) {
        let bannerBase64 = e.target.result;

        await addDoc(collection(db, "eventos"), {
            titulo: titulo,
            lugar: lugar,
            fechaEvento: fechaEvento,
            banner: bannerBase64,
            fechaSubida: serverTimestamp()
        });

        alert("🎉 Evento creado exitosamente.");
        document.getElementById("eventTitle").value = "";
        document.getElementById("eventLocation").value = "";
        document.getElementById("eventDate").value = "";
        document.getElementById("eventImageFile").value = "";
        cargarEventos();
    };

}

async function cargarEventos() {
    const lista = document.getElementById("listaEventos");
    lista.innerHTML = "";

    const snap = await getDocs(collection(db, "eventos"));
    if (snap.empty) {
        lista.innerHTML = `<p style="color:#666; margin: 10px;">No hay eventos disponibles por ahora.</p>`;

/* CHAT */
window.enviarMensaje = async () => {
    let input = document.getElementById("mensajeInput");
    if (!input.value.trim()) return;

    let email = localStorage.getItem("usuario") || "diciembre2025.12.31@gmail.com";
    let usuarioObj = await obtenerPerfil(email);
    let username = usuarioObj ? usuarioObj.username : email.split('@')[0];

    try {
        await addDoc(collection(db, "chat"), {
            usuario: username,
            texto: input.value,
            email: email,
            fotoPerfil: usuarioObj ? usuarioObj.fotoPerfil : "",
            fecha: serverTimestamp()
        });
        input.value = "";
    } catch (e) {
        console.error("Error al enviar mensaje:", e);
    }
}

// Cargar mensajes y controlar usuarios en tiempo real
onSnapshot(query(collection(db, "chat"), orderBy("fecha")), async (snap) => {
    let chat = document.getElementById("chatBox");
    if(!chat) return;
    chat.innerHTML = "";
    
    let email = localStorage.getItem("usuario") || "diciembre2025.12.31@gmail.com";
    let defaultAvatar = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

    snap.forEach(d => {
        let m = d.data();
        let div = document.createElement("div");
        
        let rolClass = "role-user";
        let badgeHtml = `<span class="badge badge-user">User</span>`;

        // Añadimos clases según rol
        if (m.rol === "admin") {
            rolClass = "role-admin";
            badgeHtml = `<span class="badge badge-admin">ADMIN</span>`;
        }
        
        div.className = `msg ${rolClass}`;
        let fotoMostrada = m.fotoPerfil || defaultAvatar;

        div.onclick = () => mostrarModalPerfil(m.usuario, fotoMostrada, '', '', m.email);

        div.innerHTML = `
            <div class="msg-header">
                <img src="${fotoMostrada}" class="avatar-chat">
                <span class="username">${m.usuario}</span>
                ${badgeHtml}
            </div>
            <div class="msg-text">${m.texto}</div>
        `;
        chat.appendChild(div);
    });
    
    chat.scrollTop = chat.scrollHeight;
});

// Detectar cambios en la lista de usuarios online en Firestore
onSnapshot(collection(db, "online"), (snap) => {
    let now = Date.now();
    let usuariosActivos = [];
    
    snap.forEach(doc => {
        let data = doc.data();
        // Contamos solo si su última conexión fue hace menos de 10 segundos
        if (now - data.ultimaConexion < 10000) {
            usuariosActivos.push(data);
        }
    });

    document.getElementById("onlineCount").innerText = `${usuariosActivos.length} online`;
});

window.mostrarModalPerfil = (usuario, foto, pais, ciudad, email) => {
    const modal = document.getElementById("userModal");
    const content = document.getElementById("modalContent");
    const defaultAvatar = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
    
    content.innerHTML = `
        <img src="${foto || defaultAvatar}" alt="Avatar">
        <h4>${usuario}</h4>
        <p><b>Email:</b> ${email}</p>
        <p><b>País:</b> ${pais || 'No especificado'}</p>
        <p><b>Ciudad:</b> ${ciudad || 'No especificada'}</p>
    `;
    modal.style.display = "block";
}

window.cerrarModal = () => {
    document.getElementById("userModal").style.display = "none";
}

window.toggleChat = () => {
    let box = document.getElementById("chatBoxDrag");
    box.style.display = box.style.display === "flex" ? "none" : "flex";
}

/* TIENDA Y CARRITO */
let carrito = [];

window.agregar = (nombre, precio) => {
    carrito.push({ nombre, precio });
    actualizarCarrito();
    alert(`${nombre} añadido al carrito.`);
}

window.removerDelCarrito = (index) => {
    carrito.splice(index, 1);
    actualizarCarrito();
}

function actualizarCarrito() {
    let lista = document.getElementById("carrito");
    let totalSpan = document.getElementById("total");
    lista.innerHTML = "";
    let total = 0;

    carrito.forEach((item, index) => {
        total += item.precio;
        lista.innerHTML += `
            <li>
                ${item.nombre} - $${item.precio}
                <button class="remove-btn" onclick="removerDelCarrito(${index})">X</button>
            </li>`;
    });

    totalSpan.innerText = total;
}

window.pagar = () => {
    if(carrito.length === 0) return alert("Tu carrito está vacío.");
    alert(`¡Pago completado con éxito! Total pagado: $${document.getElementById("total").innerText}`);
    carrito = [];
    actualizarCarrito();
}

// Inicialización
cargarProductos();
cargarMusica();
cargarEventos();
cargarPerfil();

</script>
