<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tienda</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
}

.section {
    padding: 20px;
}

.product {
    background: #222;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
}

button {
    background: red;
    color: white;
    padding: 10px;
    border: none;
    cursor: pointer;
}

.carrito-box {
    background: #222;
    padding: 15px;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="section">
<h2>🛒 Carrito</h2>
<ul id="carrito"></ul>
<p>Total: $<span id="total">0</span></p>
</div>

<div class="section">
<h2>Tienda</h2>

<div class="product">
<p>Hoodie LIL NAAY - $25</p>
<button onclick="agregar('Hoodie',25)">Comprar</button>
</div>

<div class="product">
<p>T-Shirt LIL NAAY - $15</p>
<button onclick="agregar('T-Shirt',15)">Comprar</button>
</div>

</div>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
let total = 0;

carrito.forEach(item => total += item.precio);

function guardar() {
    localStorage.setItem("carrito", JSON.stringify(carrito));
}

function agregar(nombre, precio) {
    carrito.push({nombre, precio});
    total += precio;
    guardar();
    mostrar();
}

function mostrar() {
    let lista = document.getElementById("carrito");
    lista.innerHTML = "";

    carrito.forEach((item, i) => {
        lista.innerHTML += `
        <li>${item.nombre} - $${item.precio}
        <button onclick="eliminar(${i})">X</button></li>`;
    });

    document.getElementById("total").textContent = total;
}

function eliminar(i) {
    total -= carrito[i].precio;
    carrito.splice(i,1);
    guardar();
    mostrar();
}

window.onload = mostrar;
</script>

</body>
</html>
