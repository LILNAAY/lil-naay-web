<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda LIL NAAY</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}

body{
background:#0a0a0a;
color:white;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* NAV */
.navbar{
display:flex;
justify-content:space-between;
padding:15px 25px;
background:#120000;
}

.navbar button{
background:#ff0000;
border:none;
color:white;
padding:8px 15px;
border-radius:8px;
cursor:pointer;
}

/* TABS */
.tabs{
display:flex;
gap:10px;
padding:15px 20px;
}

.tabs button{
background:#1a1a1a;
border:none;
padding:10px 15px;
color:white;
border-radius:8px;
cursor:pointer;
}

.tabs button:hover{
background:#ff000020;
}

/* CONTENT */
.content{flex:1;padding:20px;}
.section{display:none;}
.active{display:block;}

/* PRODUCTOS */
.store{display:flex;flex-wrap:wrap;gap:20px;}
.product{background:#111;padding:15px;border-radius:12px;width:200px;}
.product img{width:100%;border-radius:10px;}

/* PERFIL */
.profile{background:#111;padding:20px;border-radius:12px;max-width:400px;}

/* EVENT */
.event{background:#111;padding:15px;border-radius:12px;margin-bottom:10px;}

/* CHAT */
.chat-toggle{
position:fixed;bottom:20px;right:20px;
background:#ff0000;border:none;color:white;
padding:12px;border-radius:50%;cursor:pointer;
}

.chat-box{
position:fixed;bottom:80px;right:20px;
width:320px;height:420px;
background:#0d0d0d;
border-radius:15px;
display:none;
flex-direction:column;
overflow:hidden;
box-shadow:0 0 25px rgba(255,0,0,0.4);
}

.chat-header{
background:#1a0000;
padding:10px;
display:flex;
justify-content:space-between;
}

.online{color:#0f0;font-size:12px;}

.chat-messages{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:6px;
}

/* BURBUJAS */
.msg{
max-width:75%;
padding:8px 12px;
border-radius:12px;
font-size:13px;
}

.me{background:#ff0000;align-self:flex-end;}
.other{background:#222;align-self:flex-start;}

.chat-user{
font-size:10px;
opacity:0.6;
margin-bottom:2px;
}

/* INPUT */
.chat-input{display:flex;border-top:1px solid #222;}
.chat-input input{flex:1;padding:10px;border:none;background:#111;color:white;}
.chat-input button{background:red;border:none;padding:10px;color:white;}

/* NOTI */
#noti{
position:fixed;
top:20px;
right:20px;
background:red;
padding:10px;
border-radius:8px;
display:none;
}

/* FOOTER */
.footer{text-align:center;padding:15px;background:#0d0d0d;margin-top:auto;}
</style>
</head>

<body>

<div id="noti">🔔 Nuevo mensaje</div>

<div class="navbar">
<h2>🔥 LIL NAAY</h2>
<a href="index.html"><button>⬅ Volver</button></a>
</div>

<div class="tabs">
<button onclick="mostrar('tienda')">🛍️ Tienda</button>
<button onclick="mostrar('musica')">🎵 Música</button>
<button onclick="mostrar('eventos')">🎉 Eventos</button>
<button onclick="mostrar('perfil')">👤 Perfil</button>
</div>

<div class="content">

<div id="tienda" class="section active">
<h2>Productos</h2>
<div class="store" id="productos"></div>

<h3>🛒 Carrito</h3>
<ul id="carrito"></ul>
<h3>Total: $<span id="total">0</span></h3>
<button onclick="pagar()">Pagar</button>
</div>

<div id="musica" class="section">
<h2>🎵 Música</h2>
</div>

<div id="eventos" class="section">
<h2>🎉 Eventos</h2>
<div class="event">Próximamente 🔥</div>
</div>

<div id="perfil" class="section">
<h2>👤 Perfil</h2>
<div class="profile" id="perfilData"></div>
</div>

</div>

<button class="chat-toggle" onclick="toggleChat()">💬</button>

<div class="chat-box" id="chatBoxDrag">

<div class="chat-header">
<span>💬 Chat</span>
<span class="online" id="onlineCount">0 online</span>
</div>

<div id="chatBox" class="chat-messages"></div>

<div class="chat-input">
<input id="mensajeInput" placeholder="Escribe...">
<button onclick="enviarMensaje()">➤</button>
</div>

</div>

<div class="footer">© 2026 LIL NAAY</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, getDocs, addDoc,
onSnapshot, query, orderBy, serverTimestamp,
doc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const db = getFirestore(app);

/* SECCIONES */
window.mostrar = sec=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(sec).classList.add("active");
}

/* PERFIL */
function cargarPerfil(){
let email = localStorage.getItem("usuario");
document.getElementById("perfilData").innerHTML = `Usuario: ${email}`;
}

/* CHAT */
let lastMsg="";
let lastTime=0;

/* ONLINE */
setInterval(async ()=>{
let email = localStorage.getItem("usuario");
if(!email) return;

await setDoc(doc(collection(db,"online"),email),{
time:Date.now()
});
},5000);

onSnapshot(collection(db,"online"),snap=>{
let count=0;
let now=Date.now();

snap.forEach(d=>{
if(now - d.data().time < 10000) count++;
});

onlineCount.innerText = count+" online";
});

/* MENSAJES */
const qChat = query(collection(db,"chat"), orderBy("fecha"));

onSnapshot(qChat,(snap)=>{
chatBox.innerHTML="";

let email = localStorage.getItem("usuario");

snap.forEach(d=>{
let m = d.data();

let div = document.createElement("div");
div.className = "msg " + (m.email===email ? "me":"other");

div.innerHTML = `
<div class="chat-user">${m.usuario}</div>
${m.texto}
`;

chatBox.appendChild(div);
});

/* NOTI */
let docs=snap.docs;
if(docs.length){
let ultimo=docs[docs.length-1].data();
if(ultimo.texto !== lastMsg){
noti.style.display="block";
setTimeout(()=>noti.style.display="none",2000);
lastMsg=ultimo.texto;
}
}

chatBox.scrollTop = chatBox.scrollHeight;
});

/* ENVIAR */
window.enviarMensaje = async ()=>{

let texto = mensajeInput.value.trim();
let email = localStorage.getItem("usuario");

if(!texto || !email) return;

/* ANTI SPAM */
if(texto === lastMsg && Date.now()-lastTime < 3000){
return alert("Spam 🚫");
}

lastMsg = texto;
lastTime = Date.now();

await addDoc(collection(db,"chat"),{
usuario:email,
email:email,
texto:texto,
fecha:serverTimestamp()
});

mensajeInput.value="";
}

/* ENTER */
mensajeInput.addEventListener("keypress",e=>{
if(e.key==="Enter") enviarMensaje();
});

/* TOGGLE */
window.toggleChat = ()=>{
chatBoxDrag.style.display =
chatBoxDrag.style.display==="flex"?"none":"flex";
}

/* TIENDA */
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

async function cargarProductos(){
productos.innerHTML="";

let snap = await getDocs(collection(db,"productos"));

snap.forEach(doc=>{
let p = doc.data();

productos.innerHTML+=`
<div class="product">
<img src="${p.imagen}">
<p>${p.nombre}</p>
<p>$${p.precio}</p>
<button onclick="agregar('${p.nombre}',${p.precio})">Comprar</button>
</div>`;
});
}

window.agregar=(n,p)=>{
carrito.push({nombre:n,precio:p});
localStorage.setItem("carrito",JSON.stringify(carrito));
mostrarCarrito();
}

function mostrarCarrito(){
let totalPrecio=0;
carrito.innerHTML="";

let ul=document.getElementById("carrito");
ul.innerHTML="";

carrito.forEach(p=>{
ul.innerHTML+=`<li>${p.nombre} $${p.precio}</li>`;
totalPrecio+=p.precio;
});

document.getElementById("total").innerText=totalPrecio;
}

window.pagar=async()=>{
if(carrito.length===0) return;

await addDoc(collection(db,"compras"),{
productos:carrito,
fecha:new Date()
});

carrito=[];
localStorage.removeItem("carrito");
mostrarCarrito();
alert("Compra realizada");
}

/* INIT */
cargarProductos();
mostrarCarrito();
cargarPerfil();

</script>

</body>
</html>
