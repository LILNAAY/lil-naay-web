<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda LIL NAAY</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
}

/* 🔥 FONDO */
.fondo{
    background: url('Fondopaisaje(1).png') no-repeat center;
    background-size: cover;
    height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    animation: aparecer 1s ease;
}

/* ✨ ANIMACIÓN */
@keyframes aparecer{
    from{opacity:0; transform: scale(1.1);}
    to{opacity:1; transform: scale(1);}
}

/* 🔙 VOLVER */
.volver{
    position:absolute;
    top:20px;
    left:20px;
    background:rgba(0,0,0,0.5);
    padding:10px 15px;
    border-radius:10px;
    color:white;
    text-decoration:none;
}

/* LOGO */
.logo{
    font-size:60px;
    margin-bottom:30px;
}

/* 🎮 BOTONES IMAGEN */
.btn-img{
    width:300px;
    margin:10px;
    cursor:pointer;
    transition:0.3s;
}

.btn-img:hover{
    transform: scale(1.1);
    filter: brightness(1.2);
}

.btn-img:active{
    transform: scale(0.95);
}

/* PANTALLAS */
.pantalla{
    display:none;
    padding:20px;
}

/* PRODUCTOS */
.store {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.product {
    background: #222;
    padding: 15px;
    border-radius: 10px;
}

.product img {
    width: 150px;
}

/* BOTONES */
button {
    margin-top: 10px;
    padding: 10px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
}

select {
    margin-top: 5px;
    padding: 5px;
    width: 100%;
}

/* VOLVER INTERNO */
.btn-volver{
    margin-top:20px;
}
</style>

</head>
<body>

<!-- 🔊 SONIDO -->
<audio id="clickSound" src="click.mp3"></audio>

<!-- 🔥 MENU -->
<div class="fondo">

    <a href="index.html" class="volver">⬅ Volver</a>

    <h1 class="logo">LIL NAAY</h1>

    <div class="menu-principal">
        <img src="botontienda.png" class="btn-img" onclick="irSeccion('tienda')">
        <img src="botonevento.png" class="btn-img" onclick="irSeccion('eventos')">
    </div>

</div>

<!-- 🎤 EVENTOS -->
<div id="eventos" class="pantalla">

<h1>🎤 Eventos</h1>

<div class="store" id="listaEventos"></div>

<button onclick="volverMenu()" class="btn-volver">⬅ Volver</button>

</div>

<!-- 🛍️ TIENDA -->
<div id="tienda" class="pantalla">

<h1>🛍️ Tienda</h1>

<div class="store" id="listaProductos"></div>

<h2>🛒 Carrito</h2>
<ul id="carrito"></ul>
<h3>Total: $<span id="total">0</span></h3>

<button onclick="pagar()">Pagar</button>
<button onclick="volverMenu()" class="btn-volver">⬅ Volver</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
  authDomain: "lil-naay.firebaseapp.com",
  projectId: "lil-naay"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

// 🔊 SONIDO + CAMBIO
window.irSeccion = function(seccion){
    let audio = document.getElementById("clickSound");
    if(audio) audio.play();

    mostrarSeccion(seccion);
}

// 🔄 CAMBIAR SECCIÓN
window.mostrarSeccion = function(seccion){
    document.querySelector(".fondo").style.display = "none";
    document.getElementById("eventos").style.display = "none";
    document.getElementById("tienda").style.display = "none";

    document.getElementById(seccion).style.display = "block";
}

// 🔙 VOLVER
window.volverMenu = function(){
    document.querySelector(".fondo").style.display = "flex";
    document.getElementById("eventos").style.display = "none";
    document.getElementById("tienda").style.display = "none";
}

// 📡 EVENTOS DINÁMICOS
async function cargarEventos(){
    const contenedor = document.getElementById("listaEventos");
    contenedor.innerHTML = "";

    const snap = await getDocs(collection(db,"eventos"));

    snap.forEach(doc=>{
        let e = doc.data();

        contenedor.innerHTML += `
        <div class="product">
            <img src="${e.imagen}">
            <p>${e.nombre}</p>
            <p>📅 ${e.fecha}</p>
        </div>`;
    });
}

// 🛍️ PRODUCTOS
async function cargarProductos(){
    const contenedor = document.getElementById("listaProductos");
    contenedor.innerHTML = "";

    const snap = await getDocs(collection(db,"productos"));

    snap.forEach(doc=>{
        let p = doc.data();

        contenedor.innerHTML += `
        <div class="product">
            <img src="${p.imagen}">
            <p>${p.nombre}</p>
            <p>$${p.precio}</p>

            <select id="talla-${doc.id}">
                <option>S</option>
                <option>M</option>
                <option>L</option>
            </select>

            <select id="color-${doc.id}">
                <option>Rojo</option>
                <option>Negro</option>
            </select>

            <button onclick="agregar('${p.nombre}',${p.precio},'talla-${doc.id}','color-${doc.id}')">
                Comprar
            </button>
        </div>`;
    });
}

// ➕ AGREGAR
window.agregar = function(nombre, precio, tallaId, colorId){
    let talla = document.getElementById(tallaId).value;
    let color = document.getElementById(colorId).value;

    carrito.push({ nombre, precio, talla, color });
    localStorage.setItem("carrito", JSON.stringify(carrito));
    mostrar();
}

// ❌ ELIMINAR
window.eliminar = function(i){
    carrito.splice(i,1);
    localStorage.setItem("carrito", JSON.stringify(carrito));
    mostrar();
}

// 🔄 MOSTRAR
function mostrar(){
    let lista = document.getElementById("carrito");
    let total = 0;

    lista.innerHTML = "";

    carrito.forEach((p,i)=>{
        lista.innerHTML += `
        <li>
        ${p.nombre} - $${p.precio} | ${p.talla} | ${p.color}
        <button onclick="eliminar(${i})">❌</button>
        </li>`;
        total += p.precio;
    });

    document.getElementById("total").innerText = total;
}

// 💳 PAGAR
window.pagar = async function(){
    if(carrito.length === 0){
        alert("Carrito vacío ❌");
        return;
    }

    await addDoc(collection(db,"compras"),{
        productos: carrito,
        fecha: new Date()
    });

    alert("Compra guardada 🔥");

    carrito = [];
    localStorage.removeItem("carrito");
    mostrar();
}

// INIT
cargarProductos();
cargarEventos();
mostrar();

</script>

</body>
</html>
