<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda LIL NAAY</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: radial-gradient(circle at top, rgba(255,0,0,0.2), transparent 60%),
                radial-gradient(circle at bottom, rgba(255,0,0,0.15), transparent 70%),
                #0a0a0a;
    color: white;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* NAV */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    background: linear-gradient(90deg,#120000,#1a0000);
    border-bottom: 1px solid rgba(255,0,0,0.3);
    box-shadow: 0 0 15px rgba(255,0,0,0.2);
}

.navbar button {
    background: #ff0000;
    border: none;
    color: white;
    padding: 8px 15px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.navbar button:hover {
    background: #990000;
}

/* TABS */
.tabs {
    display: flex;
    gap: 10px;
    padding: 15px 20px;
    overflow-x: auto;
}

.tabs button {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,0,0,0.3);
    padding: 10px 18px;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    white-space: nowrap;
}

.tabs button:hover, .tabs button.active {
    background: #ff0000;
    box-shadow: 0 0 15px red;
}

/* CONTENT */
.content {
    flex: 1; 
    padding: 20px;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
}

.section { display: none; }
.active { display: block; }

/* PRODUCTOS */
.store {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: flex-start;
}

.product {
    background: rgba(0,0,0,0.6);
    padding: 15px;
    border-radius: 15px;
    width: 220px;
    border: 1px solid rgba(255,0,0,0.3);
    box-shadow: 0 0 20px rgba(255,0,0,0.2);
    transition: 0.3s;
    display: flex;
    flex-direction: column;
}

.product:hover {
    transform: scale(1.03);
    box-shadow: 0 0 30px red;
}

.product img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 10px;
}

.product p {
    color: #ff4d4d;
    font-weight: 600;
    margin-top: 5px;
}

.product button {
    background: #ff0000;
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    margin-top: auto;
    cursor: pointer;
}

.product button:hover {
    background: #990000;
}

/* CARRITO */
.cart-section {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
    border: 1px solid rgba(255,0,0,0.2);
}

.cart-section ul {
    list-style: none;
    max-height: 150px;
    overflow-y: auto;
    margin-bottom: 10px;
}

.cart-section li {
    padding: 6px 0;
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: space-between;
}

/* PERFIL */
.profile {
    background: rgba(0,0,0,0.7);
    padding: 25px;
    border-radius: 15px;
    max-width: 400px;
    border: 1px solid rgba(255,0,0,0.3);
    box-shadow: 0 0 20px rgba(255,0,0,0.2);
    margin: 0 auto;
    text-align: center;
}

.profile-avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #ff0000;
    margin: 0 auto 15px auto;
    display: block;
}

.input-field {
    width: 80%;
    padding: 6px;
    margin: 6px 0;
    background: #111;
    border: 1px solid #333;
    color: white;
    border-radius: 5px;
    outline: none;
    text-align: center;
}

.btn-action {
    background: #ff0000;
    color: white;
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    margin-top: 12px;
    transition: 0.2s;
    width: 80%;
}

.btn-action:hover {
    background: #990000;
}

/* CHAT */
.chat-toggle {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: #ff0000;
    color: white;
    border: none;
    padding: 16px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 1000;
    box-shadow: 0 0 15px rgba(255,0,0,0.5);
    transition: 0.2s;
}

.chat-toggle:hover {
    transform: scale(1.1);
    background: #990000;
}

.chat-box {
    position: fixed;
    bottom: 95px;
    right: 25px;
    width: 340px;
    height: 460px;
    background: #0d0d0d;
    border-radius: 15px;
    display: none;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(255,0,0,0.4);
    border: 1px solid rgba(255,0,0,0.3);
    z-index: 999;
}

.chat-header {
    background: #1a0000;
    padding: 12px;
    display: flex;
    justify-content: space-between;
    font-weight: bold;
    cursor: move;
}

.online { color: #00ff66; font-size: 12px; }

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

/* BURBUJAS */
.msg {
    max-width: 85%;
    padding: 10px;
    border-radius: 12px;
    font-size: 13px;
    word-wrap: break-word;
    overflow-wrap: break-word;
    white-space: pre-wrap;
    cursor: pointer;
}

.msg b {
    display: block;
    font-size: 11px;
    opacity: 0.8;
    margin-bottom: 3px;
}

.me { background: #ff0000; align-self: flex-end; }
.other { background: #222; align-self: flex-start; }

.role-admin { border-left: 4px solid red; }
.role-mod { border-left: 4px solid cyan; }
.role-vip { border-left: 4px solid gold; }

.avatar-chat {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
    margin-right: 6px;
    border: 1px solid rgba(255, 255, 255, 0.3);
}

/* MODAL DE USUARIO */
.modal-perfil {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #151515;
    border: 2px solid #ff0000;
    padding: 25px;
    border-radius: 15px;
    z-index: 2000;
    width: 300px;
    text-align: center;
    box-shadow: 0 0 30px rgba(255,0,0,0.6);
    display: none;
}

.modal-perfil img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #ff0000;
    margin-bottom: 12px;
}

.modal-perfil h4 { margin-bottom: 8px; color: #ff3333; }
.modal-perfil p { font-size: 13px; margin: 4px 0; color: #ddd; }
.modal-close-btn {
    background: #444;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 15px;
}
.modal-close-btn:hover { background: #666; }

/* INPUT */
.chat-input { display: flex; border-top: 1px solid #222; background: #111; padding: 4px; }
.chat-input input { flex: 1; padding: 8px; border: none; background: #0a0a0a; color: white; border-radius: 6px; outline: none; margin-right: 4px;}
.chat-input button { background: #ff0000; border: none; padding: 8px 12px; color: white; border-radius: 6px; cursor: pointer; }

/* NOTIFICACIÓN */
#noti {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #ff0000;
    padding: 12px 20px;
    border-radius: 8px;
    display: none;
    z-index: 1001;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
}

/* FOOTER */
.footer { text-align: center; padding: 15px; background: #0d0d0d; margin-top: auto; color: #666; }
</style>
</head>

<body>

<div id="noti">🔔 Nuevo mensaje</div>

<div class="navbar">
    <h2>🔥 LIL NAAY</h2>
    <a href="index.html"><button>⬅ Volver</button></a>
</div>

<div class="tabs">
    <button class="active" onclick="mostrar('tienda', this)">🛍️ Tienda</button>
    <button onclick="mostrar('musica', this)">🎵 Música</button>
    <button onclick="mostrar('eventos', this)">🎉 Eventos</button>
    <button onclick="mostrar('perfil', this)">👤 Perfil</button>
</div>

<div class="content">
    <div id="tienda" class="section active">
        <h2>Productos</h2>
        <div class="store" id="productos"></div>

        <div class="cart-section">
            <h3>🛒 Carrito</h3>
            <ul id="carrito"></ul>
            <h3>Total: $<span id="total">0</span></h3>
            <button class="btn-action" onclick="pagar()">Pagar</button>
        </div>
    </div>

    <div id="musica" class="section"><h2>🎵 Música</h2></div>

    <div id="eventos" class="section">
        <h2>🎉 Eventos</h2>
        <div style="color: #666; margin-top: 15px;">Próximamente 🔥</div>
    </div>

    <div id="perfil" class="section">
        <h2>👤 Perfil</h2>
        <br>
        <div class="profile" id="perfilData">Cargando perfil...</div>
    </div>
</div>

<div id="userModal" class="modal-perfil">
    <div id="modalContent"></div>
    <button class="modal-close-btn" onclick="cerrarModal()">Cerrar</button>
</div>

<button class="chat-toggle" onclick="toggleChat()">💬</button>

<div class="chat-box" id="chatBoxDrag">
    <div class="chat-header">
        <span>💬 Chat</span>
        <span class="online" id="onlineCount">0 online</span>
    </div>

    <div id="chatBox" class="chat-messages"></div>

    <div class="chat-input">
        <input id="mensajeInput" placeholder="Escribe...">
        <button onclick="enviarMensaje()">➤</button>
    </div>
</div>

<div class="footer">© 2026 LIL NAAY</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore, collection, getDocs, addDoc,
    onSnapshot, query, orderBy, serverTimestamp,
    where, doc, setDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
    apiKey: "TU_API_KEY",
    authDomain: "lil-naay.firebaseapp.com",
    projectId: "lil-naay"
});

const db = getFirestore(app);

/* SECCIONES */
window.mostrar = (sec, btn) => {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
    
    document.getElementById(sec).classList.add("active");
    if(btn) btn.classList.add("active");
}

/* PERFIL */
async function obtenerPerfil(email){
    const q = query(collection(db, "usuarios"), where("email", "==", email));
    const snap = await getDocs(q);
    return snap.empty ? null : { id: snap.docs[0].id, ...snap.docs[0].data() };
}

window.cargarPerfil = async () => {
    let email = localStorage.getItem("usuario");
    if (!email) {
        document.getElementById("perfilData").innerHTML = `<p>No hay sesión iniciada.</p>`;
        return;
    }

    let data = await obtenerPerfil(email);
    let defaultAvatar = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

    document.getElementById("perfilData").innerHTML = `
        <img src="${data?.fotoPerfil || defaultAvatar}" class="profile-avatar" alt="Foto de perfil">
        <p><b>Usuario:</b> ${data?.username || email.split('@')[0]}</p>
        <p><b>Email:</b> ${email}</p>
        <p><b>Rol:</b> ${data?.admin ? "ADMIN" : data?.mod ? "MOD" : data?.vip ? "VIP" : "USER"}</p>
        
        <label style="font-size:12px;">Nombre a mostrar:</label><br>
        <input type="text" id="inputUsername" class="input-field" value="${data?.username || email.split('@')[0]}" placeholder="Nombre"><br>

        <label style="font-size:12px;">País:</label><br>
        <input type="text" id="inputPais" class="input-field" value="${data?.pais || ''}" placeholder="País"><br>
        
        <label style="font-size:12px;">Ciudad:</label><br>
        <input type="text" id="inputCiudad" class="input-field" value="${data?.ciudad || ''}" placeholder="Ciudad"><br>

        <input type="file" id="fotoInput" accept="image/*" style="display:none" onchange="subirFoto()">
        <button class="btn-action" onclick="document.getElementById('fotoInput').click()">📷 Cambiar Imagen</button>
        <button class="btn-action" style="background:#006622;" onclick="guardarDatosPerfil()">Guardar Cambios</button>
    `;
}

window.guardarDatosPerfil = async () => {
    let email = localStorage.getItem("usuario");
    if (!email) return alert("Inicia sesión primero");

    let username = document.getElementById("inputUsername").value;
    let pais = document.getElementById("inputPais").value;
    let ciudad = document.getElementById("inputCiudad").value;
    
    let userDoc = await obtenerPerfil(email);

    if (userDoc) {
        await updateDoc(doc(db, "usuarios", userDoc.id), {
            username: username,
            pais: pais,
            ciudad: ciudad
        });
    } else {
        await addDoc(collection(db, "usuarios"), {
            email: email,
            username: username,
            pais: pais,
            ciudad: ciudad,
            fotoPerfil: null
        });
    }
    alert("Datos actualizados con éxito.");
    cargarPerfil();
}

window.subirFoto = async () => {
    let fileInput = document.getElementById("fotoInput");
    let file = fileInput.files[0];
    if (!file) return;
    
    let email = localStorage.getItem("usuario");
    if (!email) return alert("Inicia sesión primero");

    let reader = new FileReader();
    reader.onload = async function(e) {
        let fotoBase64 = e.target.result;
        let userDoc = await obtenerPerfil(email);

        if (!userDoc) {
            await addDoc(collection(db, "usuarios"), {
                email: email,
                username: email.split('@')[0],
                fotoPerfil: fotoBase64
            });
        } else {
            await setDoc(doc(db, "usuarios", userDoc.id), { fotoPerfil: fotoBase64 }, { merge: true });
        }
        alert("Foto actualizada con éxito.");
        cargarPerfil();
    }
    reader.readAsDataURL(file);
}

/* ONLINE */
const onlineRef = collection(db, "online");
setInterval(async () => {
    let email = localStorage.getItem("usuario");
    if(!email) return;
    await setDoc(doc(onlineRef, email), {
        time: Date.now()
    });
}, 5000);

onSnapshot(onlineRef, snap => {
    let count = 0;
    let now = Date.now();
    snap.forEach(d => {
        if (now - d.data().time < 10000) count++;
    });
    
    let onlineCount = document.getElementById("onlineCount");
    if (onlineCount) onlineCount.innerText = count + " online";
});

/* CHAT */
let lastMsg = "", lastTime = 0;
const qChat = query(collection(db, "chat"), orderBy("fecha"));

onSnapshot(qChat, async snap => {
    let chat = document.getElementById("chatBox");
    if(!chat) return;
    chat.innerHTML = "";
    
    let email = localStorage.getItem("usuario");

    for (const d of snap.docs) {
        let m = d.data();
        let perfil = await obtenerPerfil(m.email);

        let div = document.createElement("div");
        div.className = "msg " + (m.email === email ? "me" : "other");

        if (perfil?.admin) div.classList.add("role-admin");
        else if (perfil?.mod) div.classList.add("role-mod");
        else if (perfil?.vip) div.classList.add("role-vip");

        let defaultAvatar = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
        let fotoMostrada = m.fotoPerfil || defaultAvatar;

        div.onclick = () => mostrarModalPerfil(m.usuario, fotoMostrada, perfil?.pais, perfil?.ciudad, m.email);

        div.innerHTML = `
            <div style="display:flex; align-items:center; gap:6px;">
                <img src="${fotoMostrada}" class="avatar-chat">
                <b>${m.usuario}</b>
            </div>
            <p style="margin-top: 5px;">${m.texto}</p>
        `;
        chat.appendChild(div);
    }

    if (snap.docs.length > 0) {
        let ultimo = snap.docs[snap.docs.length - 1].data();
        let noti = document.getElementById("noti");
        if (ultimo.texto !== lastMsg) {
            noti.style.display = "block";
            setTimeout(() => noti.style.display = "none", 2500);
            lastMsg = ultimo.texto;
        }
    }
    chat.scrollTop = chat.scrollHeight;
});

window.mostrarModalPerfil = (usuario, foto, pais, ciudad, email) => {
    const modal = document.getElementById("userModal");
    const content = document.getElementById("modalContent");
    const defaultAvatar = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
    
    content.innerHTML = `
        <img src="${foto || defaultAvatar}" alt="Avatar">
        <h4>${usuario}</h4>
        <p><b>Email:</b> ${email}</p>
        <p><b>País:</b> ${pais || 'No especificado'}</p>
        <p><b>Ciudad:</b> ${ciudad || 'No especificada'}</p>
    `;
    modal.style.display = "block";
}

window.cerrarModal = () => {
    document.getElementById("userModal").style.display = "none";
}

/* ENVIAR MENSAJE */
window.enviarMensaje = async () => {
    let input = document.getElementById("mensajeInput");
    let texto = input.value.trim();
    let email = localStorage.getItem("usuario");

    if (!texto || !email) return;

    let perfil = await obtenerPerfil(email);

    /* BAN */
    if (perfil?.ban && Date.now() < perfil.banHasta) {
        return alert("🚫 Estás baneado");
    }

    /* ANTI SPAM */
    if (texto === lastMsg && Date.now() - lastTime < 3000) {
        return alert("Spam 🚫");
    }

    lastMsg = texto;
    lastTime = Date.now();

    await addDoc(collection(db, "chat"), {
        usuario: perfil?.username || email,
        email: email,
        texto: texto,
        fotoPerfil: perfil?.fotoPerfil || null,
        fecha: serverTimestamp()
    });

    input.value = "";
}

/* ENTER */
document.getElementById("mensajeInput").addEventListener("keypress", e => {
    if (e.key === "Enter") enviarMensaje();
});

/* CHAT UI */
window.toggleChat = () => {
    let box = document.getElementById("chatBoxDrag");
    box.style.display = box.style.display === "flex" ? "none" : "flex";
}

/* TIENDA */
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

async function cargarProductos() {
    let c = document.getElementById("productos");
    if (!c) return;
    c.innerHTML = "";

    let snap = await getDocs(collection(db, "productos"));

    if(snap.empty) {
        c.innerHTML = `<p style="color:#666;">No hay productos disponibles por el momento.</p>`;
    }

    snap.forEach(doc => {
        let p = doc.data();
        c.innerHTML += `
            <div class="product">
                <img src="${p.imagen || 'https://via.placeholder.com/220x160'}" alt="${p.nombre}">
                <h4>${p.nombre}</h4>
                <p>$${p.precio}</p>
                <button onclick="agregar('${p.nombre}', ${p.precio})">Comprar</button>
            </div>`;
    });
}

window.agregar = (n, p) => {
    carrito.push({ nombre: n, precio: p });
    localStorage.setItem("carrito", JSON.stringify(carrito));
    mostrarCarrito();
}

function mostrarCarrito() {
    let lista = document.getElementById("carrito");
    if(!lista) return;
    lista.innerHTML = "";
    let total = 0;

    if (carrito.length === 0) {
        lista.innerHTML = `<li style="color:#666">El carrito está vacío</li>`;
    } else {
        carrito.forEach((p) => {
            lista.innerHTML += `<li><span>${p.nombre}</span> <span>$${p.precio}</span></li>`;
            total += p.precio;
        });
    }

    document.getElementById("total").innerText = total;
}

window.pagar = async () => {
    if (carrito.length === 0) return alert("Tu carrito está vacío");

    await addDoc(collection(db, "compras"), {
        productos: carrito,
        fecha: new Date()
    });

    carrito = [];
    localStorage.removeItem("carrito");
    mostrarCarrito();
    alert("🎉 ¡Compra realizada con éxito!");
}

/* INIT */
cargarProductos();
mostrarCarrito();
cargarPerfil();

</script>

</body>
</html>
