<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda LIL NAAY</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI';
}

body{
    background:#0a0a0a;
    color:white;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* NAV */
.navbar{
    display:flex;
    justify-content:space-between;
    padding:15px 25px;
    background:#120000;
}

.navbar button{
    background:#ff0000;
    border:none;
    color:white;
    padding:8px 15px;
    border-radius:8px;
    cursor:pointer;
}

/* TABS */
.tabs{
    display:flex;
    gap:10px;
    padding:15px 20px;
}

.tabs button{
    background:#1a1a1a;
    border:none;
    padding:10px 15px;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.tabs button:hover{
    background:#ff000020;
}

/* CONTENIDO */
.content{
    flex:1;
    padding:20px;
}

/* SECCIONES */
.section{
    display:none;
}
.active{
    display:block;
}

/* PRODUCTOS */
.store{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.product{
    background:#111;
    padding:15px;
    border-radius:12px;
    width:200px;
}

.product img{
    width:100%;
    border-radius:10px;
}

/* EVENTOS */
.event{
    background:#111;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
}

/* PERFIL */
.profile{
    background:#111;
    padding:20px;
    border-radius:12px;
    max-width:400px;
}

/* CHAT */
.chat-toggle{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#ff0000;
    color:white;
    border:none;
    padding:12px;
    border-radius:50%;
    cursor:pointer;
    z-index:1000;
}

.chat-box{
    position:fixed;
    bottom:80px;
    right:20px;
    width:320px;
    max-height:500px;
    background:#0d0d0d;
    border:1px solid #ff000050;
    border-radius:15px;
    box-shadow:0 0 20px rgba(255,0,0,0.3);
    display:none;
    flex-direction:column;
    overflow:hidden;
    z-index:999;
}

.chat-header{
    background:#1a0000;
    padding:10px;
    font-weight:bold;
    cursor:move;
}

.chat-messages{
    flex:1;
    overflow-y:auto;
    padding:10px;
    font-size:13px;
}

.chat-input{
    display:flex;
    border-top:1px solid #222;
}

.chat-input input{
    flex:1;
    padding:10px;
    border:none;
    background:#111;
    color:white;
}

.chat-input button{
    background:red;
    border:none;
    padding:10px;
    color:white;
}

/* MOBILE */
@media(max-width:768px){
    .chat-box{
        width:100%;
        height:60%;
        right:0;
        bottom:0;
        border-radius:15px 15px 0 0;
    }
}

/* FOOTER */
.footer{
    text-align:center;
    padding:15px;
    background:#0d0d0d;
    margin-top:auto;
}
</style>
</head>

<body>

<div class="navbar">
    <h2>🔥 LIL NAAY</h2>
    <a href="index.html"><button>⬅ Volver</button></a>
</div>

<div class="tabs">
    <button onclick="mostrar('tienda')">🛍️ Tienda</button>
    <button onclick="mostrar('musica')">🎵 Música</button>
    <button onclick="mostrar('eventos')">🎉 Eventos</button>
    <button onclick="mostrar('perfil')">👤 Perfil</button>
</div>

<div class="content">

<div id="tienda" class="section active">
    <h2>Productos</h2>
    <div class="store" id="productos"></div>

    <h3>🛒 Carrito</h3>
    <ul id="carrito"></ul>
    <h3>Total: $<span id="total">0</span></h3>
    <button onclick="pagar()">Pagar</button>
</div>

<div id="musica" class="section">
    <h2>🎵 Música</h2>
</div>

<div id="eventos" class="section">
    <h2>🎉 Eventos</h2>
    <div class="event">Próximamente 🔥</div>
</div>

<div id="perfil" class="section">
    <h2>👤 Perfil</h2>
    <div class="profile" id="perfilData">Cargando...</div>
</div>

</div>

<button class="chat-toggle" onclick="toggleChat()">💬</button>

<div class="chat-box" id="chatBoxDrag">
    <div class="chat-header">💬 Chat en vivo</div>
    <div id="chatBox" class="chat-messages"></div>

    <div class="chat-input">
        <input id="mensajeInput" placeholder="Escribe...">
        <button onclick="enviarMensaje()">➤</button>
    </div>
</div>

<div class="footer">
© 2026 LIL NAAY
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, getDocs, addDoc,
onSnapshot, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const db = getFirestore(app);

/* SECCIONES */
window.mostrar = function(sec){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(sec).classList.add("active");
}

/* PERFIL */
async function obtenerPerfil(email){
    const snap = await getDocs(collection(db,"usuarios"));
    let user = snap.docs.find(doc=>doc.data().email === email);
    return user ? user.data() : null;
}

async function cargarPerfil(){
    let email = localStorage.getItem("usuario");
    if(!email) return;

    let data = await obtenerPerfil(email);

    document.getElementById("perfilData").innerHTML = `
    <p><b>Usuario:</b> ${data?.username || "No definido"}</p>
    <p><b>Email:</b> ${data?.email || email}</p>
    <p><b>País:</b> ${data?.pais || "-"}</p>
    <p><b>Provincia:</b> ${data?.provincia || "-"}</p>
    <p><b>Edad:</b> ${data?.edad || "-"}</p>
    `;
}

/* CHAT */
const q = query(collection(db,"chat"), orderBy("fecha"));

onSnapshot(q,(snap)=>{
    let chat = document.getElementById("chatBox");
    chat.innerHTML="";

    snap.forEach(d=>{
        let m = d.data();
        chat.innerHTML += `<div><b>${m.usuario}</b>: ${m.texto}</div>`;
    });

    chat.scrollTop = chat.scrollHeight;
});

/* ENVIAR MENSAJE */
window.enviarMensaje = async function(){
    let input = document.getElementById("mensajeInput");
    let texto = input.value.trim();
    let email = localStorage.getItem("usuario");

    if(!email) return alert("Login requerido");
    if(!texto) return;

    let perfil = await obtenerPerfil(email);
    let nombre = perfil?.username || email;

    await addDoc(collection(db,"chat"),{
        usuario:nombre,
        texto,
        fecha: serverTimestamp()
    });

    input.value="";
}

/* ENTER */
document.getElementById("mensajeInput").addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        enviarMensaje();
    }
});

/* CHAT UI */
window.toggleChat = function(){
    let chat = document.getElementById("chatBoxDrag");
    chat.style.display = chat.style.display === "flex" ? "none" : "flex";
}

/* DRAG */
if(window.innerWidth > 768){
    let chat = document.getElementById("chatBoxDrag");
    let header = chat.querySelector(".chat-header");

    let offsetX, offsetY, isDown=false;

    header.onmousedown = e=>{
        isDown=true;
        offsetX = e.clientX - chat.offsetLeft;
        offsetY = e.clientY - chat.offsetTop;
    }

    document.onmouseup=()=> isDown=false;

    document.onmousemove = e=>{
        if(!isDown) return;
        chat.style.left = (e.clientX - offsetX)+"px";
        chat.style.top = (e.clientY - offsetY)+"px";
    }
}

/* TIENDA */
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

async function cargarProductos(){
    let c = document.getElementById("productos");
    c.innerHTML="";

    let snap = await getDocs(collection(db,"productos"));

    snap.forEach(doc=>{
        let p = doc.data();

        c.innerHTML += `
        <div class="product">
        <img src="${p.imagen}">
        <p>${p.nombre}</p>
        <p>$${p.precio}</p>
        <button onclick="agregar('${p.nombre}',${p.precio})">Comprar</button>
        </div>`;
    });
}

window.agregar = function(n,p){
    carrito.push({nombre:n,precio:p});
    localStorage.setItem("carrito",JSON.stringify(carrito));
    mostrarCarrito();
}

function mostrarCarrito(){
    let ul = document.getElementById("carrito");
    ul.innerHTML="";
    let total=0;

    carrito.forEach(p=>{
        ul.innerHTML+=`<li>${p.nombre} $${p.precio}</li>`;
        total+=p.precio;
    });

    document.getElementById("total").innerText=total;
}

window.pagar = async function(){
    if(carrito.length===0) return alert("Vacío");

    await addDoc(collection(db,"compras"),{
        productos:carrito,
        fecha:new Date()
    });

    carrito=[];
    localStorage.removeItem("carrito");
    mostrarCarrito();
    alert("Compra realizada");
}

cargarProductos();
mostrarCarrito();
cargarPerfil();

</script>

</body>
</html>
