<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda LIL NAAY</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
    margin: 0;
}

/* 🔥 NAVBAR */
.navbar {
    display: flex;
    align-items: center;
    padding: 20px 30px;
    background: rgba(20, 9, 9, 0.8);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
}

.back-btn {
    background: rgba(255,255,255,0.05);
    padding: 10px 18px;
    border-radius: 20px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.back-btn:hover {
    background: rgba(139, 0, 0, 0.5);
}

/* 🛍️ PRODUCTOS */
.store {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.product {
    background: #222;
    padding: 15px;
    border-radius: 10px;
    width: 200px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.6);
}

.product img {
    width: 100%;
}

/* 🔘 BOTONES */
button {
    margin-top: 10px;
    padding: 10px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #b30000;
}

select {
    margin-top: 5px;
    padding: 5px;
    width: 100%;
}

/* 📄 COPYRIGHT */
.footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.6);
    padding: 10px;
    font-size: 14px;
    color: #ccc;
    text-align: center;
    backdrop-filter: blur(5px);
}

/* 💬 CHAT MENSAJES */
.msg {
    text-align:left;
    margin-bottom:8px;
}
</style>

</head>
<body>

<div class="navbar">
    <a href="index.html" class="back-btn">⬅ Volver</a>
</div>

<h1>🔥 Tienda LIL NAAY</h1>

<!-- 💬 CHAT -->
<div style="
max-width:800px;
margin:30px auto;
background:#1a1a1a;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
">

<h2>💬 Chat en vivo</h2>

<div id="chatBox" style="
height:300px;
overflow-y:auto;
background:#0d0d0d;
padding:10px;
border-radius:10px;
margin-bottom:10px;
"></div>

<input id="mensajeInput" placeholder="Escribe tu mensaje..." style="
width:70%;
padding:10px;
border:none;
border-radius:5px;
">

<button onclick="enviarMensaje()">Enviar</button>

<p id="cooldown" style="color:#aaa;font-size:12px;"></p>

</div>

<div class="store" id="productos"></div>

<h2>🛒 Carrito</h2>
<ul id="carrito"></ul>
<h3>Total: $<span id="total">0</span></h3>

<button onclick="pagar()">Pagar</button>

<div class="footer">
    © <span id="year"></span> LIL NAAY
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
getFirestore, collection, getDocs, addDoc,
onSnapshot, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
  authDomain: "lil-naay.firebaseapp.com",
  projectId: "lil-naay"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

/* ================= CHAT ================= */

let tiempoEspera = 90;
let ultimoEnvio = 0;
let intervalo;

// 🔍 FILTRO (links y teléfonos)
function mensajeValido(texto){
    let regexLinks = /(https?:\/\/|www\.)/i;
    let regexTel = /\d{7,}/;

    if(regexLinks.test(texto)) return false;
    if(regexTel.test(texto)) return false;

    return true;
}

// ⏱️ COOLDOWN VISUAL
function iniciarCooldown(){
    let tiempo = tiempoEspera;
    let label = document.getElementById("cooldown");

    intervalo = setInterval(()=>{
        tiempo--;
        label.innerText = "Puedes enviar en " + tiempo + "s";

        if(tiempo <= 0){
            clearInterval(intervalo);
            label.innerText = "";
        }
    },1000);
}

// 📥 TIEMPO REAL
const q = query(collection(db,"chat"), orderBy("fecha"));

onSnapshot(q,(snapshot)=>{
    const chat = document.getElementById("chatBox");
    chat.innerHTML = "";

    snapshot.forEach(doc=>{
        let m = doc.data();

        chat.innerHTML += `
        <div class="msg">
            <b>${m.usuario}</b>: ${m.texto}
        </div>`;
    });

    chat.scrollTop = chat.scrollHeight;
});

// 📤 ENVIAR
window.enviarMensaje = async function(){

    let ahora = Date.now();

    if(ahora - ultimoEnvio < tiempoEspera * 1000){
        return;
    }

    let input = document.getElementById("mensajeInput");
    let texto = input.value.trim();
    let usuario = localStorage.getItem("usuario");

    if(!usuario){
        alert("Inicia sesión");
        return;
    }

    if(!texto) return;

    if(!mensajeValido(texto)){
        alert("No se permiten links ni números");
        return;
    }

    await addDoc(collection(db,"chat"),{
        usuario,
        texto,
        fecha: serverTimestamp()
    });

    input.value = "";
    ultimoEnvio = Date.now();
    iniciarCooldown();
}

/* ================= TIENDA ================= */

async function cargarProductos(){
    const contenedor = document.getElementById("productos");
    contenedor.innerHTML = "";

    const snap = await getDocs(collection(db,"productos"));

    snap.forEach(doc=>{
        let p = doc.data();

        contenedor.innerHTML += `
        <div class="product">
            <img src="${p.imagen}">
            <p>${p.nombre}</p>
            <p>$${p.precio}</p>

            <select id="talla-${doc.id}">
                <option>S</option>
                <option>M</option>
                <option>L</option>
            </select>

            <select id="color-${doc.id}">
                <option>Rojo</option>
                <option>Negro</option>
            </select>

            <button onclick="agregar('${p.nombre}',${p.precio},'talla-${doc.id}','color-${doc.id}')">
                Comprar
            </button>
        </div>`;
    });
}

window.agregar = function(nombre, precio, tallaId, colorId){
    let talla = document.getElementById(tallaId).value;
    let color = document.getElementById(colorId).value;

    carrito.push({ nombre, precio, talla, color });
    localStorage.setItem("carrito", JSON.stringify(carrito));
    mostrar();
}

window.eliminar = function(i){
    carrito.splice(i,1);
    localStorage.setItem("carrito", JSON.stringify(carrito));
    mostrar();
}

function mostrar(){
    let lista = document.getElementById("carrito");
    let total = 0;

    lista.innerHTML = "";

    carrito.forEach((p,i)=>{
        lista.innerHTML += `
        <li>
        ${p.nombre} - $${p.precio} | ${p.talla} | ${p.color}
        <button onclick="eliminar(${i})">❌</button>
        </li>`;
        total += p.precio;
    });

    document.getElementById("total").innerText = total;
}

window.pagar = async function(){
    if(carrito.length === 0){
        alert("Carrito vacío ❌");
        return;
    }

    await addDoc(collection(db,"compras"),{
        productos: carrito,
        fecha: new Date()
    });

    alert("Compra guardada 🔥");

    carrito = [];
    localStorage.removeItem("carrito");
    mostrar();
}

document.getElementById("year").innerText = new Date().getFullYear();

cargarProductos();
mostrar();

</script>

</body>
</html>
