<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LIL NAAY - Menu</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
    overflow:hidden;
}

/* 🔥 FONDO */
.fondo{
    position:relative;
    background: url('Fondopaisaje(1).png') no-repeat center;
    background-size: cover;
    height: 100vh;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* 🌇 LUZ */
.fondo::after{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background: radial-gradient(circle, rgba(255,200,100,0.3), transparent 70%);
    top:40%;
    right:20%;
    filter: blur(60px);
}

/* 🔙 VOLVER */
.volver{
    position:absolute;
    top:20px;
    left:20px;
    background:rgba(0,0,0,0.5);
    padding:10px 15px;
    border-radius:10px;
    color:white;
    text-decoration:none;
    z-index:2;
}

/* 🧠 LOGO */
.logo-img{
    width:850px;
    max-width:98%;
    margin-bottom:10px;
    filter: drop-shadow(0 0 30px rgba(255,255,255,0.7));
    z-index:2;
}

/* 🎮 BOTONES */
.menu-principal{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.btn-img{
    width:330px;
    margin:10px;
    cursor:pointer;
    transition:0.3s;
    filter: drop-shadow(0 10px 25px rgba(0,0,0,0.8));
    z-index:2;
}

.btn-img:hover{
    transform: scale(1.1);
}

/* 🧩 PANTALLAS */
.pantalla{
    display:none;
    padding:20px;
}

/* 🛍️ PRODUCTOS */
.store{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.product{
    background:#222;
    padding:15px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.7);
}

.product img{
    width:150px;
}

button{
    margin-top:10px;
    padding:10px;
    background:red;
    border:none;
    color:white;
    cursor:pointer;
}

select{
    margin-top:5px;
    padding:5px;
    width:100%;
}

/* ✨ PARTICULAS */
#particles{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
    pointer-events:none;
}

/* 🕷️ ARAÑAS */
.spider{
    position:fixed;
    width:40px;
    pointer-events:none;
    z-index:1;
    animation: caminar linear infinite;
}

@keyframes caminar{
    0%{ transform: translateX(-100px) translateY(0px); }
    50%{ transform: translateX(50vw) translateY(40px); }
    100%{ transform: translateX(120vw) translateY(0px); }
}
</style>

</head>
<body>

<audio id="clickSound" src="click.mp3"></audio>

<!-- ✨ PARTICULAS -->
<canvas id="particles"></canvas>

<!-- 🕷️ ARAÑAS -->
<img src="https://i.imgur.com/Z7AzH2c.png" class="spider" style="top:20%; animation-duration:18s;">
<img src="https://i.imgur.com/Z7AzH2c.png" class="spider" style="top:60%; animation-duration:22s;">
<img src="https://i.imgur.com/Z7AzH2c.png" class="spider" style="top:80%; animation-duration:25s;">

<!-- 🔥 MENU -->
<div class="fondo">

<a href="index.html" class="volver">⬅ Volver</a>

<img src="diosloquisoasi.png" class="logo-img">

<div class="menu-principal">
    <img src="botontienda.png" class="btn-img" onclick="irSeccion('tienda')">
    <img src="botonevento.png" class="btn-img" onclick="irSeccion('eventos')">
</div>

</div>

<!-- 🎤 EVENTOS -->
<div id="eventos" class="pantalla">
<h1>🎤 Eventos</h1>
<div class="store" id="listaEventos"></div>
<button onclick="volverMenu()">⬅ Volver</button>
</div>

<!-- 🛍️ TIENDA -->
<div id="tienda" class="pantalla">
<h1>🛍️ Tienda</h1>
<div class="store" id="listaProductos"></div>

<h2>🛒 Carrito</h2>
<ul id="carrito"></ul>
<h3>Total: $<span id="total">0</span></h3>

<button onclick="pagar()">Pagar</button>
<button onclick="volverMenu()">⬅ Volver</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
  authDomain: "lil-naay.firebaseapp.com",
  projectId: "lil-naay"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

// 🔄 CAMBIO
window.irSeccion = function(seccion){
    document.querySelector(".fondo").style.display = "none";
    document.getElementById(seccion).style.display = "block";
}

window.volverMenu = function(){
    document.querySelector(".fondo").style.display = "flex";
    document.getElementById("eventos").style.display = "none";
    document.getElementById("tienda").style.display = "none";
}

// 📡 EVENTOS
async function cargarEventos(){
    const contenedor = document.getElementById("listaEventos");
    const snap = await getDocs(collection(db,"eventos"));

    snap.forEach(doc=>{
        let e = doc.data();
        contenedor.innerHTML += `
        <div class="product">
            <img src="${e.imagen}">
            <p>${e.nombre}</p>
            <p>📅 ${e.fecha}</p>
        </div>`;
    });
}

// 🛍️ PRODUCTOS
async function cargarProductos(){
    const contenedor = document.getElementById("listaProductos");
    const snap = await getDocs(collection(db,"productos"));

    snap.forEach(doc=>{
        let p = doc.data();
        contenedor.innerHTML += `
        <div class="product">
            <img src="${p.imagen}">
            <p>${p.nombre}</p>
            <p>$${p.precio}</p>
            <button onclick="agregar('${p.nombre}',${p.precio})">Comprar</button>
        </div>`;
    });
}

// 🛒 CARRITO
window.agregar = function(nombre, precio){
    carrito.push({ nombre, precio });
    localStorage.setItem("carrito", JSON.stringify(carrito));
    mostrar();
}

function mostrar(){
    let lista = document.getElementById("carrito");
    let total = 0;
    lista.innerHTML = "";

    carrito.forEach((p)=>{
        lista.innerHTML += `<li>${p.nombre} - $${p.precio}</li>`;
        total += p.precio;
    });

    document.getElementById("total").innerText = total;
}

// 💳 PAGAR
window.pagar = async function(){
    await addDoc(collection(db,"compras"),{
        productos: carrito,
        fecha: new Date()
    });

    alert("Compra guardada 🔥");

    carrito = [];
    localStorage.removeItem("carrito");
    mostrar();
}

// ✨ PARTICULAS
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<60;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        size: Math.random()*3,
        speedY: Math.random()*1
    });
}

function animar(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        p.y += p.speedY;
        if(p.y > canvas.height){
            p.y = 0;
            p.x = Math.random()*canvas.width;
        }

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fillStyle = "white";
        ctx.fill();
    });

    requestAnimationFrame(animar);
}

animar();

cargarProductos();
cargarEventos();
mostrar();

</script>

</body>
</html>
