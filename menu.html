<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, getDocs, addDoc,
onSnapshot, query, orderBy, serverTimestamp, where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const db = getFirestore(app);

/* SECCIONES */
window.mostrar = function(sec){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(sec).classList.add("active");
}

/* PERFIL MEJORADO (IMPORTANTE 🔥) */
async function obtenerPerfil(email){
    const q = query(collection(db,"usuarios"), where("email","==",email));
    const snap = await getDocs(q);
    if(!snap.empty) return {id:snap.docs[0].id, ...snap.docs[0].data()};
    return null;
}

async function cargarPerfil(){
    let email = localStorage.getItem("usuario");
    if(!email) return;

    let data = await obtenerPerfil(email);

    document.getElementById("perfilData").innerHTML = `
    <p><b>Usuario:</b> ${data?.username || "No definido"}</p>
    <p><b>Email:</b> ${email}</p>
    <p><b>Rol:</b> ${data?.admin ? "ADMIN" : data?.mod ? "MOD" : data?.vip ? "VIP" : "USER"}</p>
    <p><b>País:</b> ${data?.pais || "-"}</p>
    <p><b>Provincia:</b> ${data?.provincia || "-"}</p>
    <p><b>Edad:</b> ${data?.edad || "-"}</p>
    `;
}

/* ================= CHAT CON ROLES + BAN ================= */

const qChat = query(collection(db,"chat"), orderBy("fecha"));

onSnapshot(qChat,(snap)=>{
    let chat = document.getElementById("chatBox");
    chat.innerHTML="";

    snap.forEach(d=>{
        let m = d.data();

        let color = "#fff";

        if(m.rol === "admin") color = "#ff0000";
        else if(m.rol === "mod") color = "#00ffff";
        else if(m.rol === "vip") color = "#ffd700";

        chat.innerHTML += `
        <div style="color:${color}">
            <b>${m.usuario}</b>: ${m.texto}
        </div>`;
    });

    chat.scrollTop = chat.scrollHeight;
});

/* ENVIAR MENSAJE (FIX TOTAL 🔥) */
window.enviarMensaje = async function(){

    let input = document.getElementById("mensajeInput");
    let texto = input.value.trim();
    let email = localStorage.getItem("usuario");

    if(!email) return alert("Login requerido");
    if(!texto) return;

    let perfil = await obtenerPerfil(email);

    /* 🚫 BLOQUEO AUTOMÁTICO */
    if(perfil?.ban){
        if(Date.now() < perfil.banHasta){
            return alert("🚫 Estás baneado");
        }
    }

    let nombre = perfil?.username || email;

    await addDoc(collection(db,"chat"),{
        usuario: nombre,
        email: email,
        texto: texto,
        fecha: serverTimestamp(),
        rol: perfil?.admin ? "admin" :
             perfil?.mod ? "mod" :
             perfil?.vip ? "vip" : "user"
    });

    input.value="";
}

/* ENTER */
document.getElementById("mensajeInput").addEventListener("keypress",function(e){
    if(e.key==="Enter") enviarMensaje();
});

/* CHAT UI */
window.toggleChat = function(){
    let chat = document.getElementById("chatBoxDrag");
    chat.style.display = chat.style.display === "flex" ? "none" : "flex";
}

/* DRAG */
if(window.innerWidth > 768){
    let chat = document.getElementById("chatBoxDrag");
    let header = chat.querySelector(".chat-header");

    let offsetX, offsetY, isDown=false;

    header.onmousedown = e=>{
        isDown=true;
        offsetX = e.clientX - chat.offsetLeft;
        offsetY = e.clientY - chat.offsetTop;
    }

    document.onmouseup=()=> isDown=false;

    document.onmousemove = e=>{
        if(!isDown) return;
        chat.style.left = (e.clientX - offsetX)+"px";
        chat.style.top = (e.clientY - offsetY)+"px";
    }
}

/* ================= TIENDA ================= */

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

async function cargarProductos(){
    let c = document.getElementById("productos");
    c.innerHTML="";

    let snap = await getDocs(collection(db,"productos"));

    snap.forEach(doc=>{
        let p = doc.data();

        c.innerHTML += `
        <div class="product">
        <img src="${p.imagen}">
        <p>${p.nombre}</p>
        <p>$${p.precio}</p>
        <button onclick="agregar('${p.nombre}',${p.precio})">Comprar</button>
        </div>`;
    });
}

window.agregar = function(n,p){
    carrito.push({nombre:n,precio:p});
    localStorage.setItem("carrito",JSON.stringify(carrito));
    mostrarCarrito();
}

function mostrarCarrito(){
    let ul = document.getElementById("carrito");
    ul.innerHTML="";
    let total=0;

    carrito.forEach(p=>{
        ul.innerHTML+=`<li>${p.nombre} $${p.precio}</li>`;
        total+=p.precio;
    });

    document.getElementById("total").innerText=total;
}

window.pagar = async function(){
    if(carrito.length===0) return alert("Vacío");

    await addDoc(collection(db,"compras"),{
        productos:carrito,
        fecha:new Date()
    });

    carrito=[];
    localStorage.removeItem("carrito");
    mostrarCarrito();
    alert("Compra realizada");
}

/* INIT */
cargarProductos();
mostrarCarrito();
cargarPerfil();

</script>
