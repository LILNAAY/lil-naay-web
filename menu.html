<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tienda</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
}

/* BOTON VOLVER */
.back {
    padding: 15px;
}

.back a {
    color: white;
    text-decoration: none;
    background: #222;
    padding: 10px 15px;
    border-radius: 10px;
}

/* PRODUCTOS */
.product {
    background: #222;
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
}

/* BOTON */
button {
    background: red;
    color: white;
    border: none;
    padding: 10px;
}

/* CARRITO */
.carrito {
    padding: 20px;
}

.footer {
    text-align: center;
    padding: 20px;
    color: #aaa;
}
</style>
</head>

<body>

<!-- 🔙 VOLVER -->
<div class="back">
    <a href="index.html">⬅ Volver al Inicio</a>
</div>

<!-- 🛒 CARRITO -->
<div class="carrito">
    <h2>🛒 Carrito</h2>
    <ul id="lista"></ul>
    <p>Total: $<span id="total">0</span></p>
</div>

<!-- TIENDA -->
<div class="product">
    <p>Hoodie LIL NAAY - $25</p>
    <button onclick="agregar('Hoodie',25)">Comprar</button>
</div>

<div class="product">
    <p>T-Shirt LIL NAAY - $15</p>
    <button onclick="agregar('T-Shirt',15)">Comprar</button>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 LIL NAAY — Web creada por DOM AYBAR
</div>

<script>
let carrito = [];

function agregar(nombre, precio){
    carrito.push({nombre,precio});
    mostrar();
}

function mostrar(){
    let lista = document.getElementById("lista");
    let total = 0;

    lista.innerHTML = "";

    carrito.forEach(p=>{
        lista.innerHTML += `<li>${p.nombre} - $${p.precio}</li>`;
        total += p.precio;
    });

    document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
