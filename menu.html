<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eventos & Tienda</title>

<style>
:root {
    --rojo: #8b0000;
    --fondo: #0f0a0a;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #140909, #0f0a0a);
    color: white;
}

.navbar {
    display: flex;
    align-items: center;
    padding: 20px 30px;
    background: rgba(20, 9, 9, 0.8);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
}

.back-btn {
    background: rgba(255,255,255,0.05);
    padding: 10px 18px;
    border-radius: 20px;
    text-decoration: none;
    color: white;
}

.section {
    padding: 40px;
}

.event {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 15px;
}

.carrito-box {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

.carrito-box ul {
    list-style: none;
    padding: 0;
}

.store {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
}

.product {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 15px;
    width: 180px;
    text-align: center;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

.price {
    color: #ff4d4d;
    font-weight: bold;
}

.btn {
    margin-top: 10px;
    padding: 10px;
    background: var(--rojo);
    border-radius: 20px;
    border: none;
    color: white;
    cursor: pointer;
}

input {
    display:block;
    margin:5px 0;
    padding:8px;
    border-radius:10px;
    border:none;
}
</style>
</head>

<body>

<div class="navbar">
    <a href="index.html" class="back-btn">⬅ Volver</a>
</div>

<div class="section">

    <h2>🧾 Datos del cliente</h2>
    <input type="text" id="nombre" placeholder="Nombre">
    <input type="email" id="correo" placeholder="Correo">
    <input type="text" id="pais" placeholder="País">

</div>

<div class="section">

    <h2>🛒 Carrito</h2>

    <div class="carrito-box">
        <ul id="carrito"></ul>
        <p>Total: $<span id="total">0</span></p>
        <button class="btn" onclick="pagar()">Pagar 💳</button>
    </div>

</div>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

function guardarCarrito(){
    localStorage.setItem("carrito", JSON.stringify(carrito));
}

function mostrar(){
    let lista = document.getElementById("carrito");
    let total = 0;
    lista.innerHTML = "";

    carrito.forEach((p,i)=>{
        lista.innerHTML += `
        <li>
        ${p.nombre} - $${p.precio}
        </li>`;
        total += p.precio;
    });

    document.getElementById("total").innerText = total;
}

// 🔥 NUEVA FUNCIÓN CON STRIPE REAL
async function pagar(){

    if(carrito.length === 0){
        alert("Carrito vacío");
        return;
    }

    let nombre = document.getElementById("nombre").value;
    let correo = document.getElementById("correo").value;
    let pais = document.getElementById("pais").value;

    if(!nombre || !correo || !pais){
        alert("Completa todos los datos");
        return;
    }

    try {

        const respuesta = await fetch("http://localhost:3000/crear-pago", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                productos: carrito,
                cliente: { nombre, correo, pais }
            })
        });

        const data = await respuesta.json();

        if(data.url){
            window.location.href = data.url;
        } else {
            alert("Error al crear pago");
        }

    } catch (error) {
        console.error(error);
        alert("Error en el servidor");
    }
}

window.onload = mostrar;
</script>

</body>
</html>
