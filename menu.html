<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eventos & Tienda</title>

<style>
:root {
    --rojo: #8b0000;
    --fondo: #0f0a0a;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #140909, #0f0a0a);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    align-items: center;
    padding: 20px 30px;
    background: rgba(20, 9, 9, 0.8);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
}

.back-btn {
    background: rgba(255,255,255,0.05);
    padding: 10px 18px;
    border-radius: 20px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.back-btn:hover {
    background: rgba(139, 0, 0, 0.5);
}

.section {
    padding: 40px;
}

.event {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 15px;
}

.carrito-box {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

.carrito-box ul {
    list-style: none;
    padding: 0;
}

.store {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
}

.product {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 15px;
    width: 180px;
    text-align: center;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

.price {
    color: #ff4d4d;
    font-weight: bold;
}

.btn {
    margin-top: 10px;
    padding: 10px;
    background: var(--rojo);
    border-radius: 20px;
    border: none;
    color: white;
    cursor: pointer;
}

.footer {
    background: #0a0505;
    padding: 20px;
    text-align: center;
    color: #888;
    margin-top: 40px;
}
</style>
</head>

<body>

<div class="navbar">
    <a href="index.html" class="back-btn">⬅ Volver</a>
</div>

<!-- 🎟️ EVENTOS -->
<div class="section">
    <h2>🎟️ Eventos</h2>

    <div class="event">
        📍 Santo Domingo - 10 Abril 2026 <br><br>
        <button class="btn" onclick="reservar()">Reservar</button>
    </div>

    <div class="event">
        📍 Santiago - 25 Abril 2026 <br><br>
        <button class="btn" onclick="reservar()">Reservar</button>
    </div>
</div>

<!-- 🛍️ TIENDA -->
<div class="section">
    <h2>🛍️ Tienda</h2>

    <!-- 🛒 CARRITO -->
    <div class="carrito-box">
        <h3>🛒 Carrito</h3>
        <ul id="carrito"></ul>
        <p>Total: $<span id="total">0</span></p>
        <button class="btn" onclick="pagar()">Guardar Compra 🔥</button>
    </div>

    <div class="store">

        <div class="product">
            <img src="ropa1.jpg">
            <p>Hoodie LIL NAAY</p>
            <p class="price">$25</p>

            <button class="btn" onclick="agregar('Hoodie',25)">Comprar</button>
        </div>

        <div class="product">
            <img src="ropa2.jpg">
            <p>T-Shirt LIL NAAY</p>
            <p class="price">$15</p>

            <button class="btn" onclick="agregar('T-Shirt',15)">Comprar</button>
        </div>

    </div>
</div>

<div class="footer">
    © 2026 LIL NAAY — Página creada por J.D
</div>

<!-- 🔥 FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "lil-naay.firebaseapp.com",
  projectId: "lil-naay"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🛒 CARRITO
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function guardarCarrito(){
    localStorage.setItem("carrito", JSON.stringify(carrito));
}

window.agregar = function(nombre,precio){
    carrito.push({nombre,precio});
    guardarCarrito();
    mostrar();
}

window.eliminar = function(index){
    carrito.splice(index,1);
    guardarCarrito();
    mostrar();
}

function mostrar(){
    let lista = document.getElementById("carrito");
    let total = 0;

    lista.innerHTML = "";

    carrito.forEach((p,i)=>{
        lista.innerHTML += `
        <li>
        ${p.nombre} - $${p.precio}
        <button onclick="eliminar(${i})">❌</button>
        </li>`;
        total += p.precio;
    });

    document.getElementById("total").innerText = total;
}

// 💾 GUARDAR COMPRA EN FIREBASE
window.pagar = async function(){

    if(carrito.length === 0){
        alert("Carrito vacío");
        return;
    }

    try{

        await addDoc(collection(db,"compras"),{
            productos: carrito,
            fecha: new Date()
        });

        alert("Compra guardada 🔥");

        carrito = [];
        localStorage.removeItem("carrito");
        mostrar();

    }catch(e){
        alert("Error al guardar");
    }
}

// 🎟️ EVENTO
window.reservar = function(){
    alert("Reserva realizada 🔥");
}

mostrar();

</script>

</body>
</html>
