<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda LIL NAAY</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
    margin: 0;
}

/* 🔥 NAVBAR */
.navbar {
    display: flex;
    align-items: center;
    padding: 20px 30px;
    background: rgba(20, 9, 9, 0.8);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
}

.back-btn {
    background: rgba(255,255,255,0.05);
    padding: 10px 18px;
    border-radius: 20px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.back-btn:hover {
    background: rgba(139, 0, 0, 0.5);
}

/* 🛍️ PRODUCTOS */
.store {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.product {
    background: #222;
    padding: 15px;
    border-radius: 10px;
    width: 200px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.6);
}

.product img {
    width: 100%;
}

/* 🔘 BOTONES */
button {
    margin-top: 10px;
    padding: 10px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #b30000;
}

select {
    margin-top: 5px;
    padding: 5px;
    width: 100%;
}

/* 📄 COPYRIGHT */
.footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.6);
    padding: 10px;
    font-size: 14px;
    color: #ccc;
    text-align: center;
    backdrop-filter: blur(5px);
}
</style>

</head>
<body>

<!-- 🔥 NAVBAR -->
<div class="navbar">
    <a href="index.html" class="back-btn">⬅ Volver</a>
</div>

<h1>🔥 Tienda LIL NAAY</h1>

<div class="store" id="productos"></div>

<h2>🛒 Carrito</h2>
<ul id="carrito"></ul>
<h3>Total: $<span id="total">0</span></h3>

<button onclick="pagar()">Pagar</button>

<!-- 📄 COPYRIGHT -->
<div class="footer">
    © <span id="year"></span> LIL NAAY - Todos los derechos reservados
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
  authDomain: "lil-naay.firebaseapp.com",
  projectId: "lil-naay"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

/* 🔥 CARGAR PRODUCTOS */
async function cargarProductos(){
    const contenedor = document.getElementById("productos");
    contenedor.innerHTML = "";

    const snap = await getDocs(collection(db,"productos"));

    snap.forEach(doc=>{
        let p = doc.data();

        contenedor.innerHTML += `
        <div class="product">
            <img src="${p.imagen}">
            <p>${p.nombre}</p>
            <p>$${p.precio}</p>

            <select id="talla-${doc.id}">
                <option>S</option>
                <option>M</option>
                <option>L</option>
            </select>

            <select id="color-${doc.id}">
                <option>Rojo</option>
                <option>Negro</option>
            </select>

            <button onclick="agregar('${p.nombre}',${p.precio},'talla-${doc.id}','color-${doc.id}')">
                Comprar
            </button>
        </div>`;
    });
}

/* ➕ AGREGAR */
window.agregar = function(nombre, precio, tallaId, colorId){
    let talla = document.getElementById(tallaId).value;
    let color = document.getElementById(colorId).value;

    carrito.push({ nombre, precio, talla, color });

    localStorage.setItem("carrito", JSON.stringify(carrito));
    mostrar();
}

/* ❌ ELIMINAR */
window.eliminar = function(i){
    carrito.splice(i,1);
    localStorage.setItem("carrito", JSON.stringify(carrito));
    mostrar();
}

/* 🔄 MOSTRAR */
function mostrar(){
    let lista = document.getElementById("carrito");
    let total = 0;

    lista.innerHTML = "";

    carrito.forEach((p,i)=>{
        lista.innerHTML += `
        <li>
        ${p.nombre} - $${p.precio} | ${p.talla} | ${p.color}
        <button onclick="eliminar(${i})">❌</button>
        </li>`;
        total += p.precio;
    });

    document.getElementById("total").innerText = total;
}

/* 💳 PAGAR */
window.pagar = async function(){
    if(carrito.length === 0){
        alert("Carrito vacío ❌");
        return;
    }

    await addDoc(collection(db,"compras"),{
        productos: carrito,
        fecha: new Date()
    });

    alert("Compra guardada 🔥");

    carrito = [];
    localStorage.removeItem("carrito");
    mostrar();
}

/* 📅 AÑO AUTOMÁTICO */
document.getElementById("year").innerText = new Date().getFullYear();

/* INIT */
cargarProductos();
mostrar();

</script>

</body>
</html>
