<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIL NAAY - Inicio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
    --rojo:#ff0000;
    --rojo-fuerte:#ff1a1a;
    --rojo-oscuro:#8b0000;
}

/* FONDO GLOBAL */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;

    background:
    linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:40px 30px;

    background:linear-gradient(90deg,#1a0000,#000);
    border-bottom:1px solid #ff000030;

    box-shadow:0 0 40px rgba(255,0,0,0.2);
}

.header img{
    width:110px;
    border-radius:15px;
    margin-right:20px;

    box-shadow:
    0 0 10px #ff0000,
    0 0 25px rgba(255,0,0,0.5);
}

/* TITULO */
.header h2{
    font-size:26px;
    letter-spacing:2px;
    text-shadow:0 0 10px rgba(255,0,0,0.6);
}

small{
    color:#bbb;
}

/* BOTONES */
.btn{
    background:linear-gradient(45deg,#8b0000,#ff0000);
    padding:10px 20px;
    border:none;
    border-radius:25px;
    color:white;
    cursor:pointer;

    box-shadow:0 0 10px rgba(255,0,0,0.4);
    transition:0.3s;
}

.btn:hover{
    background:linear-gradient(45deg,#ff0000,#ff4d4d);
    transform:scale(1.08);

    box-shadow:
    0 0 15px #ff0000,
    0 0 40px rgba(255,0,0,0.6);
}

/* CONTENEDOR */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* CARD */
.card{
    background:rgba(0,0,0,0.65);
    padding:30px;
    border-radius:20px;
    margin-top:30px;

    border:1px solid rgba(255,0,0,0.2);

    box-shadow:
    0 0 25px rgba(255,0,0,0.2),
    inset 0 0 20px rgba(255,0,0,0.1);

    backdrop-filter:blur(10px);

    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:
    0 0 35px rgba(255,0,0,0.4),
    inset 0 0 25px rgba(255,0,0,0.2);
}

/* MODAL */
.modal{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;

    background:rgba(0,0,0,0.85);

    display:none;
    justify-content:center;
    align-items:center;
}

/* CAJA */
.box{
    background:#0a0a0a;
    padding:25px;
    border-radius:15px;
    width:320px;

    border:1px solid #ff000030;

    box-shadow:
    0 0 25px rgba(255,0,0,0.4),
    inset 0 0 15px rgba(255,0,0,0.1);
}

/* INPUTS */
input{
    width:100%;
    padding:10px;
    margin:8px 0;

    border:none;
    border-radius:8px;

    background:#111;
    color:white;

    outline:none;
    transition:0.2s;
}

input:focus{
    background:#1a0000;
    box-shadow:0 0 10px rgba(255,0,0,0.6);
}

/* MENSAJE */
#mensaje{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:12px 18px;
    border-radius:10px;

    display:none;

    font-size:14px;

    box-shadow:
    0 0 15px rgba(0,0,0,0.8),
    0 0 20px rgba(255,0,0,0.5);
}

/* TITULOS */
h2{
    text-shadow:0 0 10px rgba(255,0,0,0.5);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

    <div class="header-left">
        <img src="Lil Naay.png">
        <div>
            <h2>LIL NAAY</h2>
            <small>Artista urbano • Trap</small>
        </div>
    </div>

    <div>
        <button class="btn" onclick="abrirPerfil()">👤 Perfil</button>
        <button class="btn" onclick="entrarTienda()">Entrar</button>
    </div>

</div>

<div class="container">

<div class="card">
<h2>🔥 Comunidad</h2>

<button class="btn" onclick="abrirRegistro()">Registrarse</button>
<button class="btn" onclick="abrirLogin()">Iniciar Sesión</button>

<p>Suscriptores: <span id="contador">0</span></p>
</div>

</div>

<!-- REGISTRO -->
<div class="modal" id="registro">
<div class="box">
<h3>Crear Cuenta</h3>

<input id="rUser" placeholder="Usuario">
<input id="rEmail" placeholder="Correo">
<input id="rPass" type="password" placeholder="Contraseña">
<input id="rPais" placeholder="País">
<input id="rProvincia" placeholder="Provincia">
<input id="rEdad" placeholder="Edad">

<button class="btn" onclick="registrar()">Crear</button>
<button class="btn" onclick="cerrar()">Cancelar</button>
</div>
</div>

<!-- LOGIN -->
<div class="modal" id="login">
<div class="box">
<h3>Iniciar Sesión</h3>

<input id="lEmail" placeholder="Correo">
<input id="lPass" type="password" placeholder="Contraseña">

<button class="btn" onclick="loginUser()">Entrar</button>

<p style="font-size:13px;color:#ff4d4d;cursor:pointer"
onclick="recuperar()">¿Olvidaste tu contraseña?</p>

<button class="btn" onclick="cerrar()">Cancelar</button>
</div>
</div>

<!-- PERFIL -->
<div class="modal" id="perfil">
<div class="box">
<h3>👤 Mi Perfil</h3>

<p><b>Usuario:</b> <span id="pUser"></span></p>
<p><b>Email:</b> <span id="pEmail"></span></p>
<p><b>País:</b> <span id="pPais"></span></p>
<p><b>Provincia:</b> <span id="pProvincia"></span></p>
<p><b>Edad:</b> <span id="pEdad"></span></p>

<button class="btn" onclick="logout()">Cerrar sesión</button>
<button class="btn" onclick="cerrar()">Cerrar</button>
</div>
</div>

<div id="mensaje"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
sendPasswordResetEmail,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* UI */
window.abrirRegistro=()=>document.getElementById("registro").style.display="flex";
window.abrirLogin=()=>document.getElementById("login").style.display="flex";
window.abrirPerfil=()=>cargarPerfil();
window.cerrar=()=>{
["registro","login","perfil"].forEach(id=>{
document.getElementById(id).style.display="none";
});
}

/* MENSAJE */
function msg(t,ok=true){
let m=document.getElementById("mensaje");
m.innerText=t;
m.style.display="block";
m.style.background=ok?"green":"red";
setTimeout(()=>m.style.display="none",3000);
}

/* REGISTRO */
window.registrar=async function(){
try{
let email=rEmail.value;
let pass=rPass.value;

const cred=await createUserWithEmailAndPassword(auth,email,pass);

await addDoc(collection(db,"usuarios"),{
uid:cred.user.uid,
usuario:rUser.value,
email,
pais:rPais.value,
provincia:rProvincia.value,
edad:rEdad.value
});

await addDoc(collection(db,"suscriptores"),{
email,
fecha:new Date()
});

localStorage.setItem("usuario",email);

msg("Cuenta creada 🔥");
cerrar();
cargarContador();

}catch(e){
msg(e.message,false);
}
}

/* LOGIN */
window.loginUser=async function(){
try{
let email=lEmail.value;
let pass=lPass.value;

await signInWithEmailAndPassword(auth,email,pass);

localStorage.setItem("usuario",email);

msg("Bienvenido 🔥");
cerrar();

}catch{
msg("Datos incorrectos",false);
}
}

/* RECUPERAR */
window.recuperar=async function(){
let email=lEmail.value;
if(!email) return msg("Escribe tu correo",false);

await sendPasswordResetEmail(auth,email);
msg("Correo enviado 📧");
}

/* PERFIL */
async function cargarPerfil(){

let email=localStorage.getItem("usuario");

if(!email){
msg("No has iniciado sesión",false);
return;
}

const snap=await getDocs(collection(db,"usuarios"));

let user=snap.docs.find(d=>d.data().email===email);

if(!user){
msg("Usuario no encontrado",false);
return;
}

let u=user.data();

pUser.innerText=u.usuario;
pEmail.innerText=u.email;
pPais.innerText=u.pais;
pProvincia.innerText=u.provincia;
pEdad.innerText=u.edad;

document.getElementById("perfil").style.display="flex";
}

/* LOGOUT */
window.logout=async function(){
await signOut(auth);
localStorage.removeItem("usuario");
msg("Sesión cerrada");
cerrar();
}

/* ENTRAR */
window.entrarTienda=async function(){

let email=localStorage.getItem("usuario");

if(!email) return msg("Inicia sesión",false);

const snap=await getDocs(collection(db,"suscriptores"));

let ok=snap.docs.some(d=>d.data().email===email);

if(ok){
window.location.href="menu.html";
}else{
msg("No autorizado",false);
}
}

/* CONTADOR */
async function cargarContador(){
const snap=await getDocs(collection(db,"suscriptores"));
contador.innerText=snap.size;
}

cargarContador();

</script>

</body>
</html>
