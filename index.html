<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIL NAAY - Inicio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
    --rojo:#8b0000;
}

/* GENERAL */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0a0a0a,#2a0000);
    color:white;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    padding:40px;
    background:linear-gradient(90deg,#8b0000,#1a0000);
    border-bottom-left-radius:40px;
    border-bottom-right-radius:40px;
}

.header img{
    width:140px;
    border-radius:20px;
    margin-right:30px;
}

.btn{
    padding:12px 25px;
    margin-top:10px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#ff0000,#8b0000);
    color:white;
    cursor:pointer;
}

/* CARD */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:#111;
    padding:25px;
    border-radius:15px;
    margin-top:30px;
}

/* MODAL */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    background:#111;
    padding:30px;
    border-radius:15px;
    width:320px;
}

.modal input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
    background:#1a1a1a;
    color:white;
}

/* MENSAJE */
#mensaje{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:15px;
    border-radius:10px;
    display:none;
    z-index:1000;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="Lil Naay.png">
    <div>
        <h1>LIL NAAY</h1>
        <p>Artista urbano • Trap</p>
        <button onclick="entrarTienda()" class="btn">Ver Eventos & Tienda</button>
    </div>
</div>

<div class="container">

<div class="card">
    <h2>🔥 Comunidad</h2>

    <button onclick="abrirRegistro()" class="btn">Registrarse</button>
    <button onclick="abrirLogin()" class="btn">Iniciar Sesión</button>

    <button onclick="loginGoogle()" class="btn">
        <i class="fab fa-google"></i> Google
    </button>

    <p>Suscriptores: <span id="contador">0</span></p>
</div>

</div>

<!-- MODAL REGISTRO -->
<div class="modal" id="modalRegistro">
<div class="modal-content">
<h3>Crear Cuenta</h3>

<input id="r_user" placeholder="Usuario">
<input id="r_email" placeholder="Correo">
<input id="r_pass" type="password" placeholder="Contraseña">
<input id="r_pais" placeholder="País">
<input id="r_provincia" placeholder="Provincia">
<input id="r_edad" type="number" placeholder="Edad">

<button onclick="registrar()" class="btn">Crear</button>
<button onclick="cerrarModales()" class="btn">Cancelar</button>
</div>
</div>

<!-- MODAL LOGIN -->
<div class="modal" id="modalLogin">
<div class="modal-content">
<h3>Iniciar Sesión</h3>

<input id="l_email" placeholder="Correo">
<input id="l_pass" type="password" placeholder="Contraseña">

<button onclick="login()" class="btn">Entrar</button>
<button onclick="cerrarModales()" class="btn">Cancelar</button>
</div>
</div>

<div id="mensaje"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore, collection, addDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* MENSAJE */
function msg(t,ok=true){
    let m=document.getElementById("mensaje");
    m.innerText=t;
    m.style.display="block";
    m.style.background= ok ? "#008000" : "#b30000";
    setTimeout(()=>m.style.display="none",2500);
}

/* MODALES */
window.abrirRegistro=()=>modalRegistro.style.display="flex";
window.abrirLogin=()=>modalLogin.style.display="flex";
window.cerrarModales=()=>{
    modalRegistro.style.display="none";
    modalLogin.style.display="none";
}

/* REGISTRO REAL */
window.registrar = async function(){

    let email = r_email.value;
    let pass = r_pass.value;

    if(!email || !pass){
        msg("Completa datos",false);
        return;
    }

    try{

        const userCred = await createUserWithEmailAndPassword(auth,email,pass);

        // guardar info extra
        await addDoc(collection(db,"usuarios"),{
            uid: userCred.user.uid,
            usuario: r_user.value,
            email,
            pais: r_pais.value,
            provincia: r_provincia.value,
            edad: Number(r_edad.value),
            fecha: new Date()
        });

        // mantener tu sistema
        await addDoc(collection(db,"suscriptores"),{
            email,
            fecha:new Date()
        });

        localStorage.setItem("usuario",email);

        msg("Cuenta creada 🔥");
        cerrarModales();
        cargarContador();

    }catch(e){
        msg(e.message,false);
    }
}

/* LOGIN REAL */
window.login = async function(){

    let email = l_email.value;
    let pass = l_pass.value;

    try{
        await signInWithEmailAndPassword(auth,email,pass);

        localStorage.setItem("usuario",email);

        msg("Bienvenido 🔥");
        cerrarModales();

    }catch(e){
        msg("Error login",false);
    }
}

/* GOOGLE */
window.loginGoogle = async function(){
    let r = await signInWithPopup(auth,provider);
    let email = r.user.email;

    localStorage.setItem("usuario",email);

    const snap = await getDocs(collection(db,"suscriptores"));
    let existe = snap.docs.some(d=>d.data().email===email);

    if(!existe){
        await addDoc(collection(db,"suscriptores"),{
            email,
            fecha:new Date()
        });
    }

    msg("Google OK");
    cargarContador();
}

/* ENTRAR */
window.entrarTienda = async function(){

    let email = localStorage.getItem("usuario");

    if(!email){
        msg("Debes iniciar sesión",false);
        return;
    }

    const snap = await getDocs(collection(db,"suscriptores"));
    let ok = snap.docs.some(d=>d.data().email===email);

    if(ok){
        window.location="menu.html";
    }else{
        msg("No autorizado",false);
    }
}

/* CONTADOR */
async function cargarContador(){
    const snap = await getDocs(collection(db,"suscriptores"));
    contador.innerText = snap.size;
}

cargarContador();

</script>

</body>
</html>
