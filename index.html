<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIL NAAY - Inicio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
    --rojo:#ff0000;
    --rojo-fuerte:#ff1a1a;
    --rojo-oscuro:#8b0000;
}

/* RESET */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    background:black;
}

/* HERO (PORTADA) */
.hero{
    position:relative;
    width:100%;
    height:420px;
    min-height:420px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* 🔥 CAPA OSCURA PROFESIONAL */
.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.9));
    z-index:1;
}

/* 🔥 BORDE ROJO ABAJO */
.hero::after{
    content:"";
    position:absolute;
    bottom:0;
    width:100%;
    height:3px;
    background:red;
    box-shadow:0 0 15px red, 0 0 30px red;
    z-index:3;
}

/* fondo */
.hero-bg{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.6);
}

/* artista */
.hero-artista{
    position:absolute;
    left:0;
    bottom:0;
    height:100%;
    max-height:420px;
    z-index:2;

    filter:drop-shadow(0 0 25px rgba(255,0,0,0.7));
}
/* texto central */
.hero-texto{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:600px;
    max-width:90%;
    z-index:2;

    filter:drop-shadow(0 0 20px red);

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}
/* botones derecha */
.hero-buttons{
    position:absolute;
    right:60px;
    bottom:40px;
    display:flex;
    gap:15px;
    z-index:3;
}

/* botones imagen */
.btn-img{
    background:none;
    border:none;
    cursor:pointer;
}

.btn-img img{
    width:120px;
    transition:0.3s;
    filter:drop-shadow(0 0 10px rgba(255,0,0,0.6));
}

.btn-img img:hover{
    transform:scale(1.1);
    filter:drop-shadow(0 0 25px red);
}

/* CONTENEDOR */
.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

/* CARD */
.card{
    background:rgba(0,0,0,0.75);
    padding:40px;
    border-radius:20px;
    margin-top:-60px;

    border:1px solid rgba(255,0,0,0.2);

    box-shadow:
    0 0 40px rgba(255,0,0,0.3),
    inset 0 0 20px rgba(255,0,0,0.1);

    backdrop-filter:blur(12px);
    text-align:center;
}

/* TITULO */
.card h2{
    font-size:28px;
    margin-bottom:20px;
    text-shadow:0 0 10px red;
}

/* BOTONES */
.btn{
    background:linear-gradient(45deg,#8b0000,#ff0000);
    padding:12px 25px;
    border:none;
    border-radius:30px;
    color:white;
    cursor:pointer;
    margin:10px;

    box-shadow:0 0 15px rgba(255,0,0,0.4);
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.08);
    box-shadow:
    0 0 25px red,
    0 0 50px rgba(255,0,0,0.6);
}

/* TEXTO */
p{
    font-size:18px;
}

/* MODAL */
.modal{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}

/* CAJA */
.box{
    background:#0a0a0a;
    padding:25px;
    border-radius:15px;
    width:320px;

    border:1px solid #ff000030;

    box-shadow:
    0 0 25px rgba(255,0,0,0.4),
    inset 0 0 15px rgba(255,0,0,0.1);
}

/* INPUTS */
input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
}

input:focus{
    background:#1a0000;
    box-shadow:0 0 10px red;
}

/* MENSAJE */
#mensaje{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:12px 18px;
    border-radius:10px;
    display:none;
    font-size:14px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="hero">

    <!-- FONDO -->
    <img src="fondo.png" class="hero-bg">

    <!-- ARTISTA -->
    <img src="artista.png" class="hero-artista">

    <!-- TEXTO -->
    <img src="texto.png" class="hero-texto">

    <!-- BOTONES -->
    <div class="hero-buttons">
        <button class="btn-img" onclick="abrirPerfil()">
            <img src="btn_perfil.png">
        </button>

        <button class="btn-img" onclick="entrarTienda()">
            <img src="btn_entrar.png">
        </button>
    </div>

</div>

<div class="container">

<div class="card">
<h2>🔥 Comunidad</h2>

<button class="btn" onclick="abrirRegistro()">Registrarse</button>
<button class="btn" onclick="abrirLogin()">Iniciar Sesión</button>

<p>Suscriptores: <span id="contador">0</span></p>
</div>

</div>

<!-- REGISTRO -->
<div class="modal" id="registro">
<div class="box">
<h3>Crear Cuenta</h3>

<input id="rUser" placeholder="Usuario">
<input id="rEmail" placeholder="Correo">
<input id="rPass" type="password" placeholder="Contraseña">
<input id="rPais" placeholder="País">
<input id="rProvincia" placeholder="Provincia">
<input id="rEdad" placeholder="Edad">

<button class="btn" onclick="registrar()">Crear</button>
<button class="btn" onclick="cerrar()">Cancelar</button>
</div>
</div>

<!-- LOGIN -->
<div class="modal" id="login">
<div class="box">
<h3>Iniciar Sesión</h3>

<input id="lEmail" placeholder="Correo">
<input id="lPass" type="password" placeholder="Contraseña">

<button class="btn" onclick="loginUser()">Entrar</button>

<p style="font-size:13px;color:#ff4d4d;cursor:pointer"
onclick="recuperar()">¿Olvidaste tu contraseña?</p>

<button class="btn" onclick="cerrar()">Cancelar</button>
</div>
</div>

<!-- PERFIL -->
<div class="modal" id="perfil">
<div class="box">
<h3>👤 Mi Perfil</h3>

<p><b>Usuario:</b> <span id="pUser"></span></p>
<p><b>Email:</b> <span id="pEmail"></span></p>
<p><b>País:</b> <span id="pPais"></span></p>
<p><b>Provincia:</b> <span id="pProvincia"></span></p>
<p><b>Edad:</b> <span id="pEdad"></span></p>

<button class="btn" onclick="logout()">Cerrar sesión</button>
<button class="btn" onclick="cerrar()">Cerrar</button>
</div>
</div>

<div id="mensaje"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
sendPasswordResetEmail,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* UI */
window.abrirRegistro=()=>document.getElementById("registro").style.display="flex";
window.abrirLogin=()=>document.getElementById("login").style.display="flex";
window.abrirPerfil=()=>cargarPerfil();
window.cerrar=()=>{
["registro","login","perfil"].forEach(id=>{
document.getElementById(id).style.display="none";
});
}

/* MENSAJE */
function msg(t,ok=true){
let m=document.getElementById("mensaje");
m.innerText=t;
m.style.display="block";
m.style.background=ok?"green":"red";
setTimeout(()=>m.style.display="none",3000);
}

/* REGISTRO */
window.registrar=async function(){
try{
let email=rEmail.value;
let pass=rPass.value;

const cred=await createUserWithEmailAndPassword(auth,email,pass);

await addDoc(collection(db,"usuarios"),{
uid:cred.user.uid,
usuario:rUser.value,
email,
pais:rPais.value,
provincia:rProvincia.value,
edad:rEdad.value
});

await addDoc(collection(db,"suscriptores"),{
email,
fecha:new Date()
});

localStorage.setItem("usuario",email);

msg("Cuenta creada 🔥");
cerrar();
cargarContador();

}catch(e){
msg(e.message,false);
}
}

/* LOGIN */
window.loginUser=async function(){
try{
let email=lEmail.value;
let pass=lPass.value;

await signInWithEmailAndPassword(auth,email,pass);

localStorage.setItem("usuario",email);

msg("Bienvenido 🔥");
cerrar();

}catch{
msg("Datos incorrectos",false);
}
}

/* RECUPERAR */
window.recuperar=async function(){
let email=lEmail.value;
if(!email) return msg("Escribe tu correo",false);

await sendPasswordResetEmail(auth,email);
msg("Correo enviado 📧");
}

/* PERFIL */
async function cargarPerfil(){

let email=localStorage.getItem("usuario");

if(!email){
msg("No has iniciado sesión",false);
return;
}

const snap=await getDocs(collection(db,"usuarios"));

let user=snap.docs.find(d=>d.data().email===email);

if(!user){
msg("Usuario no encontrado",false);
return;
}

let u=user.data();

pUser.innerText=u.usuario;
pEmail.innerText=u.email;
pPais.innerText=u.pais;
pProvincia.innerText=u.provincia;
pEdad.innerText=u.edad;

document.getElementById("perfil").style.display="flex";
}

/* LOGOUT */
window.logout=async function(){
await signOut(auth);
localStorage.removeItem("usuario");
msg("Sesión cerrada");
cerrar();
}

/* ENTRAR */
window.entrarTienda=async function(){

let email=localStorage.getItem("usuario");

if(!email) return msg("Inicia sesión",false);

const snap=await getDocs(collection(db,"suscriptores"));

let ok=snap.docs.some(d=>d.data().email===email);

if(ok){
window.location.href="menu.html";
}else{
msg("No autorizado",false);
}
}

/* CONTADOR */
async function cargarContador(){
const snap=await getDocs(collection(db,"suscriptores"));
contador.innerText=snap.size;
}

cargarContador();

</script>

</body>
</html>
