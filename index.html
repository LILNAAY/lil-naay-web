<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIL NAAY</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{--rojo:#ff0000;}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:black;
color:white;
}

/* NAV */
.nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 25px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:100;
}

.menu a{color:#ccc;margin:0 10px;text-decoration:none;}
.menu a:hover{color:red;}

.login-top{
border:1px solid red;
padding:8px 14px;
border-radius:20px;
background:none;
color:red;
cursor:pointer;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.hero img{position:absolute;width:100%;height:100%;object-fit:cover;}

.hero-buttons{
position:absolute;
bottom:40px;
display:flex;
gap:20px;
}

.btn{
padding:12px 20px;
border:none;
background:red;
color:white;
cursor:pointer;
border-radius:8px;
}
</style>
</head>

<body>

<div class="nav">
<div>LIL NAAY</div>

<div class="menu" id="menu">
<a href="#">Inicio</a>
<a href="#">Música</a>
<a href="#">Tienda</a>
</div>

<button class="login-top" id="btnLogin">Login</button>
</div>

<div class="hero">
<img src="fondo.png">

<div class="hero-buttons">
<button class="btn" onclick="entrar()">Entrar</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"TU_API_KEY",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const auth = getAuth(app);

const btn = document.getElementById("btnLogin");

/* 🔥 CONTROL GLOBAL */
onAuthStateChanged(auth,(user)=>{
if(user){
btn.innerText="Perfil";
btn.onclick=()=>window.location.href="menu.html";
localStorage.setItem("usuario",user.email);
}else{
btn.innerText="Login";
btn.onclick=()=>alert("Usa tu sistema actual de login");
localStorage.removeItem("usuario");
}
});

window.entrar=()=>{
if(localStorage.getItem("usuario")){
window.location.href="menu.html";
}else{
alert("Inicia sesión");
}
}

</script>

</body>
</html>
