<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIL NAAY - Inicio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
    --rojo:#ff0000;
}

/* RESET */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    background:black;
    overflow-x:hidden;
}

/* HERO */
.hero{
    position:relative;
    width:100%;
    height:420px;
    overflow:hidden;
}

/* CAPAS */
.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.9));
    z-index:1;
}

.hero::after{
    content:"";
    position:absolute;
    bottom:0;
    width:100%;
    height:3px;
    background:red;
    box-shadow:0 0 15px red, 0 0 30px red;
    z-index:5;
}

/* fondo */
.hero-bg{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
}

/* ARTISTA (FIX RESPONSIVE) */
.hero-artista{
    position:absolute;
    left:0;
    bottom:0;
    height:100%;
    z-index:2;
    filter:drop-shadow(0 0 25px rgba(255,0,0,0.7));
}

/* TEXTO */
.hero-texto{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:600px;
    max-width:90%;
    z-index:3;
    filter:drop-shadow(0 0 20px red);
}

/* BOTONES */
.hero-buttons{
    position:absolute;
    right:60px;
    bottom:40px;
    display:flex;
    gap:15px;
    z-index:4;
}

.btn-img{
    background:none;
    border:none;
    cursor:pointer;
}

.btn-img img{
    width:120px;
    transition:0.3s;
    filter:drop-shadow(0 0 10px rgba(255,0,0,0.6));
}

.btn-img img:hover{
    transform:scale(1.1);
}

/* CONTENIDO */
.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

.card{
    background:rgba(0,0,0,0.75);
    padding:40px;
    border-radius:20px;
    margin-top:-60px;
    border:1px solid rgba(255,0,0,0.2);
    box-shadow:0 0 40px rgba(255,0,0,0.3);
    text-align:center;
}

.card h2{
    text-shadow:0 0 10px red;
}

.btn{
    background:linear-gradient(45deg,#8b0000,#ff0000);
    padding:12px 25px;
    border:none;
    border-radius:30px;
    color:white;
    cursor:pointer;
    margin:10px;
}

/* MODAL */
.modal{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.box{
    background:#0a0a0a;
    padding:25px;
    border-radius:15px;
    width:320px;
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
}

/* MENSAJE */
#mensaje{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:12px;
    border-radius:10px;
    display:none;
}

/* ===================== */
/* RESPONSIVE */
/* ===================== */

/* TABLET */
@media (max-width:900px){

    .hero{
        height:380px;
    }

    .hero-artista{
        height:90%;
        left:-30px;
        opacity:0.9;
    }

    .hero-texto{
        width:400px;
    }

    .btn-img img{
        width:90px;
    }
}

/* CELULAR */
@media (max-width:600px){

    .hero{
        height:320px;
    }

    /* 🔥 AQUÍ ESTÁ EL FIX */
    .hero-artista{
        height:80%;
        left:-60px;
        opacity:0.7;
    }

    .hero-texto{
        width:260px;
        top:55%;
    }

    .hero-buttons{
        right:50%;
        transform:translateX(50%);
        bottom:15px;
    }

    .btn-img img{
        width:70px;
    }

    .container{
        padding:20px 10px;
    }

    .card{
        margin-top:-20px;
        padding:20px;
    }

    .btn{
        padding:10px 15px;
        font-size:14px;
    }

    .box{
        width:90%;
    }
}
</style>
</head>

<body>

<div class="hero">
    <img src="fondo.png" class="hero-bg">
    <img src="artista.png" class="hero-artista">
    <img src="texto.png" class="hero-texto">

    <div class="hero-buttons">
        <button class="btn-img" onclick="abrirPerfil()">
            <img src="btn_perfil.png">
        </button>

        <button class="btn-img" onclick="entrarTienda()">
            <img src="btn_entrar.png">
        </button>
    </div>
</div>

<div class="container">
<div class="card">
<h2>🔥 Comunidad</h2>

<button class="btn" onclick="abrirRegistro()">Registrarse</button>
<button class="btn" onclick="abrirLogin()">Iniciar Sesión</button>

<p>Suscriptores: <span id="contador">0</span></p>
</div>
</div>

<!-- MODALES -->
<div class="modal" id="registro">
<div class="box">
<h3>Crear Cuenta</h3>
<input id="rUser" placeholder="Usuario">
<input id="rEmail" placeholder="Correo">
<input id="rPass" type="password" placeholder="Contraseña">
<button class="btn" onclick="registrar()">Crear</button>
<button class="btn" onclick="cerrar()">Cancelar</button>
</div>
</div>

<div class="modal" id="login">
<div class="box">
<h3>Iniciar Sesión</h3>
<input id="lEmail" placeholder="Correo">
<input id="lPass" type="password" placeholder="Contraseña">
<button class="btn" onclick="loginUser()">Entrar</button>
<button class="btn" onclick="cerrar()">Cancelar</button>
</div>
</div>

<div id="mensaje"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const db = getFirestore(app);
const auth = getAuth(app);

window.abrirRegistro=()=>registro.style.display="flex";
window.abrirLogin=()=>login.style.display="flex";
window.cerrar=()=>["registro","login"].forEach(id=>document.getElementById(id).style.display="none");

function msg(t){
mensaje.innerText=t;
mensaje.style.display="block";
setTimeout(()=>mensaje.style.display="none",3000);
}

window.registrar=async()=>{
await createUserWithEmailAndPassword(auth,rEmail.value,rPass.value);
await addDoc(collection(db,"suscriptores"),{email:rEmail.value});
msg("Cuenta creada");
cerrar();
cargarContador();
}

window.loginUser=async()=>{
await signInWithEmailAndPassword(auth,lEmail.value,lPass.value);
msg("Bienvenido");
cerrar();
}

async function cargarContador(){
const snap=await getDocs(collection(db,"suscriptores"));
contador.innerText=snap.size;
}

cargarContador();

</script>

</body>
</html>
