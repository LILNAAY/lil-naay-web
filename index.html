<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIL NAAY - Inicio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --rojo: #8b0000;
    --fondo: #1a0f0f;
}

body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #140909, #3a1a1a);
    color: white;
}

.header {
    display: flex;
    align-items: center;
    padding: 50px 30px;
    background: linear-gradient(90deg, var(--rojo), var(--fondo));
    border-bottom-left-radius: 40px;
    border-bottom-right-radius: 40px;
}

.header img {
    width: 160px;
    border-radius: 20px;
    margin-right: 30px;
}

.btn-main {
    background: var(--rojo);
    padding: 12px 25px;
    border-radius: 25px;
    color: white;
    text-decoration: none;
    display: inline-block;
    margin-top: 15px;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.section {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    margin-top: 20px;
    border-radius: 20px;
}
</style>
</head>

<body>

<div class="header">
    <img src="Lil Naay.png">
    <div>
        <h1>LIL NAAY</h1>
        <p>Artista urbano • Trap</p>
        <a href="menu.html" class="btn-main">Ver Eventos & Tienda</a>
    </div>
</div>

<div class="container">

<div class="section">
<h2>Biografía</h2>
<p>Lil Naay es un artista emergente del Trap Latino.</p>
</div>

<div class="section">
<h2>🎵 Nuevos Lanzamientos</h2>

<a href="https://youtu.be/e-XAUCdY7eQ" target="_blank">
<img src="relasionadoconloreal.jpg" width="180">
</a>

<a href="https://youtube.com" target="_blank">
<img src="THE MVP OF THE YEAR.jpg" width="180">
</a>

</div>

<div class="section">
<h2>🔥 Comunidad</h2>

<input type="text" id="usuario" placeholder="Tu correo">
<button onclick="suscribirse()" class="btn-main">Suscribirse</button>

<p>Suscriptores: <span id="contador">0</span></p>
</div>

</div>

<!-- 🔥 FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "lil-naay.firebaseapp.com",
  projectId: "lil-naay"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// FUNCIONES
function formatear(num){
    if(num >= 1000) return (num/1000).toFixed(1)+"K";
    return num;
}

function esCorreoValido(email){
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

window.suscribirse = async function(){

    let email = document.getElementById("usuario").value;

    if(!esCorreoValido(email)){
        alert("Correo inválido");
        return;
    }

    await addDoc(collection(db, "suscriptores"), {
        email: email,
        fecha: new Date()
    });

    alert("Suscrito 🔥");

    cargarContador();
}

async function cargarContador(){
    const snap = await getDocs(collection(db,"suscriptores"));
    document.getElementById("contador").innerText = formatear(snap.size);
}

cargarContador();

</script>

</body>
</html>
