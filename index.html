<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIL NAAY - Inicio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
    --rojo:#ff0000;
    --rojo-fuerte:#ff1a1a;
    --rojo-oscuro:#8b0000;
}

/* RESET */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    background:black;
}

/* HERO (PORTADA) */
.hero{
    position:relative;
    width:100%;
    height:420px;
    overflow:hidden;
}

/* 🔥 CAPA OSCURA PROFESIONAL */
.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.9));
    z-index:1;
}

/* 🔥 BORDE ROJO ABAJO */
.hero::after{
    content:"";
    position:absolute;
    bottom:0;
    width:100%;
    height:3px;
    background:red;
    box-shadow:0 0 15px red, 0 0 30px red;
    z-index:3;
}

/* fondo */
.hero-bg{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.6);
}

/* artista */
.hero-artista{
    position:absolute;
    left:40px;
    bottom:0;
    height:95%;
    z-index:2;

    filter:drop-shadow(0 0 25px rgba(255,0,0,0.7));
}

/* 🔥 TEXTO CENTRAL (ARREGLADO) */
.hero-texto{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-40%,-50%); /* 👈 ajuste visual */
    width:500px;
    z-index:2;

    filter:drop-shadow(0 0 20px red);
}

/* botones derecha */
.hero-buttons{
    position:absolute;
    right:40px;
    bottom:40px;
    display:flex;
    gap:15px;
    z-index:3;
}

/* botones imagen */
.btn-img{
    background:none;
    border:none;
    cursor:pointer;
}

.btn-img img{
    width:120px;
    transition:0.3s;
    filter:drop-shadow(0 0 10px rgba(255,0,0,0.6));
}

.btn-img img:hover{
    transform:scale(1.1);
    filter:drop-shadow(0 0 25px red);
}

/* CONTENEDOR */
.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

/* CARD */
.card{
    background:rgba(0,0,0,0.75);
    padding:40px;
    border-radius:20px;
    margin-top:-80px;

    border:1px solid rgba(255,0,0,0.2);

    box-shadow:
    0 0 40px rgba(255,0,0,0.3),
    inset 0 0 20px rgba(255,0,0,0.1);

    backdrop-filter:blur(12px);
    text-align:center;
}

/* TITULO */
.card h2{
    font-size:28px;
    margin-bottom:20px;
    text-shadow:0 0 10px red;
}

/* BOTONES */
.btn{
    background:linear-gradient(45deg,#8b0000,#ff0000);
    padding:12px 25px;
    border:none;
    border-radius:30px;
    color:white;
    cursor:pointer;
    margin:10px;

    box-shadow:0 0 15px rgba(255,0,0,0.4);
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.08);
    box-shadow:
    0 0 25px red,
    0 0 50px rgba(255,0,0,0.6);
}

/* TEXTO */
p{
    font-size:18px;
}

/* MODAL */
.modal{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}

/* CAJA */
.box{
    background:#0a0a0a;
    padding:25px;
    border-radius:15px;
    width:320px;

    border:1px solid #ff000030;

    box-shadow:
    0 0 25px rgba(255,0,0,0.4),
    inset 0 0 15px rgba(255,0,0,0.1);
}

/* INPUTS */
input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
}

input:focus{
    background:#1a0000;
    box-shadow:0 0 10px red;
}

/* MENSAJE */
#mensaje{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:12px 18px;
    border-radius:10px;
    display:none;
    font-size:14px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="hero">

    <img src="fondo.png" class="hero-bg">
    <img src="artista.png" class="hero-artista">
    <img src="texto.png" class="hero-texto">

    <div class="hero-buttons">
        <button class="btn-img" onclick="abrirPerfil()">
            <img src="btn_perfil.png">
        </button>

        <button class="btn-img" onclick="entrarTienda()">
            <img src="btn_entrar.png">
        </button>
    </div>

</div>

<div class="container">

<div class="card">
<h2>🔥 Comunidad</h2>

<button class="btn" onclick="abrirRegistro()">Registrarse</button>
<button class="btn" onclick="abrirLogin()">Iniciar Sesión</button>

<p>Suscriptores: <span id="contador">0</span></p>
</div>

</div>

<!-- TODO TU JS ORIGINAL SIN CAMBIOS -->
<script type="module">
/* TODO IGUAL */
</script>

</body>
</html>
