<!DOCTYPE html>

<style>

}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

.header {
    display: flex;

    padding: 50px;

}

.header img {
    width: 150px;
    border-radius: 15px;
    margin-right: 30px;
}

.btn-main {
    background: var(--rojo);
    padding: 10px 20px;
    border-radius: 20px;
    color: white;
    text-decoration: none;
}

.section {
    padding: 30px;
}

/* NUEVOS LANZAMIENTOS */
.launches {
    display: flex;
    gap: 20px;
}

.launch {
    background: #222;
    padding: 10px;
    border-radius: 10px;
    width: 150px;
    text-align: center;
}

.launch img {
    width: 100%;
    border-radius: 10px;
}

/* REDES */
.socials a {
    margin: 10px;
    font-size: 25px;
    color: white;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    color: #aaa;
}
</style>
</head>

<div class="header">
