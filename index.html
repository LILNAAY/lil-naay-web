<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIL NAAY - Inicio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
    --rojo:#ff0000;
    --rojo-fuerte:#ff1a1a;
    --rojo-oscuro:#8b0000;
}

/* RESET */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    background:black;
    overflow:hidden;
    height:100vh;
}

/* 🔥 PARTÍCULAS (AGREGADO) */
.particulas{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
    z-index:0;
}
.particulas span{
    position:absolute;
    width:2px;
    height:2px;
    background:red;
    opacity:0.5;
    animation:float 10s linear infinite;
}
@keyframes float{
    from{ transform:translateY(100vh); }
    to{ transform:translateY(-10vh); }
}

/* HERO */
.hero{
    position:relative;
    width:100%;
    height:60vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;

    animation:fadeUp 1s ease;
}

/* 🔥 ANIMACIÓN SUAVE */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* CAPAS */
.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.9));
    z-index:1;
}

.hero::after{
    content:"";
    position:absolute;
    bottom:0;
    width:100%;
    height:3px;
    background:red;
    box-shadow:0 0 15px red, 0 0 30px red;
    z-index:5;
}

/* fondo */
.hero-bg{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
}

/* artista */
.hero-artista{
    pointer-events:none;
    bottom:0;
    left:50%;
    transform:translateX(-24%);
    height:94%;
    max-height:420px;
    object-fit:contain;
    z-index:2;
    opacity:0.9;
}

/* texto */
.hero-texto{
    pointer-events:none;
    top:40%;
    left:50%;
    transform:translateX(-50%);
    width:600px;
    max-width:90%;
    z-index:3;
}

/* bio */
.hero-bio{
    position:absolute;
    top:65%;
    left:50%;
    transform:translateX(-50%);
    font-size:18px;
    color:#ff4d4d;
    text-shadow:0 0 10px red;
    z-index:3;
    text-align:center;
}

/* botones */
.hero-buttons{
    position:absolute;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:15px;
    z-index:4;
}
 
.btn-img{
    background:none;
    border:none;
    cursor:pointer;
}

.btn-img img{
    width:120px;
    transition:0.3s;
    filter:drop-shadow(0 0 10px rgba(255,0,0,0.6));
}

.btn-img img:hover{
    transform:scale(1.1);
    filter:drop-shadow(0 0 25px red);
}

/* CONTENIDO */
.container{
    max-width:1000px;
    margin:auto;
    height:40vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 20px;
}

.card{
    width:100%;
    max-width:750px;
    padding:40px;
    border-radius:20px;
    background:radial-gradient(circle at center, rgba(255,0,0,0.15), rgba(0,0,0,0.95));
    border:1px solid rgba(255,0,0,0.3);

    box-shadow:
        0 0 60px rgba(255,0,0,0.2),
        inset 0 0 40px rgba(255,0,0,0.15);

    backdrop-filter:blur(10px);
    text-align:left;

    /* 🔥 GLOW ANIMADO */
    animation:glow 4s infinite;
}

@keyframes glow{
    0%{ box-shadow:0 0 20px rgba(255,0,0,0.2); }
    50%{ box-shadow:0 0 40px rgba(255,0,0,0.6); }
    100%{ box-shadow:0 0 20px rgba(255,0,0,0.2); }
}

.card h2{
    font-size:26px;
    margin-bottom:20px;
    display:flex;
    align-items:center;
    gap:10px;
}

.card p{
    margin-top:20px;
    color:#ccc;
    font-size:15px;
}

/* BOTÓN MEJORADO */
.btn{
    background:linear-gradient(45deg,#8b0000,#ff0000);
    padding:12px 25px;
    border:none;
    border-radius:30px;
    color:white;
    cursor:pointer;
    margin-right:10px;
    box-shadow:0 0 15px rgba(255,0,0,0.4);
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

.btn::before{
    content:"";
    position:absolute;
    width:0%;
    height:100%;
    top:0;
    left:0;
    background:rgba(255,255,255,0.2);
    transition:0.4s;
}

.btn:hover::before{
    width:100%;
}

.btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px red, 0 0 50px rgba(255,0,0,0.6);
}

/* CONTADOR */
#contador{
    font-weight:bold;
    color:#ff4d4d;
    text-shadow:0 0 10px red;
}

/* MODAL */
.modal{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.box{
    background:#0a0a0a;
    padding:25px;
    border-radius:15px;
    width:320px;
    border:1px solid #ff000030;
    box-shadow:0 0 25px rgba(255,0,0,0.4), inset 0 0 15px rgba(255,0,0,0.1);
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
}

input:focus{
    background:#1a0000;
    box-shadow:0 0 10px red;
}

/* MENSAJE */
#mensaje{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:12px 18px;
    border-radius:10px;
    display:none;
    font-size:14px;
    z-index:10000;
}
</style>
</head>

<body>

<!-- 🔥 PARTÍCULAS -->
<div class="particulas" id="particulas"></div>

<div class="hero">
    <img src="fondo.png" class="hero-bg">
    <img src="artista.png" class="hero-artista">
    <img src="texto.png" class="hero-texto">
   
    <div class="hero-buttons">
        <button class="btn-img" onclick="abrirPerfil()">
            <img src="btn_perfil.png">
        </button>

        <button class="btn-img" onclick="entrarTienda()">
            <img src="btn_entrar.png">
        </button>
    </div>
</div>

<div class="container">
<div class="card">
<h2>🔥 Comunidad</h2>

<button class="btn" onclick="abrirRegistro()">Registrarse</button>
<button class="btn" onclick="abrirLogin()">Iniciar Sesión</button>

<p>Suscriptores: <span id="contador">0</span></p>
</div>
</div>

<!-- (TODO TU HTML ORIGINAL SIGUE IGUAL...) -->

<script type="module">
/* 🔥 PARTÍCULAS */
const cont = document.getElementById("particulas");

for(let i=0;i<40;i++){
    let p = document.createElement("span");
    p.style.left = Math.random()*100+"%";
    p.style.animationDuration = (5 + Math.random()*10)+"s";
    cont.appendChild(p);
}
</script>

</body>
</html>
