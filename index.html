<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIL NAAY - Inicio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
    --rojo:#ff0000;
}

/* 🔥 NUEVO */
html{
    scroll-behavior:smooth;
}

/* RESET */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    background:black;
    overflow-x:hidden;
    min-height:100vh;
}

/* NAVBAR */
.nav{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    z-index:10;
    box-sizing:border-box;

    /* 🔥 MEJORA VISUAL */
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(8px);
}

.logo{
    font-weight:bold;
    font-size:20px;
}

.menu{
    display:flex;
    gap:25px;
    position:relative;
}

.menu a{
    color:#ccc;
    text-decoration:none;
    font-size:14px;
}

.menu a:hover,
.menu .active{
    color:red;
}

.nav-right{
    display:flex;
    align-items:center;
    gap:10px;
    flex-shrink:0;
}

.contador-box{
    background:rgba(255,0,0,0.1);
    padding:6px 12px;
    border-radius:20px;
    border:1px solid rgba(255,0,0,0.3);
}

/* BLOQUEO MENU */
.menu.bloqueado a{
    pointer-events:none;
    opacity:0.4;
}

.menu.bloqueado::after{
    content:"🔒 Inicia sesión";
    position:absolute;
    top:35px;
    left:50%;
    transform:translateX(-50%);
    font-size:12px;
    color:#ff4d4d;
}

.login-top{
    border:1px solid red;
    color:red;
    padding:8px 14px;
    border-radius:25px;
    background:none;
    cursor:pointer;
    white-space:nowrap;
    font-size:13px;
}

.login-top:hover{
    background:red;
    color:white;
    box-shadow:0 0 15px red;
}

/* HERO */
.hero{
    position:relative;
    width:100%;
    height:60vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.9));
    z-index:1;
}

.hero::after{
    content:"";
    position:absolute;
    bottom:0;
    width:100%;
    height:3px;
    background:red;
    box-shadow:0 0 15px red, 0 0 30px red;
    z-index:5;
}

.hero-bg{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
}

.hero-artista{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translate(-135%, 0);
    height:85%;
    max-height:450px;
    object-fit:contain;
    z-index:2;
    opacity:0.9;
    pointer-events:none;
}

.hero-texto{
    pointer-events:none;
    position:absolute;
    top:15%;
    left:50%;
    transform:translateX(-50%);
    width:600px;
    max-width:90%;
    z-index:3;
}

/* BOTONES */
.hero-buttons{
    position:absolute;
    right:60px;
    bottom:40px;
    display:flex;
    gap:20px;
    z-index:4;
}

.btn-img{
    background:none;
    border:none;
    cursor:pointer;
}

.btn-img img{
    width:130px;
    transition:0.3s;
    filter:drop-shadow(0 0 10px red);
}

.btn-img img:hover{
    transform:scale(1.1);
    filter:drop-shadow(0 0 25px red);
}

/* 🔥 NUEVAS SECCIONES */
.seccion{
    padding:70px 20px;
    text-align:center;
}

.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    width:200px;
    height:200px;
    background:#111;
    border-radius:10px;
    border:1px solid #ff000030;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px red;
}

/* FOOTER */
footer{
    padding:30px;
    text-align:center;
    background:#050505;
    border-top:1px solid #222;
}

/* MODAL */
.modal{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.box{
    background:#0a0a0a;
    padding:25px;
    border-radius:15px;
    width:320px;
    border:1px solid #ff000030;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    background:#111;
    color:white;
    border:none;
}

/* MENSAJE */
#mensaje{
    position:fixed;
    bottom:20px;
    right:20px;
    display:none;
}

/* RESPONSIVE */
@media (max-width:768px){
    .menu{
        display:none;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
    <div class="logo">LIL NAAY</div>

    <div class="menu" id="menu">
        <a href="#" class="active">INICIO</a>
        <a href="#">MÚSICA</a>
        <a href="#">VIDEOS</a>
        <a href="#">TIENDA</a>
        <a href="#">COMUNIDAD</a>
        <a href="#">SUSCRIPCIÓN</a>
    </div>

    <div class="nav-right">
        <div class="contador-box"> COMUNIDAD 🕷️ <span id="contadorNav">0</span></div>
        <button class="login-top" onclick="abrirLogin()">INICIAR SESIÓN</button>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <img src="fondo.png" class="hero-bg">
    <img src="artista.png" class="hero-artista">
    <img src="texto.png" class="hero-texto">

    <div class="hero-buttons">
        <button class="btn-img" onclick="abrirPerfil()">
            <img src="btn_perfil.png">
        </button>

        <button class="btn-img" onclick="entrarTienda()">
            <img src="btn_entrar.png">
        </button>
    </div>
</div>

<!-- 🔥 NUEVO CONTENIDO (ELIMINA EL ESPACIO NEGRO) -->

<section class="seccion">
    <h2>🔥 Últimos Lanzamientos</h2>
    <div class="cards">
        <div class="card">Canción 1</div>
        <div class="card">Canción 2</div>
        <div class="card">Canción 3</div>
    </div>
</section>

<section class="seccion">
    <h2>🎬 Último Video</h2>
    <iframe width="80%" height="400"
    src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
</section>

<section class="seccion">
    <h2>🛒 Merch</h2>
    <div class="cards">
        <div class="card">Hoodie</div>
        <div class="card">Gorra</div>
        <div class="card">T-Shirt</div>
    </div>
</section>

<section class="seccion">
    <h2>💬 Comunidad</h2>
    <p>Interactúa con otros fans 🔥</p>
</section>

<footer>
    © 2026 LIL NAAY
</footer>

</script>

</body>
</html>
