<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIL NAAY - Inicio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
    --rojo:#ff0000;
}

/* RESET */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    background:black;
    overflow-x:hidden;
    min-height:100vh;
}

/* NAVBAR */
.nav{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    z-index:10;
    box-sizing:border-box;
}

.logo{
    font-weight:bold;
    font-size:20px;
}

/* MENÚ ELIMINADO (oculto para asegurar la limpieza del diseño) */
.menu {
    display: none !important;
}

.nav-right{
    display:flex;
    align-items:center;
    gap:10px;
    flex-shrink:0;
}

.contador-box{
    background:rgba(255,0,0,0.1);
    padding:6px 12px;
    border-radius:20px;
    border:1px solid rgba(255,0,0,0.3);
}

.login-top{
    border:1px solid red;
    color:red;
    padding:8px 14px;
    border-radius:25px;
    background:none;
    cursor:pointer;
    white-space:nowrap;
    font-size:13px;
}

.login-top:hover{
    background:red;
    color:white;
    box-shadow:0 0 15px red;
}

/* HERO */
.hero{
    position:relative;
    width:100%;
    height:60vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.9));
    z-index:1;
}

.hero::after{
    content:"";
    position:absolute;
    bottom:0;
    width:100%;
    height:3px;
    background:red;
    box-shadow:0 0 15px red, 0 0 30px red;
    z-index:5;
}

.hero-bg{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
}

.hero-artista{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%); /* 🔥 centrado real */
    height:85%;
    max-height:450px;
    object-fit:contain;
    z-index:2;
    opacity:0.9;
    pointer-events:none;
}

.hero-texto{
    pointer-events:none;
    position:absolute;
    top:15%;
    left:50%;
    transform:translateX(-50%);
    width:600px;
    max-width:90%;
    z-index:3;
}

/* BOTONES */
.hero-buttons{
    position:absolute;
    right:60px;
    bottom:40px;
    display:flex;
    gap:20px;
    z-index:4;
}

.btn-img{
    background:none;
    border:none;
    cursor:pointer;
}

.btn-img img{
    width:130px;
    transition:0.3s;
    filter:drop-shadow(0 0 10px red);
}

.btn-img img:hover{
    transform:scale(1.1);
    filter:drop-shadow(0 0 25px red);
}

/* NUEVA SECCIÓN: PREVIEWS DE LANZAMIENTOS */
.lanzamientos-seccion {
    background-color: #000;
    padding: 60px 40px;
    color: #fff;
}

.lanzamientos-seccion h2 {
    text-align: center;
    color: var(--rojo);
    text-transform: uppercase;
    font-size: 28px;
    letter-spacing: 2px;
    margin-bottom: 40px;
    text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
}

.lanzamientos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
    max-width: 1200px;
    margin: 0 auto;
}

.lanzamiento-card {
    background: #0a0a0a;
    border: 1px solid rgba(255, 0, 0, 0.2);
    border-radius: 15px;
    overflow: hidden;
    padding: 20px;
    transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
}

.lanzamiento-card:hover {
    transform: translateY(-5px);
    border-color: var(--rojo);
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
}

.preview-img-container {
    width: 100%;
    height: 180px;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
}

.preview-img-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.lanzamiento-info h3 {
    font-size: 20px;
    margin-bottom: 5px;
}

.lanzamiento-info span {
    font-size: 13px;
    color: #888;
}

.audio-player {
    width: 100%;
    margin-top: 20px;
}

/* MODAL */
.modal{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.box{
    background:#0a0a0a;
    padding:25px;
    border-radius:15px;
    width:320px;
    border:1px solid #ff000030;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    background:#111;
    color:white;
    border:none;
}

/* MENSAJE */
#mensaje{
    position:fixed;
    bottom:20px;
    right:20px;
    display:none;
}

/* RESPONSIVE */
@media (max-width:768px){
    .nav{
        padding:10px 15px;
    }

    .login-top{
        padding:6px 10px;
        font-size:12px;
    }

    .contador-box{
        padding:4px 8px;
        font-size:12px;
    }
}

@media (max-width:600px){
    .hero-buttons{
        right:50%;
        transform:translateX(50%);
        bottom:15px;
        gap:10px;
    }

    .btn-img img{
        width:70px;
    }
}
</style>
</head>

<body>

<div class="nav">
    <div class="logo">LIL NAAY</div>

    <div class="nav-right">
        <div class="contador-box"> COMUNIDAD 🕷️ <span id="contadorNav">0</span></div>
        <button class="login-top" onclick="abrirLogin()">INICIAR SESIÓN</button>
    </div>
</div>

<div class="hero">
    <img src="fondo.png" class="hero-bg" alt="Fondo de pantalla">
    <img src="artista.png" class="hero-artista" alt="Artista">
    <img src="texto.png" class="hero-texto" alt="Texto central">

    <div class="hero-buttons">
        <button class="btn-img" onclick="abrirPerfil()">
            <img src="btn_perfil.png" alt="Perfil">
        </button>

        <button class="btn-img" onclick="entrarTienda()">
            <img src="btn_entrar.png" alt="Entrar">
        </button>
    </div>
</div>

<section class="lanzamientos-seccion">
    <h2>Próximos Lanzamientos</h2>
    <div class="lanzamientos-grid">
        <div class="lanzamiento-card">
            <div class="preview-img-container">
                <img src="portada1.png" alt="Portada Lanzamiento 1">
            </div>
            <div class="lanzamiento-info">
                <h3>Sola (Remix)</h3>
                <span>Estreno: 12 Mayo 2026</span>
            </div>
            <audio controls class="audio-player">
                <source src="preview1.mp3" type="audio/mpeg">
                Tu navegador no soporta el reproductor de audio.
            </audio>
        </div>

        <div class="lanzamiento-card">
            <div class="preview-img-container">
                <img src="portada2.png" alt="Portada Lanzamiento 2">
            </div>
            <div class="lanzamiento-info">
                <h3>Oscuridad</h3>
                <span>Estreno: 26 Mayo 2026</span>
            </div>
            <audio controls class="audio-player">
                <source src="preview2.mp3" type="audio/mpeg">
                Tu navegador no soporta el reproductor de audio.
            </audio>
        </div>

        <div class="lanzamiento-card">
            <div class="preview-img-container">
                <img src="portada3.png" alt="Portada Lanzamiento 3">
            </div>
            <div class="lanzamiento-info">
                <h3>Dios Lo Quizo Así (Cap. II)</h3>
                <span>Estreno: 10 Junio 2026</span>
            </div>
            <audio controls class="audio-player">
                <source src="preview3.mp3" type="audio/mpeg">
                Tu navegador no soporta el reproductor de audio.
            </audio>
        </div>
    </div>
</section>

<div class="modal" id="registro">
<div class="box">
<h3>Crear Cuenta</h3>
<input id="rUser" placeholder="Usuario">
<input id="rEmail" placeholder="Correo">
<input id="rPass" type="password" placeholder="Contraseña">
<input id="rPais" placeholder="País">
<input id="rProvincia" placeholder="Provincia">
<input id="rEdad" placeholder="Edad">
<button onclick="registrar()">Crear</button>
<button onclick="cerrar()">Cancelar</button>
</div>
</div>

<div class="modal" id="login">
<div class="box">
<h3>Iniciar Sesión</h3>
<input id="lEmail" placeholder="Correo">
<input id="lPass" type="password" placeholder="Contraseña">
<button onclick="loginUser()">Entrar</button>
<p onclick="recuperar()" style="cursor:pointer;color:#ff4d4d;">¿Olvidaste tu contraseña?</p>
<button onclick="cerrar()">Cancelar</button>
</div>
</div>

<div class="modal" id="perfil">
<div class="box">
<h3>👤 Mi Perfil</h3>
<p><b>Usuario:</b> <span id="pUser"></span></p>
<p><b>Email:</b> <span id="pEmail"></span></p>
<p><b>País:</b> <span id="pPais"></span></p>
<p><b>Provincia:</b> <span id="pProvincia"></span></p>
<p><b>Edad:</b> <span id="pEdad"></span></p>
<button onclick="logout()">Cerrar sesión</button>
<button onclick="cerrar()">Cerrar</button>
</div>
</div>

<div id="mensaje"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const db = getFirestore(app);
const auth = getAuth(app);

window.abrirRegistro=()=>registro.style.display="flex";
window.abrirLogin=()=>login.style.display="flex";
window.abrirPerfil=()=>cargarPerfil();
window.cerrar=()=>["registro","login","perfil"].forEach(id=>document.getElementById(id).style.display="none");

function msg(t,ok=true){
mensaje.innerText=t;
mensaje.style.display="block";
mensaje.style.background=ok?"green":"red";
setTimeout(()=>mensaje.style.display="none",3000);
}

function verificarSesion(){
    let email = localStorage.getItem("usuario");
    let contador = document.getElementById("contadorNav"); // Ajustado al elemento existente
}

window.registrar=async()=>{
try{
const cred=await createUserWithEmailAndPassword(auth,rEmail.value,rPass.value);

await addDoc(collection(db,"usuarios"),{
uid:cred.user.uid,
usuario:rUser.value,
email:rEmail.value,
pais:rPais.value,
provincia:rProvincia.value,
edad:rEdad.value
});

await addDoc(collection(db,"suscriptores"),{
email:rEmail.value,
fecha:new Date()
});

localStorage.setItem("usuario",rEmail.value);
msg("Cuenta creada");
cerrar();
cargarContador();
verificarSesion();

}catch(e){msg(e.message,false);}
}

window.loginUser=async()=>{
try{
await signInWithEmailAndPassword(auth,lEmail.value,lPass.value);
localStorage.setItem("usuario",lEmail.value);
msg("Bienvenido");
cerrar();
verificarSesion();
}catch{msg("Datos incorrectos",false);}
}

window.recuperar=async()=>{
if(!lEmail.value) return msg("Escribe tu correo",false);
await sendPasswordResetEmail(auth,lEmail.value);
msg("Correo enviado");
}

async function cargarPerfil(){
let email=localStorage.getItem("usuario");
if(!email) return msg("No has iniciado sesión",false);

const snap=await getDocs(collection(db,"usuarios"));
let user=snap.docs.find(d=>d.data().email===email);
if(!user) return msg("No encontrado",false);

let u=user.data();
pUser.innerText=u.usuario;
pEmail.innerText=u.email;
pPais.innerText=u.pais;
pProvincia.innerText=u.provincia;
pEdad.innerText=u.edad;

perfil.style.display="flex";
}

window.logout=async()=>{
await signOut(auth);
localStorage.removeItem("usuario");
msg("Sesión cerrada");
cerrar();
verificarSesion();
}

window.entrarTienda=async()=>{
let email=localStorage.getItem("usuario");
if(!email){
    msg("Debes iniciar sesión",false);
    return;
}

const snap=await getDocs(collection(db,"suscriptores"));
let ok=snap.docs.some(d=>d.data().email===email);

if(ok) window.location.href="menu.html";
else msg("No autorizado",false);
}

async function cargarContador(){
const snap=await getDocs(collection(db,"suscriptores"));
document.getElementById("contadorNav").innerText = snap.size;
}

cargarContador();
verificarSesion();

</script>

</body>
</html>
