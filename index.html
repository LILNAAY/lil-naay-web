<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIL NAAY - Inicio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --rojo: #8b0000;
    --rojo-hover: #b30000;
    --fondo: #1a0f0f;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #140909, #3a1a1a);
    color: white;
}

.header {
    display: flex;
    align-items: center;
    padding: 50px 30px;
    background: linear-gradient(90deg, var(--rojo), var(--fondo));
    border-bottom-left-radius: 40px;
    border-bottom-right-radius: 40px;
}

.header img {
    width: 180px;
    height: 180px;
    border-radius: 20px;
    margin-right: 40px;
    object-fit: cover;
}

.btn-main {
    margin-top: 20px;
    background: var(--rojo);
    padding: 12px 25px;
    border-radius: 25px;
    color: white;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

.btn-main:hover {
    background: var(--rojo-hover);
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.section {
    background: rgba(255,255,255,0.04);
    padding: 30px;
    margin-top: 30px;
    border-radius: 20px;
}
</style>
</head>

<body>

<div class="header">
    <img src="Lil Naay.png">
    <div>
        <h1>LIL NAAY</h1>
        <p>Artista urbano • Trap</p>
        <button onclick="entrarTienda()" class="btn-main">Ver Tienda</button>
    </div>
</div>

<div class="container">

<div class="section">
    <h2>🔥 Comunidad</h2>

    <button onclick="loginGoogle()" class="btn-main">
        <i class="fab fa-google"></i> Iniciar con Google
    </button>

    <p style="margin-top:15px;">
        Suscriptores: <span id="contador">0</span>
    </p>
</div>

</div>

<!-- MENSAJE -->
<div id="mensaje" style="
position:fixed;
bottom:20px;
right:20px;
padding:15px;
border-radius:10px;
display:none;
color:white;
z-index:999;">
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
  authDomain: "lil-naay.firebaseapp.com",
  projectId: "lil-naay"
};

// INICIALIZAR
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// MENSAJE
function mostrarMensaje(texto, tipo){
    let msg = document.getElementById("mensaje");
    msg.innerText = texto;
    msg.style.display = "block";
    msg.style.background = tipo === "error" ? "#b30000" : "#008000";

    setTimeout(()=>{
        msg.style.display = "none";
    },2500);
}

// LOGIN GOOGLE
window.loginGoogle = async function(){
    try{
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        let email = user.email;
        localStorage.setItem("usuario", email);

        const snap = await getDocs(collection(db,"suscriptores"));
        let existe = snap.docs.some(doc => doc.data().email === email);

        if(!existe){
            await addDoc(collection(db,"suscriptores"),{
                email: email,
                fecha: new Date()
            });
        }

        mostrarMensaje("✅ Bienvenido " + user.displayName,"ok");
        cargarContador();

    }catch(e){
        mostrarMensaje("❌ Error al iniciar sesión","error");
    }
}

// ENTRAR TIENDA
window.entrarTienda = async function(){

    let email = localStorage.getItem("usuario");

    if(!email){
        mostrarMensaje("⚠️ Inicia sesión primero","error");
        return;
    }

    const snap = await getDocs(collection(db,"suscriptores"));
    let autorizado = snap.docs.some(doc => doc.data().email === email);

    if(autorizado){
        window.location.href = "menu.html";
    }else{
        mostrarMensaje("❌ No autorizado","error");
    }
}

// CONTADOR
async function cargarContador(){
    const snap = await getDocs(collection(db,"suscriptores"));
    document.getElementById("contador").innerText = snap.size;
}

cargarContador();
</script>

</body>
</html>
