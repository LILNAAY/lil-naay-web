<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LIL NAAY - Inicio</title>

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --rojo: #8b0000;
            --rojo-hover: #b30000;
            --fondo: #1a0f0f;
            --texto-secundario: #d6a3a3;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #140909, #3a1a1a);
            color: white;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            padding: 50px 30px;
            background: linear-gradient(90deg, var(--rojo), var(--fondo));
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .header img {
            width: 180px;
            height: 180px;
            border-radius: 20px;
            margin-right: 40px;
            object-fit: cover;
            box-shadow:
                0 15px 30px rgba(0, 0, 0, 0.8),
                0 5px 15px rgba(0, 0, 0, 0.6);
        }

        .header h1 {
            font-size: 56px;
            margin: 0;
        }

        .btn-main {
            margin-top: 20px;
            display: inline-block;
            background: var(--rojo);
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-main:hover {
            background: var(--rojo-hover);
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        .section {
            background: rgba(255,255,255,0.04);
            padding: 30px;
            margin-top: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        input {
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-right: 10px;
        }
    </style>
</head>

<body>

<div class="header">
    <img src="Lil Naay.png" alt="LIL NAAY">
    <div>
        <h1>LIL NAAY</h1>
        <p>Artista urbano • Trap</p>
        <a href="menu.html" class="btn-main">Ver Eventos & Tienda</a>
    </div>
</div>

<div class="container">

    <div class="section">
        <h2>Biografía</h2>
        <p>Lil Naay es un artista emergente del género urbano.</p>
    </div>

    <!-- 🎵 NUEVOS LANZAMIENTOS -->
<div class="section">
    <h2>🎵 Nuevos Lanzamientos</h2>

    <div style="display:flex; gap:20px; flex-wrap:wrap;">

        <div style="width:180px; text-align:center;">
            <img src="single1.jpg" style="width:100%; border-radius:10px;">
            <p>Nuevo Tema</p>
        </div>

        <div style="width:180px; text-align:center;">
            <img src="single2.jpg" style="width:100%; border-radius:10px;">
            <p>Nuevo Álbum</p>
        </div>

    </div>

    <!-- BOTONES REDES -->
    <div style="margin-top:20px;">

        <a href="https://www.instagram.com/" target="_blank" class="btn-main">
            <i class="fab fa-instagram"></i> Instagram
        </a>

        <a href="https://www.youtube.com/" target="_blank" class="btn-main">
            <i class="fab fa-youtube"></i> YouTube
        </a>

    </div>
</div>

    <!-- 🔥 SUSCRIPCIÓN MODIFICADA -->
    <div class="section">
        <h2>🔥 Comunidad</h2>

        <input type="text" id="usuario" placeholder="Tu correo o nombre">
        <button onclick="suscribirse()" class="btn-main">Suscribirse</button>

        <p>Suscriptores: <span id="contador">0</span></p>
    </div>

</div>

<script>
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

// FORMATO 1K, 1M
function formatear(num) {
    if (num >= 1000000) {
        return (num / 1000000).toFixed(1).replace(".0","") + "M";
    }
    if (num >= 1000) {
        return (num / 1000).toFixed(1).replace(".0","") + "K";
    }
    return num;
}

function guardar() {
    localStorage.setItem("usuarios", JSON.stringify(usuarios));
}

// VALIDAR EMAIL
function esCorreoValido(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// 🔥 MENSAJE BONITO
function mostrarMensaje(texto, tipo) {
    let mensaje = document.getElementById("mensaje");

    mensaje.textContent = texto;

    if(tipo === "error"){
        mensaje.style.background = "#b30000";
    } else if(tipo === "ok"){
        mensaje.style.background = "#008000";
    } else {
        mensaje.style.background = "#000";
    }

    mensaje.style.display = "block";

    setTimeout(() => {
        mensaje.style.display = "none";
    }, 2500);
}

function suscribirse() {
    let valor = document.getElementById("usuario").value.trim();

    if(valor === "") return;

    if(!esCorreoValido(valor)){
        mostrarMensaje("❌ Correo inválido", "error");
        return;
    }

    if(usuarios.includes(valor)){
        mostrarMensaje("⚠️ Ya estás suscrito", "error");
        return;
    }

    usuarios.push(valor);

    guardar();
    actualizar();

    document.getElementById("usuario").value = "";

    mostrarMensaje("✅ Suscripción exitosa", "ok");
}

function actualizar() {
    document.getElementById("contador").textContent = formatear(usuarios.length);
}

window.onload = actualizar;
</script>

<div id="mensaje" style="
position: fixed;
bottom: 20px;
right: 20px;
background: #000;
color: white;
padding: 15px 20px;
border-radius: 10px;
display: none;
box-shadow: 0 0 15px rgba(0,0,0,0.5);
font-family: 'Segoe UI';
z-index: 999;
"></div>
    
</body>
</html>
