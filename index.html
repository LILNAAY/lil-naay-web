<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIL NAAY - Inicio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
    --rojo:#ff0000;
}

/* 🔥 NUEVO */
html{
    scroll-behavior:smooth;
}

/* RESET */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    background:black;
    overflow-x:hidden;
    min-height:100vh;
}

/* 🔥 PARTÍCULAS */
.particulas{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
    z-index:0;
}
.particulas span{
    position:absolute;
    width:2px;
    height:2px;
    background:red;
    opacity:0.4;
    animation:float 10s linear infinite;
}
@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

/* NAVBAR */
.nav{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    z-index:10;
    box-sizing:border-box;

    /* 🔥 mejora sutil */
    background:rgba(0,0,0,0.3);
    backdrop-filter:blur(6px);
}

.logo{
    font-weight:bold;
    font-size:20px;
}

.menu{
    display:flex;
    gap:25px;
    position:relative;
}

.menu a{
    color:#ccc;
    text-decoration:none;
    font-size:14px;
}

.menu a:hover,
.menu .active{
    color:red;
}

.nav-right{
    display:flex;
    align-items:center;
    gap:10px;
    flex-shrink:0;
}

.contador-box{
    background:rgba(255,0,0,0.1);
    padding:6px 12px;
    border-radius:20px;
    border:1px solid rgba(255,0,0,0.3);

    /* 🔥 glow */
    box-shadow:0 0 10px rgba(255,0,0,0.2);
}

/* BLOQUEO MENU */
.menu.bloqueado a{
    pointer-events:none;
    opacity:0.4;
}

.menu.bloqueado::after{
    content:"🔒 Inicia sesión";
    position:absolute;
    top:35px;
    left:50%;
    transform:translateX(-50%);
    font-size:12px;
    color:#ff4d4d;
}

.login-top{
    border:1px solid red;
    color:red;
    padding:8px 14px;
    border-radius:25px;
    background:none;
    cursor:pointer;
    white-space:nowrap;
    font-size:13px;
    transition:0.3s;
}

.login-top:hover{
    background:red;
    color:white;
    box-shadow:0 0 15px red;
}

/* HERO */
.hero{
    position:relative;
    width:100%;
    height:60vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;

    animation:fadeUp 1s ease;
}

/* 🔥 animación entrada */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.9));
    z-index:1;
}

.hero::after{
    content:"";
    position:absolute;
    bottom:0;
    width:100%;
    height:3px;
    background:red;
    box-shadow:0 0 15px red, 0 0 30px red;
    z-index:5;
}

.hero-bg{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
}

.hero-artista{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translate(-135%, 0);
    height:85%;
    max-height:450px;
    object-fit:contain;
    z-index:2;
    opacity:0.9;
    pointer-events:none;
}

.hero-texto{
    pointer-events:none;
    position:absolute;
    top:15%;
    left:50%;
    transform:translateX(-50%);
    width:600px;
    max-width:90%;
    z-index:3;
}

/* BOTONES */
.hero-buttons{
    position:absolute;
    right:60px;
    bottom:40px;
    display:flex;
    gap:20px;
    z-index:4;
}

.btn-img{
    background:none;
    border:none;
    cursor:pointer;
}

.btn-img img{
    width:130px;
    transition:0.3s;
    filter:drop-shadow(0 0 10px red);
}

.btn-img img:hover{
    transform:scale(1.1);
    filter:drop-shadow(0 0 25px red);
}

/* 🔥 MENSAJE MEJORADO */
#mensaje{
    position:fixed;
    bottom:20px;
    right:20px;
    display:none;
    padding:12px 16px;
    border-radius:10px;
    font-size:14px;
    box-shadow:0 0 15px rgba(255,0,0,0.4);
}

/* RESPONSIVE */
@media (max-width:768px){
    .menu{display:none;}
}
</style>
</head>

<body>

    <div class="logo">LIL NAAY</div>

    <div class="menu" id="menu">
        <a href="#" class="active">INICIO</a>

        <button class="login-top" onclick="abrirLogin()">INICIAR SESIÓN</button>
