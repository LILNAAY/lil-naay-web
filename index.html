<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIL NAAY - Inicio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
    --rojo:#ff0000;
}

/* RESET */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    background:black;
    overflow-x:hidden;
    min-height:100vh;
}

/* NAVBAR */
.nav{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    z-index:10;
    box-sizing:border-box;
}

.logo{
    font-weight:bold;
    font-size:20px;
}

.menu{
    display:flex;
    gap:25px;
    position:relative;
}

.menu a{
    color:#ccc;
    text-decoration:none;
    font-size:14px;
}

.menu a:hover,
.menu .active{
    color:red;
}

.nav-right{
    display:flex;
    align-items:center;
    gap:10px;
    flex-shrink:0;
}

.contador-box{
    background:rgba(255,0,0,0.1);
    padding:6px 12px;
    border-radius:20px;
    border:1px solid rgba(255,0,0,0.3);
}

/* BLOQUEO MENU */
.menu.bloqueado a{
    pointer-events:none;
    opacity:0.4;
}

.menu.bloqueado::after{
    content:"🔒 Inicia sesión";
    position:absolute;
    top:35px;
    left:50%;
    transform:translateX(-50%);
    font-size:12px;
    color:#ff4d4d;
}

.login-top{
    border:1px solid red;
    color:red;
    padding:8px 14px;
    border-radius:25px;
    background:none;
    cursor:pointer;
    white-space:nowrap;
    font-size:13px;
}

.login-top:hover{
    background:red;
    color:white;
    box-shadow:0 0 15px red;
}

/* HERO */
.hero{
    position:relative;
    width:100%;
    height:60vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.9));
    z-index:1;
}

.hero::after{
    content:"";
    position:absolute;
    bottom:0;
    width:100%;
    height:3px;
    background:red;
    box-shadow:0 0 15px red, 0 0 30px red;
    z-index:5;
}

.hero-bg{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
}

.hero-artista{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translate(-135%, 0);
    height:85%;
    max-height:450px;
    object-fit:contain;
    z-index:2;
    opacity:0.9;
    pointer-events:none;
}

.hero-texto{
    pointer-events:none;
    position:absolute;
    top:15%;
    left:50%;
    transform:translateX(-50%);
    width:600px;
    max-width:90%;
    z-index:3;
}

/* BOTONES */
.hero-buttons{
    position:absolute;
    right:60px;
    bottom:40px;
    display:flex;
    gap:20px;
    z-index:4;
}

.btn-img{
    background:none;
    border:none;
    cursor:pointer;
}

.btn-img img{
    width:130px;
    transition:0.3s;
    filter:drop-shadow(0 0 10px red);
}

.btn-img img:hover{
    transform:scale(1.1);
    filter:drop-shadow(0 0 25px red);
}

/* ===== SECCIÓN PRO ===== */
.music-section{
    padding:60px 40px;
    background:linear-gradient(to bottom,#050505,#0a0a0a);
}

.music-section h3{
    margin-bottom:20px;
    color:#e5e5e5;
    font-size:13px;
    letter-spacing:1px;
}

.music-card{
    display:flex;
    gap:25px;
    background:#0b0b0b;
    padding:20px;
    border-radius:12px;
    border:1px solid #1a1a1a;
    margin-bottom:40px;
    align-items:center;
}

.cover{
    width:140px;
    border-radius:10px;
}

.title{font-size:20px;}
.artist{color:#888;}

.player{
    display:flex;
    align-items:center;
    gap:12px;
    margin:15px 0;
}

.play{
    background:var(--rojo);
    border:none;
    color:white;
    width:38px;
    height:38px;
    border-radius:50%;
    cursor:pointer;
}

.player input{
    flex:1;
}

.videos{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
}

.video{
    background:#0b0b0b;
    border-radius:10px;
    overflow:hidden;
    border:1px solid #1a1a1a;
    transition:0.3s;
    cursor:pointer;
}

.video:hover{
    transform:translateY(-5px);
    border-color:red;
}

.video img{
    width:100%;
    height:120px;
    object-fit:cover;
}

.video p{
    font-size:13px;
    padding:10px;
}

.btn-more{
    background:#111;
    color:#ccc;
    padding:8px 16px;
    border:none;
    cursor:pointer;
}

.center{
    display:block;
    margin:30px auto;
}

/* MODAL */
.modal{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.box{
    background:#0a0a0a;
    padding:25px;
    border-radius:15px;
    width:320px;
    border:1px solid #ff000030;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    background:#111;
    color:white;
    border:none;
}

#mensaje{
    position:fixed;
    bottom:20px;
    right:20px;
    display:none;
}

/* RESPONSIVE */
@media (max-width:768px){
    .menu{display:none;}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
    <div class="logo">LIL NAAY</div>
    <div class="menu" id="menu">
        <a href="#" class="active">INICIO</a>
        <a href="#">MÚSICA</a>
        <a href="#">VIDEOS</a>
        <a href="#">TIENDA</a>
        <a href="#">COMUNIDAD</a>
        <a href="#">SUSCRIPCIÓN</a>
    </div>

    <div class="nav-right">
        <div class="contador-box"> COMUNIDAD 🕷️ <span id="contadorNav">0</span></div>
        <button class="login-top" onclick="abrirLogin()">INICIAR SESIÓN</button>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <img src="fondo.png" class="hero-bg">
    <img src="artista.png" class="hero-artista">
    <img src="texto.png" class="hero-texto">

    <div class="hero-buttons">
        <button class="btn-img" onclick="abrirPerfil()">
            <img src="btn_perfil.png">
        </button>

        <button class="btn-img" onclick="entrarTienda()">
            <img src="btn_entrar.png">
        </button>
    </div>
</div>

<!-- MODALES (IGUAL) -->
<div class="modal" id="registro">...</div>
<div class="modal" id="login">...</div>
<div class="modal" id="perfil">...</div>

<!-- SECCIÓN -->
<div class="music-section">

<h3>PRÓXIMO LANZAMIENTO</h3>

<div class="music-card">
    <img src="cover.jpg" class="cover">

    <div class="music-info">
        <p class="title">No Confío</p>
        <p class="artist">LIL NAAY</p>

        <div class="player">
            <button class="play" onclick="toggleAudio()">
                <i class="fa fa-play" id="iconPlay"></i>
            </button>
            <input type="range" id="progress" value="0">
            <span id="time">0:00</span>
            <audio id="audio" src="preview.mp3"></audio>
        </div>

        <button class="btn-more">VER MÁS MÚSICA</button>
    </div>
</div>

<h3>VIDEOS DESTACADOS</h3>

<div class="videos">
    <div class="video"><img src="v1.jpg"><p>No Confío</p></div>
    <div class="video"><img src="v2.jpg"><p>Pensando en Ti</p></div>
    <div class="video"><img src="v3.jpg"><p>Cero Amor</p></div>
    <div class="video"><img src="v4.jpg"><p>Más de Mí</p></div>
</div>

<button class="btn-more center">VER MÁS VIDEOS</button>

</div>

<div id="mensaje"></div>

<script type="module">
/* 🔥 TODO TU FIREBASE ORIGINAL AQUÍ (NO SE TOCÓ) */
</script>

<script>
/* 🎧 PLAYER */
const audio = document.getElementById("audio");
const progress = document.getElementById("progress");
const icon = document.getElementById("iconPlay");
const time = document.getElementById("time");

function toggleAudio(){
    if(audio.paused){
        audio.play();
        icon.classList.replace("fa-play","fa-pause");
    }else{
        audio.pause();
        icon.classList.replace("fa-pause","fa-play");
    }
}

audio.addEventListener("timeupdate",()=>{
    progress.value = (audio.currentTime / audio.duration) * 100 || 0;

    let min = Math.floor(audio.currentTime / 60);
    let sec = Math.floor(audio.currentTime % 60);
    if(sec < 10) sec = "0"+sec;

    time.innerText = `${min}:${sec}`;
});

progress.addEventListener("input",()=>{
    audio.currentTime = (progress.value / 100) * audio.duration;
});
</script>

</body>
</html>
