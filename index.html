<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIL NAAY - Inicio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --rojo: #8b0000;
    --rojo-hover: #b30000;
    --fondo: #1a0f0f;
    --texto-secundario: #d6a3a3;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #140909, #3a1a1a);
    color: white;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    padding: 50px 30px;
    background: linear-gradient(90deg, var(--rojo), var(--fondo));
    border-bottom-left-radius: 40px;
    border-bottom-right-radius: 40px;
}

.header img {
    width: 180px;
    height: 180px;
    border-radius: 20px;
    margin-right: 40px;
    object-fit: cover;
    box-shadow:
        0 15px 30px rgba(0, 0, 0, 0.8),
        0 5px 15px rgba(0, 0, 0, 0.6);
}

.header h1 {
    font-size: 56px;
    margin: 0;
}

.btn-main {
    margin-top: 20px;
    display: inline-block;
    background: var(--rojo);
    padding: 12px 25px;
    border-radius: 25px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
    border: none;
    cursor: pointer;
}

.btn-main:hover {
    background: var(--rojo-hover);
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.section {
    background: rgba(255,255,255,0.04);
    padding: 30px;
    margin-top: 30px;
    border-radius: 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-right: 10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="Lil Naay.png">
    <div>
        <h1>LIL NAAY</h1>
        <p>Artista urbano • Trap</p>
        <button onclick="entrarTienda()" class="btn-main">Ver Eventos & Tienda</button>
    </div>
</div>

<div class="container">

<!-- BIOGRAFÍA -->
<div class="section">
    <h2>Biografía</h2>
    <p>Lil Naay es un artista emergente del Trap Latino.</p>
</div>

<!-- LANZAMIENTOS (TU DISEÑO ORIGINAL) -->
<div class="section">
    <h2>🎵 Nuevos Lanzamientos</h2>

    <div style="display:flex; gap:20px; flex-wrap:wrap;">

        <div style="width:180px; text-align:center;">
            <a href="https://youtu.be/e-XAUCdY7eQ" target="_blank">
                <img src="relasionadoconloreal.jpg"
                style="width:100%; border-radius:10px; box-shadow:0 10px 25px rgba(0,0,0,0.7);">
            </a>
            <p>RELACIONADO CON LO REAL</p>
        </div>

        <div style="width:180px; text-align:center;">
            <a href="https://youtube.com" target="_blank">
                <img src="THE MVP OF THE YEAR.jpg"
                style="width:100%; border-radius:10px; box-shadow:0 10px 25px rgba(0,0,0,0.7);">
            </a>
            <p>THE MVP OF THE YEAR</p>
        </div>

    </div>
</div>

<!-- COMUNIDAD + LOGIN -->
<div class="section">
    <h2>🔥 Comunidad</h2>

    <!-- LOGIN GOOGLE -->
    <button onclick="loginGoogle()" class="btn-main">
        <i class="fab fa-google"></i> Iniciar con Google
    </button>

    <p style="margin-top:15px;">
        Suscriptores: <span id="contador">0</span>
    </p>
</div>

</div>

<!-- MENSAJE -->
<div id="mensaje" style="
position: fixed;
bottom: 20px;
right: 20px;
padding: 15px 20px;
border-radius: 10px;
display: none;
color: white;
box-shadow: 0 0 15px rgba(0,0,0,0.5);
z-index: 999;">
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "lil-naay.firebaseapp.com",
  projectId: "lil-naay"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* ================= MENSAJE ================= */
function mostrarMensaje(texto, tipo){
    let msg = document.getElementById("mensaje");
    msg.innerText = texto;
    msg.style.display = "block";
    msg.style.background = tipo === "error" ? "#b30000" : "#008000";

    setTimeout(()=> msg.style.display="none", 2500);
}

/* ================= GOOGLE LOGIN ================= */
window.loginGoogle = async function(){
    try{
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        localStorage.setItem("usuario", user.email);

        const snap = await getDocs(collection(db,"suscriptores"));
        const existe = snap.docs.some(d => d.data().email === user.email);

        if(!existe){
            await addDoc(collection(db,"suscriptores"),{
                email: user.email,
                fecha: new Date()
            });
        }

        mostrarMensaje("✅ Bienvenido " + user.displayName,"ok");
        cargarContador();

    }catch(e){
        console.error(e);
        mostrarMensaje("❌ Error de Google Login","error");
    }
}

/* ================= ACCESO TIENDA ================= */
window.entrarTienda = async function(){

    let email = localStorage.getItem("usuario");

    if(!email){
        mostrarMensaje("⚠️ Inicia sesión con Google","error");
        return;
    }

    const snap = await getDocs(collection(db,"suscriptores"));
    let autorizado = snap.docs.some(d => d.data().email === email);

    if(autorizado){
        window.location.href = "menu.html";
    }else{
        mostrarMensaje("❌ No autorizado","error");
    }
}

/* ================= CONTADOR ================= */
async function cargarContador(){
    const snap = await getDocs(collection(db,"suscriptores"));
    document.getElementById("contador").innerText = snap.size;
}

cargarContador();

</script>

</body>
</html>
