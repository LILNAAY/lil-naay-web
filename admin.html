<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin LIL NAAY</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0d0d0d;
    color:white;
}

/* LOGIN */
.login{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

input{
    padding:10px;
    margin:5px;
    width:250px;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    background:#140909;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
    gap:20px;
    padding:20px;
}

/* CARDS */
.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:10px;
    max-height:300px;
    overflow:auto;
}

button{
    padding:10px;
    background:#8b0000;
    border:none;
    color:white;
    cursor:pointer;
}

li{
    font-size:13px;
    margin-bottom:5px;
    border-bottom:1px solid rgba(255,255,255,0.1);
    padding-bottom:5px;
}
</style>

</head>
<body>

<!-- 🔐 LOGIN -->
<div id="loginBox" class="login">
    <h2>🔐 Acceso Admin</h2>
    <input id="email" placeholder="Correo">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
</div>

<!-- 🔥 PANEL -->
<div id="panel" style="display:none;">

<div class="navbar">
    <h2>⚙️ Panel Admin</h2>
    <button onclick="logout()">Cerrar sesión</button>
</div>

<div class="container">

    <!-- SUSCRIPTORES -->
    <div class="card">
        <h3>👥 Suscriptores</h3>
        <ul id="suscriptores"></ul>
    </div>

    <!-- COMPRAS -->
    <div class="card">
        <h3>💳 Compras</h3>
        <ul id="compras"></ul>
    </div>

    <!-- ACTIVIDAD -->
    <div class="card">
        <h3>📡 Actividad</h3>
        <ul id="actividad"></ul>
    </div>

    <!-- CREAR PRODUCTO -->
    <div class="card">
        <h3>🛍️ Crear Producto</h3>
        <input id="nombre" placeholder="Nombre">
        <input id="precio" placeholder="Precio">
        <input id="imagen" placeholder="URL Imagen">
        <button onclick="crearProducto()">Crear</button>
    </div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
  authDomain: "lil-naay.firebaseapp.com",
  projectId: "lil-naay",
  storageBucket: "lil-naay.firebasestorage.app",
  messagingSenderId: "703644392301",
  appId: "1:703644392301:web:7338cd5cc4ae6054401864"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🔐 LOGIN
window.login = function(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("pass").value;

    signInWithEmailAndPassword(auth,email,pass)
    .then(()=>{
        alert("Bienvenido 🔥");
    })
    .catch((error)=>{
        alert("Error: " + error.message);
    });
}

// 🔐 LOGOUT
window.logout = function(){
    signOut(auth);
}

// 🔐 PROTECCIÓN
onAuthStateChanged(auth,user=>{
    if(user){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("panel").style.display="block";
        cargarTodo();
    }else{
        document.getElementById("loginBox").style.display="flex";
        document.getElementById("panel").style.display="none";
    }
});

// 📊 CARGAR TODO
function cargarTodo(){
    cargarSuscriptores();
    cargarCompras();
    cargarActividad();
}

// 👥 SUSCRIPTORES
async function cargarSuscriptores(){
    const lista = document.getElementById("suscriptores");
    lista.innerHTML = "";

    const snap = await getDocs(collection(db,"suscriptores"));

    snap.forEach(doc=>{
        let d = doc.data();
        lista.innerHTML += `<li>${d.email}</li>`;
    });
}

// 💳 COMPRAS BONITAS
async function cargarCompras(){
    const lista = document.getElementById("compras");
    lista.innerHTML = "";

    const snap = await getDocs(collection(db,"compras"));

    snap.forEach(doc=>{
        let d = doc.data();

        let productos = d.productos.map(p=>
            `${p.nombre} | Talla: ${p.talla || "-"} | Color: ${p.color || "-"} | $${p.precio}`
        ).join("<br>");

        lista.innerHTML += `<li>${productos}</li>`;
    });
}

// 📡 ACTIVIDAD
async function cargarActividad(){
    const lista = document.getElementById("actividad");
    lista.innerHTML = "";

    const snap = await getDocs(collection(db,"actividad"));

    snap.forEach(doc=>{
        let d = doc.data();
        lista.innerHTML += `<li>${d.accion} - ${d.fecha || ""}</li>`;
    });
}

// 🛍️ CREAR PRODUCTO
window.crearProducto = async function(){

    let nombre = document.getElementById("nombre").value;
    let precio = Number(document.getElementById("precio").value);
    let imagen = document.getElementById("imagen").value;

    if(!nombre || !precio){
        alert("Completa datos");
        return;
    }

    await addDoc(collection(db,"productos"),{
        nombre,
        precio,
        imagen,
        stock:10
    });

    alert("Producto creado 🔥");
}

</script>

</body>
</html>
