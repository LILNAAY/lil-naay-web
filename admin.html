<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin LIL NAAY</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0d0d0d;
    color:white;
}

.login{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

input{
    padding:10px;
    margin:5px;
    width:250px;
}

.navbar{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    background:#140909;
}

.container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:10px;
    max-height:300px;
    overflow:auto;
}

button{
    padding:10px;
    background:#8b0000;
    border:none;
    color:white;
    cursor:pointer;
}

li{
    font-size:13px;
    margin-bottom:5px;
    border-bottom:1px solid rgba(255,255,255,0.1);
    padding-bottom:5px;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="loginBox" class="login">
    <h2>🔐 Acceso Admin</h2>
    <input id="email" placeholder="Correo">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">
    <div class="navbar">
        <h2>⚙️ Panel Admin</h2>
        <button onclick="logout()">Cerrar sesión</button>
    </div>

    <div class="container">

        <div class="card">
            <h3>👥 Suscriptores</h3>
            <ul id="suscriptores"></ul>
        </div>

        <div class="card">
            <h3>💳 Compras</h3>
            <ul id="compras"></ul>
        </div>

        <div class="card">
            <h3>📡 Actividad</h3>
            <ul id="actividad"></ul>
        </div>

        <div class="card">
            <h3>🛍️ Productos</h3>
            <ul id="productos"></ul>
        </div>

        <div class="card">
            <h3>🛍️ Crear Producto</h3>
            <input id="nombre" placeholder="Nombre">
            <input id="precio" placeholder="Precio">
            <input id="imagen" placeholder="URL Imagen">
            <button onclick="crearProducto()">Crear</button>
        </div>

    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* 🔐 LOGIN */
window.login = function(){
    let correo = document.getElementById("email").value.trim();
    let clave = document.getElementById("pass").value.trim();

    if(!correo || !clave){
        alert("Completa los campos");
        return;
    }

    signInWithEmailAndPassword(auth,correo,clave)
    .then(()=>{
        console.log("Login OK");
    })
    .catch((error)=>{
        alert("Error: " + error.message);
    });
}

/* 🔐 LOGOUT */
window.logout = function(){
    signOut(auth);
}

/* 🔐 VALIDAR ADMIN */
async function esAdmin(email){
    const snap = await getDocs(collection(db,"usuarios"));

    return snap.docs.some(d=>{
        let u = d.data();
        return u.email === email && u.admin === true;
    });
}

/* 🔐 PROTECCIÓN REAL */
onAuthStateChanged(auth, async user=>{
    if(user){

        let permitido = await esAdmin(user.email);

        if(!permitido){
            alert("No eres admin ❌");
            logout();
            return;
        }

        loginBox.style.display="none";
        panel.style.display="block";
        cargarTodo();

    }else{
        loginBox.style.display="flex";
        panel.style.display="none";
    }
});

/* 📊 CARGAR TODO */
function cargarTodo(){
    cargarSuscriptores();
    cargarCompras();
    cargarActividad();
    cargarProductos();
}

/* 🛍️ PRODUCTOS */
async function cargarProductos(){
    const lista = document.getElementById("productos");
    lista.innerHTML = "";

    const snap = await getDocs(collection(db,"productos"));

    snap.forEach(docSnap=>{
        let p = docSnap.data();
        let id = docSnap.id;

        lista.innerHTML += `
        <li>
        <b>${p.nombre}</b> - $${p.precio}<br>
        <button onclick="editarProducto('${id}','${p.nombre}',${p.precio})">✏️</button>
        <button onclick="eliminarProducto('${id}')">🗑️</button>
        </li>`;
    });
}

/* 👥 SUSCRIPTORES */
async function cargarSuscriptores(){
    const lista = document.getElementById("suscriptores");
    lista.innerHTML = "";

    const snap = await getDocs(collection(db,"suscriptores"));

    snap.forEach(docSnap=>{
        let d = docSnap.data();
        lista.innerHTML += `<li>${d.email}</li>`;
    });
}

/* 💳 COMPRAS */
async function cargarCompras(){
    const lista = document.getElementById("compras");
    lista.innerHTML = "";

    const snap = await getDocs(collection(db,"compras"));

    snap.forEach(docSnap=>{
        let d = docSnap.data();

        let productos = d.productos.map(p=>
            `${p.nombre} | $${p.precio}`
        ).join("<br>");

        lista.innerHTML += `<li>${productos}</li>`;
    });
}

/* 📡 ACTIVIDAD */
async function cargarActividad(){
    const lista = document.getElementById("actividad");
    lista.innerHTML = "";

    const snap = await getDocs(collection(db,"actividad"));

    snap.forEach(docSnap=>{
        let d = docSnap.data();
        lista.innerHTML += `<li>${d.accion}</li>`;
    });
}

/* 🛍️ CREAR */
window.crearProducto = async function(){
    let nombre = document.getElementById("nombre").value;
    let precio = Number(document.getElementById("precio").value);
    let imagen = document.getElementById("imagen").value;

    if(!nombre || isNaN(precio)){
        alert("Datos inválidos");
        return;
    }

    await addDoc(collection(db,"productos"),{
        nombre, precio, imagen
    });

    alert("Producto creado");
    cargarProductos();
}

</script>

</body>
</html>
