<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin DIOS - LIL NAAY</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0d0d0d;
    color:white;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#0a0a0a;
    height:100vh;
    padding:20px;
}

.sidebar button{
    width:100%;
    margin:5px 0;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:#1a1a1a;
    padding:15px;
    border-radius:10px;
    max-height:300px;
    overflow:auto;
}

.stat{
    font-size:22px;
}

/* CHAT */
.msg{
    background:#222;
    padding:8px;
    margin:5px 0;
    border-radius:6px;
}

.admin-btn{
    margin:2px;
    padding:3px 6px;
    font-size:12px;
}

.warn{background:orange;}
.ban{background:red;}
.vip{background:green;}
.del{background:#555;}

/* LOGIN */
.login{
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#0d0d0d;
}

input{
    padding:10px;
    margin:5px;
    width:250px;
}
</style>
</head>

<body>

<div id="loginBox" class="login">
    <h2>🔐 Admin DIOS</h2>
    <input id="email">
    <input id="pass" type="password">
    <button onclick="login()">Entrar</button>
</div>

<div id="panel" style="display:none;width:100%;">

<div class="sidebar">
    <h2>🔥 LIL NAAY</h2>
    <button onclick="ver('dashboard')">📊 Dashboard</button>
    <button onclick="ver('chat')">💬 Chat Admin</button>
    <button onclick="logout()">🚪 Salir</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">

<div class="grid">

<div class="card">
<h3>Usuarios</h3>
<div id="totalUsuarios" class="stat">0</div>
</div>

<div class="card">
<h3>Compras</h3>
<div id="totalCompras" class="stat">0</div>
</div>

<div class="card">
<h3>Productos</h3>
<div id="totalProductos" class="stat">0</div>
</div>

<div class="card">
<h3>Chat</h3>
<div id="totalChat" class="stat">0</div>
</div>

<div class="card">
<h3>🛍️ Productos</h3>
<ul id="productos"></ul>
</div>

<div class="card">
<h3>➕ Crear Producto</h3>
<input id="nombre">
<input id="precio">
<button onclick="crearProducto()">Crear</button>
</div>

<div class="card">
<h3>📡 Logs</h3>
<ul id="logs"></ul>
</div>

</div>
</div>

<!-- CHAT -->
<div id="chatPanel" style="display:none">
<div class="card">
<h3>💬 Moderación Chat</h3>
<div id="chatBox"></div>
</div>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc, getDoc, onSnapshot, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN */
window.login = ()=>signInWithEmailAndPassword(auth,email.value,pass.value);

/* LOGOUT */
window.logout = ()=>signOut(auth);

/* PROTECCIÓN UID */
onAuthStateChanged(auth, async user=>{
if(user){
    const snap = await getDoc(doc(db,"usuarios",user.uid));
    if(!snap.exists() || !snap.data().admin){
        alert("No eres admin");
        logout();
        return;
    }

    loginBox.style.display="none";
    panel.style.display="flex";

    cargarTodo();
    cargarChat();

}else{
    loginBox.style.display="flex";
    panel.style.display="none";
}
});

/* VISTAS */
window.ver = function(v){
    dashboard.style.display = v==="dashboard"?"block":"none";
    chatPanel.style.display = v==="chat"?"block":"none";
}

/* STATS */
async function cargarTodo(){
totalUsuarios.innerText = (await getDocs(collection(db,"usuarios"))).size;
totalCompras.innerText = (await getDocs(collection(db,"compras"))).size;
totalProductos.innerText = (await getDocs(collection(db,"productos"))).size;
totalChat.innerText = (await getDocs(collection(db,"chat"))).size;

/* PRODUCTOS */
let p = await getDocs(collection(db,"productos"));
productos.innerHTML="";
p.forEach(d=>{
productos.innerHTML+=`<li>${d.data().nombre}
<button onclick="eliminarProducto('${d.id}')">🗑️</button></li>`;
});

/* LOGS */
let l = await getDocs(collection(db,"logs"));
logs.innerHTML="";
l.forEach(d=>{
logs.innerHTML+=`<li>${d.data().accion}</li>`;
});
}

/* CREAR PRODUCTO */
window.crearProducto = async ()=>{
await addDoc(collection(db,"productos"),{
nombre:nombre.value,
precio:Number(precio.value)
});
await log("Producto creado");
cargarTodo();
}

/* ELIMINAR */
window.eliminarProducto = async id=>{
await deleteDoc(doc(db,"productos",id));
await log("Producto eliminado");
cargarTodo();
}

/* CHAT REALTIME */
function cargarChat(){
const q = query(collection(db,"chat"), orderBy("fecha"));

onSnapshot(q,snap=>{
chatBox.innerHTML="";
snap.forEach(d=>{
let m=d.data();

chatBox.innerHTML+=`
<div class="msg">
<b>${m.usuario}</b>: ${m.texto}
<br>
<button class="admin-btn warn" onclick="warn('${m.usuario}')">⚠️</button>
<button class="admin-btn ban" onclick="ban('${m.usuario}')">🔒</button>
<button class="admin-btn vip" onclick="vip('${m.usuario}')">👑</button>
<button class="admin-btn del" onclick="delMsg('${d.id}')">❌</button>
</div>`;
});
});
}

/* ACCIONES */
window.delMsg = async id=>{
await deleteDoc(doc(db,"chat",id));
await log("Mensaje eliminado");
}

window.vip = async email=>{
let snap = await getDocs(collection(db,"usuarios"));
snap.forEach(async d=>{
if(d.data().email===email){
await updateDoc(doc(db,"usuarios",d.id),{vip:true});
}
});
await log("Usuario VIP");
}

window.ban = async email=>{
let t = prompt("Minutos:");
if(!t) return;

let banHasta = Date.now()+(t*60000);

let snap = await getDocs(collection(db,"usuarios"));
snap.forEach(async d=>{
if(d.data().email===email){
await updateDoc(doc(db,"usuarios",d.id),{
ban:true,
banHasta
});
}
});
await log("Usuario baneado");
}

window.warn = async email=>{
alert("Advertido");
await log("Advertencia enviada");
}

/* LOG */
async function log(txt){
await addDoc(collection(db,"logs"),{
accion:txt,
fecha:new Date().toLocaleString()
});
}

</script>
</body>
</html>
