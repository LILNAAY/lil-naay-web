<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin LIL NAAY</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* TODO TU CSS ORIGINAL (NO TOCADO) */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#0a0a0a;
    color:white;
}

/* LOGIN */
.login{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

input{
    padding:12px;
    margin:6px;
    width:260px;
    border:none;
    outline:none;
    border-radius:8px;
    background:#1a1a1a;
    color:white;
}

button{
    padding:12px;
    background:linear-gradient(45deg,#ff0000,#8b0000);
    border:none;
    color:white;
    cursor:pointer;
    border-radius:8px;
}

#panel{
    display:flex;
}

.sidebar{
    width:220px;
    height:100vh;
    background:linear-gradient(180deg,#0d0d0d,#1a0000);
    padding:20px;
    border-right:1px solid rgba(255,0,0,0.2);
}

.sidebar h2{
    margin-bottom:30px;
    color:#ff4d4d;
}

.sidebar a{
    display:block;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    color:#ccc;
    text-decoration:none;
}

.sidebar a:hover{
    background:#ff000020;
    color:white;
}

.main{
    flex:1;
    padding:20px;
}

.navbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#111;
    padding:20px;
    border-radius:12px;
    border:1px solid rgba(255,0,0,0.2);
    max-height:300px;
    overflow:auto;
}

.card h3{
    color:#ff4d4d;
}

li{
    font-size:13px;
    margin-bottom:8px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.stats{
    font-size:18px;
    margin:10px 0;
    color:#ff4d4d;
}
</style>
</head>

<body>

<div id="loginBox" class="login">
    <h2>🔐 Acceso Admin</h2>
    <input id="email" placeholder="Correo">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
</div>

<div id="panel" style="display:none;">

    <div class="sidebar">
        <h2>🔥 LIL NAAY</h2>
        <a onclick="mostrarSeccion('dashboard')">📊 Dashboard</a>
        <a onclick="mostrarSeccion('usuarios')">👥 Usuarios</a>
        <a onclick="mostrarSeccion('compras')">💳 Compras</a>
        <a onclick="mostrarSeccion('productos')">🛍️ Productos</a>
        <a onclick="mostrarSeccion('actividad')">📡 Actividad</a>
        <a onclick="mostrarSeccion('chat')">💬 Chat</a> <!-- NUEVO -->
        <a onclick="logout()">🚪 Salir</a>
    </div>

    <div class="main">

        <div class="navbar">
            <h2>⚙️ Panel Admin GOD</h2>
            <button onclick="logout()">Cerrar sesión</button>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboardSection" class="section">
            <div class="container">
                <div class="card">
                    <h3>📊 Estadísticas</h3>
                    <div class="stats">Usuarios: <span id="totalUsuarios">0</span></div>
                    <div class="stats">Compras: <span id="totalCompras">0</span></div>
                    <div class="stats">Productos: <span id="totalProductos">0</span></div>
                    <div class="stats">Mensajes: <span id="totalChat">0</span></div>
                </div>

                <div class="card" style="grid-column: span 2;">
                    <h3>📈 Actividad</h3>
                    <canvas id="graficoActividad"></canvas>
                </div>
            </div>
        </div>

        <!-- USUARIOS -->
        <div id="usuariosSection" class="section" style="display:none;">
            <div class="card">
                <h3>👥 Usuarios (CONTROL)</h3>
                <ul id="usuariosLista"></ul>
            </div>
        </div>

        <!-- CHAT MODERACIÓN -->
        <div id="chatSection" class="section" style="display:none;">
            <div class="card">
                <h3>💬 Moderar Chat</h3>
                <ul id="chatAdmin"></ul>
            </div>
        </div>

    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, getDocs, addDoc,
deleteDoc, doc, updateDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN */
window.login = function(){
    signInWithEmailAndPassword(auth,
        email.value,
        pass.value
    );
}

window.logout = ()=>signOut(auth);

/* SECCIONES */
window.mostrarSeccion = function(sec){
    document.querySelectorAll(".section").forEach(s=>s.style.display="none");
    document.getElementById(sec+"Section").style.display="block";
}

/* PROTECCIÓN */
onAuthStateChanged(auth, async user=>{
    if(!user) return;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("panel").style.display="flex";

    cargarUsuarios();
    cargarChatAdmin();
});

/* 👥 USUARIOS CONTROL */
async function cargarUsuarios(){
    const lista = document.getElementById("usuariosLista");
    lista.innerHTML="";

    const snap = await getDocs(collection(db,"usuarios"));

    snap.forEach(docSnap=>{
        let u = docSnap.data();
        let id = docSnap.id;

        lista.innerHTML += `
        <li>
        ${u.username || "Sin nombre"} (${u.email})
        <br>
        <button onclick="vip('${id}',true)">VIP</button>
        <button onclick="vip('${id}',false)">Quitar VIP</button>
        <button onclick="ban('${id}')">BAN</button>
        </li>`;
    });
}

/* VIP */
window.vip = async function(id,val){
    await updateDoc(doc(db,"usuarios",id),{vip:val});
    alert("Actualizado");
}

/* BAN */
window.ban = async function(id){
    let tiempo = prompt("Minutos de ban:");
    let hasta = Date.now() + tiempo*60000;

    await updateDoc(doc(db,"usuarios",id),{
        ban:true,
        banHasta:hasta
    });

    alert("Usuario baneado");
}

/* 💬 MODERACIÓN CHAT */
function cargarChatAdmin(){
    const lista = document.getElementById("chatAdmin");

    onSnapshot(collection(db,"chat"), snap=>{
        lista.innerHTML="";

        snap.forEach(docSnap=>{
            let m = docSnap.data();
            let id = docSnap.id;

            lista.innerHTML += `
            <li>
            <b>${m.usuario}</b>: ${m.texto}
            <br>
            <button onclick="eliminarMsg('${id}')">🗑️ Eliminar</button>
            </li>`;
        });
    });
}

/* ELIMINAR MENSAJE */
window.eliminarMsg = async function(id){
    await deleteDoc(doc(db,"chat",id));
}

</script>

</body>
</html>
