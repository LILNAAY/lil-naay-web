
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin LIL NAAY</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#0a0a0a;color:white;}

.login{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

input{
padding:12px;
margin:6px;
width:260px;
border:none;
border-radius:8px;
background:#1a1a1a;
color:white;
}

button{
padding:10px;
background:linear-gradient(45deg,#ff0000,#8b0000);
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

#panel{display:flex;}

.sidebar{
width:220px;
height:100vh;
background:linear-gradient(180deg,#0d0d0d,#1a0000);
padding:20px;
}

.sidebar h2{color:#ff4d4d;margin-bottom:30px;}

.sidebar a{
display:block;
padding:10px;
margin:10px 0;
color:#ccc;
cursor:pointer;
}

.sidebar a:hover{
background:#ff000020;
color:white;
}

.main{flex:1;padding:20px;}

.navbar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#111;
padding:20px;
border-radius:12px;
border:1px solid rgba(255,0,0,0.2);
}

li{font-size:13px;margin-bottom:8px;}
.stats{color:#ff4d4d;margin:5px 0;}

#noti{
position:fixed;
top:20px;
right:20px;
background:red;
padding:10px;
border-radius:8px;
display:none;
}
</style>
</head>

<body>

<div id="noti">🔔 Nuevo mensaje</div>

<!-- LOGIN -->
<div id="loginBox" class="login">
<h2>🔐 Acceso Admin</h2>
<input id="email" placeholder="Correo">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">

<div class="sidebar">
<h2>🔥 LIL NAAY</h2>
<a onclick="mostrarSeccion('dashboard')">📊 Dashboard</a>
<a onclick="mostrarSeccion('usuarios')">👥 Usuarios</a>
<a onclick="mostrarSeccion('compras')">💳 Compras</a>
<a onclick="mostrarSeccion('productos')">🛍️ Productos</a>
<a onclick="mostrarSeccion('chat')">💬 Chat</a>
<a onclick="logout()">🚪 Salir</a>
</div>

<div class="main">

<div class="navbar">
<h2>⚙️ Panel Admin</h2>
<button onclick="logout()">Cerrar sesión</button>
</div>

<!-- DASHBOARD -->
<div id="dashboardSection" class="section">
<div class="container">
<div class="card">
<h3>📊 Stats</h3>
<div class="stats">Usuarios: <span id="totalUsuarios">0</span></div>
<div class="stats">Compras: <span id="totalCompras">0</span></div>
<div class="stats">Productos: <span id="totalProductos">0</span></div>
<div class="stats">Chat: <span id="totalChat">0</span></div>
<canvas id="grafico"></canvas>
</div>
</div>
</div>

<!-- USUARIOS -->
<div id="usuariosSection" class="section" style="display:none;">
<div class="card">
<ul id="usuariosLista"></ul>
</div>
</div>

<!-- COMPRAS -->
<div id="comprasSection" class="section" style="display:none;">
<div class="card">
<ul id="compras"></ul>
</div>
</div>

<!-- PRODUCTOS -->
<div id="productosSection" class="section" style="display:none;">
<div class="card"><ul id="productos"></ul></div>

<div class="card">
<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">
<input id="imagen" placeholder="Imagen">
<button onclick="crearProducto()">Crear</button>
</div>
</div>

<!-- CHAT -->
<div id="chatSection" class="section" style="display:none;">
<div class="card">
<ul id="chatAdmin"></ul>
<input id="mensajeAdmin" placeholder="Escribir mensaje...">
<button onclick="enviarMensajeAdmin()">Enviar</button>
</div>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, getDocs, addDoc,
deleteDoc, doc, updateDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth, signInWithEmailAndPassword,
onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyDG6pY9OmphVL91N3ZGY0yED5iA0Sopm3I",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const db = getFirestore(app);
const auth = getAuth(app);

let ultimoMensaje = "";
let chart;

/* LOGIN */
window.login = ()=>{
signInWithEmailAndPassword(auth,email.value,pass.value)
.catch(e=>alert(e.message));
}

window.logout = ()=>signOut(auth);

/* SECCIONES */
window.mostrarSeccion = s=>{
["dashboard","usuarios","compras","productos","chat"]
.forEach(x=>document.getElementById(x+"Section").style.display="none");
document.getElementById(s+"Section").style.display="block";
}

/* ENVIAR MENSAJE ADMIN */
window.enviarMensajeAdmin = async ()=>{
if(!mensajeAdmin.value) return;

await addDoc(collection(db,"chat"),{
usuario:"ADMIN",
email:auth.currentUser.email,
texto:mensajeAdmin.value,
rol:"admin",
fecha:Date.now()
});

mensajeAdmin.value="";
}

/* AUTH */
onAuthStateChanged(auth, async user=>{
if(!user){
loginBox.style.display="flex";
panel.style.display="none";
return;
}

const snap = await getDocs(collection(db,"usuarios"));
let ok=false;

snap.forEach(d=>{
if(d.id===user.uid && d.data().admin) ok=true;
});

if(!ok){
alert("No admin");
logout();
return;
}

loginBox.style.display="none";
panel.style.display="flex";
cargarTodo();
});

/* CARGAR TODO */
function cargarTodo(){
cargarStats();
cargarUsuarios();
cargarProductos();
cargarCompras();
cargarChatAdmin();
}

/* USUARIOS */
async function cargarUsuarios(){
usuariosLista.innerHTML="";

const snap = await getDocs(collection(db,"usuarios"));

snap.forEach(async d=>{
let u = d.data();

if(u.ban && u.banHasta < Date.now()){
await updateDoc(doc(db,"usuarios",d.id),{ban:false});
}

let baneado = u.ban && u.banHasta > Date.now();

let rol =
u.admin ? "👑 Admin" :
u.mod ? "🛡️ Mod" :
u.vip ? "💎 VIP" :
"👤 User";

usuariosLista.innerHTML += `
<li>
${u.email || "⚠️ Sin correo"}
<br>
Rol: ${rol}
<br>
Estado: ${baneado ? "🚫 BANEADO" : "✅ Activo"}
<br>
<button onclick="cambiarRol('${u.email}')">🎭 Rol</button>
<button onclick="banearUsuario('${u.email}')">🚫 Ban</button>
</li>`;
});
}

/* CHAT */
function cargarChatAdmin(){
onSnapshot(collection(db,"chat"),snap=>{
chatAdmin.innerHTML="";

snap.forEach(docSnap=>{
let m = docSnap.data();
let id = docSnap.id;

let color =
m.rol==="admin"?"red":
m.rol==="mod"?"cyan":
m.rol==="vip"?"gold":"white";

chatAdmin.innerHTML += `
<li style="color:${color}">
<b>${m.usuario}</b>: ${m.texto}
<br>
<button onclick="eliminarMensaje('${id}')">🗑️</button>
</li>`;
});

let docs = snap.docs;
if(docs.length){
let ultimo = docs[docs.length-1].data();
if(ultimo.texto !== ultimoMensaje){
mostrarNoti();
ultimoMensaje = ultimo.texto;
}
}

});
}

function mostrarNoti(){
noti.style.display="block";
setTimeout(()=>noti.style.display="none",3000);
}

/* MODERACION */
window.eliminarMensaje=id=>deleteDoc(doc(db,"chat",id));

window.cambiarRol = async email=>{
let rol = prompt("admin / mod / vip / user");
if(!rol) return;

const snap = await getDocs(collection(db,"usuarios"));

snap.forEach(async d=>{
if(d.data().email===email){
await updateDoc(doc(db,"usuarios",d.id),{
admin: rol==="admin",
mod: rol==="mod",
vip: rol==="vip"
});
}
});

alert("Rol actualizado");
}

window.banearUsuario = async email=>{
let min = prompt("Minutos BAN");
if(!min) return;

const snap = await getDocs(collection(db,"usuarios"));

snap.forEach(async d=>{
if(d.data().email===email){
await updateDoc(doc(db,"usuarios",d.id),{
ban:true,
banHasta:Date.now()+min*60000
});
}
});

alert("Usuario baneado");
}

/* STATS */
function cargarStats(){

let usuarios=0, compras=0, productos=0, chat=0;

onSnapshot(collection(db,"usuarios"),snap=>{
usuarios = snap.size;
totalUsuarios.innerText = usuarios;
actualizar();
});

onSnapshot(collection(db,"compras"),snap=>{
compras = snap.size;
totalCompras.innerText = compras;
actualizar();
});

onSnapshot(collection(db,"productos"),snap=>{
productos = snap.size;
totalProductos.innerText = productos;
actualizar();
});

onSnapshot(collection(db,"chat"),snap=>{
chat = snap.size;
totalChat.innerText = chat;
actualizar();
});

function actualizar(){
if(chart) chart.destroy();

chart = new Chart(document.getElementById("grafico"),{
type:"bar",
data:{
labels:["Usuarios","Compras","Productos","Chat"],
datasets:[{
label:"Datos en vivo",
data:[usuarios,compras,productos,chat]
}]
}
});
}

}

/* PRODUCTOS */
async function cargarProductos(){
productos.innerHTML="";

(await getDocs(collection(db,"productos"))).forEach(d=>{
let p=d.data(),id=d.id;

productos.innerHTML += `
<li>${p.nombre} $${p.precio}
<button onclick="eliminarProducto('${id}')">🗑️</button>
</li>`;
});
}

window.eliminarProducto=id=>deleteDoc(doc(db,"productos",id));

window.crearProducto=async()=>{
await addDoc(collection(db,"productos"),{
nombre:nombre.value,
precio:Number(precio.value),
imagen:imagen.value
});

nombre.value="";
precio.value="";
imagen.value="";

cargarProductos();
}

/* COMPRAS */
async function cargarCompras(){
compras.innerHTML="";

(await getDocs(collection(db,"compras")))
.forEach(d=>{
compras.innerHTML += `<li>${d.data().productos.length} productos</li>`;
});
}

</script>

</body>
</html>
