<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin - LIL NAAY</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    margin: 0;
}

.navbar {
    padding: 20px;
    background: #000;
}

.back-btn {
    color: white;
    text-decoration: none;
}

.chat-box {
    max-width: 800px;
    margin: 20px auto;
    background: #1a1a1a;
    padding: 20px;
    border-radius: 10px;
}

.msg {
    margin-bottom: 10px;
    padding: 10px;
    background: #222;
    border-radius: 8px;
}

button {
    margin: 3px;
    padding: 5px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* BOTONES ADMIN */
.warn-btn { background: orange; }
.ban-btn { background: red; color:white; }
.vip-btn { background: green; color:white; }
.del-btn { background: #555; color:white; }

.admin-controls {
    margin-top: 5px;
}
</style>

</head>
<body>

<div class="navbar">
    <a href="index.html" class="back-btn">⬅ Volver</a>
</div>

<div class="chat-box">
    <h2>💬 Panel Admin</h2>

    <div id="chatBox"></div>

    <input id="mensajeInput" placeholder="Mensaje admin..." style="width:70%;padding:10px;">
    <button onclick="enviarMensaje()">Enviar</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, addDoc, onSnapshot,
query, orderBy, serverTimestamp,
deleteDoc, doc, updateDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "TU_API_KEY",
  authDomain: "lil-naay.firebaseapp.com",
  projectId: "lil-naay"
});

const db = getFirestore(app);

/* ================= CHAT ================= */

const q = query(collection(db,"chat"), orderBy("fecha"));

onSnapshot(q,(snap)=>{
    let chat = document.getElementById("chatBox");
    chat.innerHTML = "";

    snap.forEach(d=>{
        let m = d.data();

        chat.innerHTML += `
        <div class="msg">
            <b>${m.usuario}</b>: ${m.texto}

            <div class="admin-controls">
                <button class="warn-btn" onclick="advertir('${m.usuario}')">⚠️</button>
                <button class="ban-btn" onclick="banear('${m.usuario}')">🔒</button>
                <button class="vip-btn" onclick="vip('${m.usuario}')">👑</button>
                <button class="del-btn" onclick="eliminarMensaje('${d.id}')">❌</button>
            </div>
        </div>`;
    });

    chat.scrollTop = chat.scrollHeight;
});

/* ================= ACCIONES ADMIN ================= */

// eliminar mensaje
window.eliminarMensaje = async function(id){
    await deleteDoc(doc(db,"chat",id));
}

// advertir usuario
window.advertir = async function(email){
    alert("Usuario advertido ⚠️: " + email);
}

// dar VIP
window.vip = async function(email){
    const snap = await getDocs(collection(db,"usuarios"));

    snap.forEach(async d=>{
        if(d.data().email === email){
            await updateDoc(doc(db,"usuarios",d.id),{
                vip:true
            });
        }
    });

    alert("Usuario VIP 👑");
}

// banear usuario
window.banear = async function(email){
    let tiempo = prompt("Minutos de ban:");

    if(!tiempo) return;

    let banHasta = Date.now() + (tiempo * 60000);

    const snap = await getDocs(collection(db,"usuarios"));

    snap.forEach(async d=>{
        if(d.data().email === email){
            await updateDoc(doc(db,"usuarios",d.id),{
                ban:true,
                banHasta: banHasta
            });
        }
    });

    alert("Usuario baneado 🔒");
}

/* ================= ENVIAR MENSAJE ADMIN ================= */

window.enviarMensaje = async function(){

    let texto = document.getElementById("mensajeInput").value.trim();

    if(!texto) return;

    await addDoc(collection(db,"chat"),{
        usuario: "ADMIN",
        texto,
        tipo:"admin",
        fecha: serverTimestamp()
    });

    document.getElementById("mensajeInput").value="";
}

</script>

</body>
</html>
