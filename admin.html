<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin LIL NAAY PRO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0d0d0d;
    color:white;
}

/* 🔐 LOGIN */
.login{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

input{
    padding:10px;
    margin:5px;
    width:250px;
    border-radius:5px;
    border:none;
}

/* 🔝 NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    background:#140909;
}

/* 📂 MENU */
.menu{
    display:flex;
    gap:10px;
    padding:10px;
    background:#1a1a1a;
}

.menu button{
    background:#333;
}

/* 🪟 VENTANAS */
.section{
    display:none;
    padding:20px;
}

.active{
    display:block;
}

/* 📊 GRID */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
    gap:20px;
}

/* 🧱 CARDS */
.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:10px;
    max-height:300px;
    overflow:auto;
}

/* 💬 CHAT */
.chat-box{
    max-width:800px;
    margin:auto;
    background:#1a1a1a;
    padding:20px;
    border-radius:10px;
}

.msg{
    margin-bottom:10px;
    padding:10px;
    background:#222;
    border-radius:8px;
}

/* 🔘 BOTONES */
button{
    padding:8px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.warn-btn{background:orange;}
.ban-btn{background:red;color:white;}
.vip-btn{background:green;color:white;}
.del-btn{background:#555;color:white;}

</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox" class="login">
    <h2>🔐 Admin</h2>
    <input id="email" placeholder="Correo">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
</div>

<!-- 🔥 PANEL -->
<div id="panel" style="display:none;">

    <div class="navbar">
        <h2>⚙️ LIL NAAY ADMIN</h2>
        <button onclick="logout()">Salir</button>
    </div>

    <!-- 📂 MENU -->
    <div class="menu">
        <button onclick="mostrar('dashboard')">📊 Dashboard</button>
        <button onclick="mostrar('chat')">💬 Chat</button>
        <button onclick="mostrar('productos')">🛍️ Productos</button>
    </div>

    <!-- 📊 DASHBOARD -->
    <div id="dashboard" class="section active">
        <div class="container">

            <div class="card">
                <h3>👥 Suscriptores</h3>
                <ul id="suscriptores"></ul>
            </div>

            <div class="card">
                <h3>💳 Compras</h3>
                <ul id="compras"></ul>
            </div>

            <div class="card">
                <h3>📡 Actividad</h3>
                <ul id="actividad"></ul>
            </div>

        </div>
    </div>

    <!-- 💬 CHAT -->
    <div id="chat" class="section">
        <div class="chat-box">
            <h3>Chat Admin</h3>
            <div id="chatBox"></div>

            <input id="mensajeInput" placeholder="Mensaje...">
            <button onclick="enviarMensaje()">Enviar</button>
        </div>
    </div>

    <!-- 🛍️ PRODUCTOS -->
    <div id="productos" class="section">
        <div class="container">

            <div class="card">
                <h3>Lista</h3>
                <ul id="listaProductos"></ul>
            </div>

            <div class="card">
                <h3>Crear</h3>
                <input id="nombre" placeholder="Nombre">
                <input id="precio" placeholder="Precio">
                <input id="imagen" placeholder="Imagen URL">
                <button onclick="crearProducto()">Crear</button>
            </div>

        </div>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, getDocs, addDoc,
deleteDoc, doc, updateDoc,
onSnapshot, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth, signInWithEmailAndPassword,
onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"TU_API_KEY",
authDomain:"lil-naay.firebaseapp.com",
projectId:"lil-naay"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* 🔐 LOGIN */
window.login = function(){
let email = email.value;
let pass = pass.value;

signInWithEmailAndPassword(auth,email,pass)
.catch(e=>alert(e.message));
}

window.logout = function(){
signOut(auth);
}

onAuthStateChanged(auth,user=>{
if(user){
loginBox.style.display="none";
panel.style.display="block";
cargarTodo();
}else{
loginBox.style.display="flex";
panel.style.display="none";
}
});

/* 📂 CAMBIAR VENTANA */
window.mostrar = function(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* 📊 CARGAR */
function cargarTodo(){
cargarSuscriptores();
cargarCompras();
cargarActividad();
cargarProductos();
}

/* 👥 SUSCRIPTORES */
async function cargarSuscriptores(){
let snap = await getDocs(collection(db,"suscriptores"));
suscriptores.innerHTML="";
snap.forEach(d=>suscriptores.innerHTML+=`<li>${d.data().email}</li>`);
}

/* 💳 COMPRAS */
async function cargarCompras(){
let snap = await getDocs(collection(db,"compras"));
compras.innerHTML="";
snap.forEach(d=>{
let p = d.data().productos.map(x=>x.nombre).join(", ");
compras.innerHTML+=`<li>${p}</li>`;
});
}

/* 📡 ACTIVIDAD */
async function cargarActividad(){
let snap = await getDocs(collection(db,"actividad"));
actividad.innerHTML="";
snap.forEach(d=>actividad.innerHTML+=`<li>${d.data().accion}</li>`);
}

/* 🛍️ PRODUCTOS */
async function cargarProductos(){
let snap = await getDocs(collection(db,"productos"));
listaProductos.innerHTML="";

snap.forEach(d=>{
let p = d.data();

listaProductos.innerHTML+=`
<li>
${p.nombre} - $${p.precio}
<button onclick="eliminarProducto('${d.id}')">🗑️</button>
</li>`;
});
}

window.crearProducto = async function(){
await addDoc(collection(db,"productos"),{
nombre:nombre.value,
precio:Number(precio.value),
imagen:imagen.value
});
alert("Creado");
cargarProductos();
}

window.eliminarProducto = async function(id){
await deleteDoc(doc(db,"productos",id));
cargarProductos();
}

/* 💬 CHAT ADMIN */
const q = query(collection(db,"chat"), orderBy("fecha"));

onSnapshot(q,(snap)=>{
chatBox.innerHTML="";
snap.forEach(d=>{
let m = d.data();

chatBox.innerHTML+=`
<div class="msg">
<b>${m.usuario}</b>: ${m.texto}
<button onclick="eliminarMensaje('${d.id}')">❌</button>
</div>`;
});
});

window.eliminarMensaje = async function(id){
await deleteDoc(doc(db,"chat",id));
}

window.enviarMensaje = async function(){
await addDoc(collection(db,"chat"),{
usuario:"ADMIN",
texto:mensajeInput.value,
fecha: serverTimestamp()
});
mensajeInput.value="";
}

</script>

</body>
</html>
